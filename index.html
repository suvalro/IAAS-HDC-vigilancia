            Alta registrada. En el diálogo de impresión elige <b>"Guardar como PDF"</b> y archívalo en tu carpeta de altas
            (sugerencia de nombre: <span className="font-mono">Alta_{h.nombre.replace(/\s+/g, "_")}_{fmtDate(h.cierre?.fechaAlta)}</span>).
          </div>
        )}

        <div id="print-area" className="ficha-vigilancia-print p-6 text-sm text-slate-800">
          <EncabezadoPDF titulo="FICHA DE VIGILANCIA EPIDEMIOLÓGICA IAAS" />

          <table className="w-full border-collapse text-xs mb-3">
            <tbody>
              <tr><td className="border border-slate-300 px-2 py-1 font-semibold w-1/4">Nombre</td><td className="border border-slate-300 px-2 py-1" colSpan={3}>{h.nombre}</td></tr>
              <tr>
                <td className="border border-slate-300 px-2 py-1 font-semibold">RUT</td><td className="border border-slate-300 px-2 py-1">{h.rut}</td>
                <td className="border border-slate-300 px-2 py-1 font-semibold">Edad</td><td className="border border-slate-300 px-2 py-1">{h.edad}</td>
              </tr>
              <tr>
                <td className="border border-slate-300 px-2 py-1 font-semibold">Previsión</td><td className="border border-slate-300 px-2 py-1">{h.prevision}</td>
                <td className="border border-slate-300 px-2 py-1 font-semibold">Servicio / Cama</td><td className="border border-slate-300 px-2 py-1">{h.servicio} · {h.cama || "—"}</td>
              </tr>
              <tr>
                <td className="border border-slate-300 px-2 py-1 font-semibold">F. hospitalización</td><td className="border border-slate-300 px-2 py-1">{fmtDate(h.fechaHospitalizacion)}</td>
                <td className="border border-slate-300 px-2 py-1 font-semibold">F. ingreso vigilancia</td><td className="border border-slate-300 px-2 py-1">{fmtDate(h.fechaIngresoVigilancia)}</td>
              </tr>
              <tr><td className="border border-slate-300 px-2 py-1 font-semibold">Diagnóstico</td><td className="border border-slate-300 px-2 py-1" colSpan={3}>{h.diagnostico || "—"}</td></tr>
              <tr><td className="border border-slate-300 px-2 py-1 font-semibold">Antecedentes mórbidos</td><td className="border border-slate-300 px-2 py-1" colSpan={3}>{h.antecedentes || "—"}</td></tr>
              <tr>
                <td className="border border-slate-300 px-2 py-1 font-semibold">Tipo de aislamiento</td><td className="border border-slate-300 px-2 py-1">{formatAislamientos(h)}</td>
                <td className="border border-slate-300 px-2 py-1 font-semibold">Agentes IAAS</td><td className="border border-slate-300 px-2 py-1">{h.agentesIAAS || "—"}</td>
              </tr>
            </tbody>
          </table>

          <div className="mb-3">
            <div className="font-bold text-xs uppercase mb-1 border-b border-slate-300">Dispositivos invasivos</div>
            {cateteres.length > 0 && (
              <div className="text-xs mb-1">
                <b>CVC:</b>{" "}
                {cateteres
                  .map((c) => `${c.tipo}${c.ubicacion ? ` (${c.ubicacion})` : ""} — ${fmtDate(c.fechaInstalacion)} a ${c.fechaRetiro ? fmtDate(c.fechaRetiro) : "en curso"}${c.nutricionParenteral ? " · NPT" : ""}`)
                  .join("; ")}
              </div>
            )}
            {DISPOSITIVOS.filter((d) => d.key !== "cvc" && h.dip[d.key]?.instalado).map((d) => (
              <div key={d.key} className="text-xs mb-1">
                <b>{d.label}:</b> {fmtDate(h.dip[d.key].fechaInstalacion)}
                {h.dip[d.key].ubicacion ? ` · ${h.dip[d.key].ubicacion}` : ""}
                {h.dip[d.key].fechaRetiro ? ` a ${fmtDate(h.dip[d.key].fechaRetiro)}` : " · en curso"}
              </div>
            ))}
            {cateteres.length === 0 && DISPOSITIVOS.every((d) => d.key === "cvc" || !h.dip[d.key]?.instalado) && (
              <div className="text-xs text-slate-500">Sin dispositivos invasivos registrados.</div>
            )}
          </div>

          <div className="mb-3">
            <div className="font-bold text-xs uppercase mb-1 border-b border-slate-300">
              Matriz de evolución diaria ({h.evoluciones.length} visita{h.evoluciones.length !== 1 ? "s" : ""})
            </div>
            <MatrizEvolucionHorizontal evoluciones={h.evoluciones} />
          </div>

          {/* Elementos de criterios IAAS y comentarios, por fecha (no caben en la tabla) */}
          {h.evoluciones.some((ev) => tieneHallazgosCriterios(ev)) && (
            <div className="mb-3">
              <div className="font-bold text-xs uppercase mb-1 border-b border-slate-300">
                Elementos de criterios IAAS y observaciones
              </div>
              {[...h.evoluciones]
                .sort((a, b) => (a.fecha < b.fecha ? -1 : 1))
                .filter((ev) => tieneHallazgosCriterios(ev))
                .map((ev) => (
                  <div key={ev.id} className="text-xs mb-1.5">
                    <span className="font-semibold">{fmtDate(ev.fecha)}: </span>
                    <ResumenCriteriosInline ev={ev} />
                  </div>
                ))}
            </div>
          )}

          {h.estado === "cerrado" && (
            <div className="mb-3">
              <div className="font-bold text-xs uppercase mb-1 border-b border-slate-300">Cierre de vigilancia</div>
              <div className="text-xs">
                Fecha de alta: {fmtDate(h.cierre?.fechaAlta)} · {h.cierre?.presentoIAAS === "SI" ? "Presentó IAAS" : "No presentó IAAS"}
              </div>
              {h.cierre?.obs && <div className="text-xs text-slate-600 italic mt-1">"{h.cierre.obs}"</div>}
            </div>
          )}

          <div className="grid grid-cols-2 gap-8 mt-12 text-xs">
            <div className="text-center">
              <div className="h-5" />
              <div className="border-t border-slate-500 pt-1">Firma Enfermera IAAS</div>
            </div>
            <div className="text-center">
              <div className="h-5" />
              <div className="border-t border-slate-500 pt-1">Firma Médico IAAS</div>
            </div>
          </div>
          <div className="text-right text-[10px] text-slate-500 mt-6">Fecha de impresión: {fmtDate(todayISO())}</div>
        </div>
      </div>
    </div>
  );
}

function AislamientoCard({ hospitalizacion: h, onUpdate }) {
  const [motivoNuevo, setMotivoNuevo] = useState({});
  const editable = h.estado === "activo";
  const aislamientos = h.aislamientos || [];

  const toggle = (tipoKey) => {
    const activo = aislamientos.some((a) => a.tipo === tipoKey);
    const lista = activo
      ? aislamientos.filter((a) => a.tipo !== tipoKey)
      : [...aislamientos, { tipo: tipoKey, fecha: todayISO(), motivo: motivoNuevo[tipoKey] || "" }];
    onUpdate({ ...h, aislamientos: lista, updatedAt: new Date().toISOString() });
  };

  return (
    <SectionCard icon={ShieldAlert} title="Aislamiento" defaultOpen={aislamientos.length > 0}>
      <p className="text-[11px] text-slate-500 mb-2">
        Marca los tipos activos. Si aparece una nueva infección (ej. COVID → gotitas + contacto), agrégalos aquí con la fecha
        en que se indicó. Puede haber varios a la vez.
      </p>
      <div className="flex flex-wrap gap-2">
        {TIPOS_AISLAMIENTO.map((t) => {
          const activo = aislamientos.some((a) => a.tipo === t.key);
          return (
            <button
              key={t.key}
              type="button"
              disabled={!editable}
              onClick={() => toggle(t.key)}
              className={`text-xs font-semibold rounded-full px-3 py-1.5 border ${
                activo ? "bg-teal-700 text-white border-teal-700" : "bg-white text-slate-600 border-slate-300"
              } ${!editable ? "opacity-60" : ""}`}
            >
              {t.label}
            </button>
          );
        })}
      </div>

      {aislamientos.length > 0 && (
        <div className="mt-3 space-y-1.5">
          {aislamientos.map((a) => {
            const label = TIPOS_AISLAMIENTO.find((t) => t.key === a.tipo)?.label || a.tipo;
            return (
              <div key={a.tipo} className="text-xs rounded-lg border border-slate-200 px-3 py-1.5">
                <div className="flex items-center justify-between">
                  <span className="font-semibold text-slate-700">{label}</span>
                  <span className="text-slate-400">desde {fmtDate(a.fecha)}</span>
                </div>
                {editable && (
                  <TextInput
                    value={a.motivo || ""}
                    onChange={(e) => {
                      const lista = aislamientos.map((x) => (x.tipo === a.tipo ? { ...x, motivo: e.target.value } : x));
                      onUpdate({ ...h, aislamientos: lista, updatedAt: new Date().toISOString() });
                    }}
                    placeholder="Motivo (ej: SARS-CoV-2, BLEE, C. difficile…)"
                    className="mt-1 text-xs"
                  />
                )}
                {!editable && a.motivo && <div className="text-slate-500 mt-0.5">{a.motivo}</div>}
              </div>
            );
          })}
        </div>
      )}
    </SectionCard>
  );
}

function TrasladosCard({ hospitalizacion: h, onUpdate }) {
  const [agregando, setAgregando] = useState(false);
  const [fecha, setFecha] = useState(todayISO());
  const [servicioNuevo, setServicioNuevo] = useState(SERVICIOS[0]);
  const traslados = [...(h.traslados || [])].sort((a, b) => (a.fecha < b.fecha ? -1 : 1));

  const guardar = () => {
    if (!fecha) return;
    const list = [...(h.traslados || []), { fecha, servicio: servicioNuevo }];
    onUpdate({ ...h, traslados: list, updatedAt: new Date().toISOString() });
    setAgregando(false);
    setFecha(todayISO());
  };

  const eliminar = (idx) => {
    const list = (h.traslados || []).filter((_, i) => i !== idx);
    onUpdate({ ...h, traslados: list, updatedAt: new Date().toISOString() });
  };

  return (
    <SectionCard icon={ArrowRightLeft} title="Traslados de servicio" defaultOpen={false}>
      <p className="text-[11px] text-slate-500 mb-2">
        Si el paciente cambia de servicio, regístralo aquí. La app reparte los días-dispositivo al servicio responsable de
        cada día, para que las tasas por servicio salgan correctas (regla MINSAL).
      </p>

      <div className="text-xs mb-2">
        <span className="text-slate-400">Servicio de ingreso:</span>{" "}
        <span className="font-semibold text-slate-700">{h.servicio}</span>{" "}
        <span className="text-slate-400">(desde {fmtDate(h.fechaHospitalizacion)})</span>
      </div>

      {traslados.length > 0 && (
        <div className="space-y-1 mb-2">
          {traslados.map((t, i) => (
            <div key={i} className="flex items-center justify-between text-xs rounded-lg border border-slate-200 px-3 py-1.5">
              <span>
                <span className="text-slate-400">{fmtDate(t.fecha)} →</span>{" "}
                <span className="font-semibold text-slate-700">{t.servicio}</span>
              </span>
              <button onClick={() => eliminar(i)} className="text-rose-400 text-[11px] hover:text-rose-600">
                Quitar
              </button>
            </div>
          ))}
        </div>
      )}

      {agregando ? (
        <div className="rounded-lg border border-slate-200 p-2.5 space-y-2">
          <div className="grid grid-cols-2 gap-2">
            <Field label="Fecha de traslado">
              <TextInput type="date" value={fecha} onChange={(e) => setFecha(e.target.value)} />
            </Field>
            <Field label="Nuevo servicio">
              <Select value={servicioNuevo} onChange={(e) => setServicioNuevo(e.target.value)}>
                {SERVICIOS.map((s) => (
                  <option key={s}>{s}</option>
                ))}
              </Select>
            </Field>
          </div>
          <div className="flex gap-2">
            <button onClick={guardar} className="flex-1 rounded-lg bg-teal-700 text-white text-xs font-semibold py-2">
              Guardar traslado
            </button>
            <button onClick={() => setAgregando(false)} className="rounded-lg border border-slate-300 text-slate-600 text-xs px-3">
              Cancelar
            </button>
          </div>
        </div>
      ) : (
        <button
          onClick={() => setAgregando(true)}
          className="w-full rounded-lg border border-dashed border-slate-300 text-slate-500 text-xs font-semibold py-2 hover:border-teal-400 hover:text-teal-700"
        >
          + Registrar traslado
        </button>
      )}
    </SectionCard>
  );
}

function FichaDetail({ hospitalizacion, allHospitalizaciones, onBack, onUpdate, onDelete }) {
  const [addingEvolucion, setAddingEvolucion] = useState(false);
  const [editingEvolucion, setEditingEvolucion] = useState(null);
  const [closing, setClosing] = useState(false);
  const [notificando, setNotificando] = useState(false);
  const [editingNotif, setEditingNotif] = useState(null);
  const [viewingNotif, setViewingNotif] = useState(null);
  const [viewingFicha, setViewingFicha] = useState(false);
  const [alertaAltaVista, setAlertaAltaVista] = useState(false);
  const dias = daysBetween(lastMovementDate(hospitalizacion), todayISO());
  const alerta = hospitalizacion.estado === "activo" && dias >= ALERTA_DIAS;
  const notificaciones = hospitalizacion.notificaciones || [];

  const historialPrevio = allHospitalizaciones.filter(
    (h) => h.id !== hospitalizacion.id && h.rut === hospitalizacion.rut && h.estado === "cerrado"
  );

  const guardarEvolucion = (ev, criteriosIAAS) => {
    const yaExiste = hospitalizacion.evoluciones.some((e) => e.id === ev.id);
    const evoluciones = yaExiste
      ? hospitalizacion.evoluciones.map((e) => (e.id === ev.id ? ev : e))
      : [...hospitalizacion.evoluciones, ev];
    const updated = {
      ...hospitalizacion,
      evoluciones,
      criteriosIAAS: criteriosIAAS || hospitalizacion.criteriosIAAS,
      updatedAt: new Date().toISOString(),
    };
    onUpdate(updated);
    setAddingEvolucion(false);
    setEditingEvolucion(null);
  };

  const eliminarEvolucion = (id) => {
    if (!window.confirm("¿Eliminar esta visita? No se puede deshacer.")) return;
    onUpdate({
      ...hospitalizacion,
      evoluciones: hospitalizacion.evoluciones.filter((e) => e.id !== id),
      updatedAt: new Date().toISOString(),
    });
  };

  const confirmarCierre = (cierre) => {
    onUpdate({ ...hospitalizacion, estado: "cerrado", cierre, updatedAt: new Date().toISOString() });
    setClosing(false);
    setAlertaAltaVista(true);
    setViewingFicha(true);
  };

  const guardarNotificacion = (n) => {
    const yaExiste = notificaciones.some((x) => x.id === n.id);
    const list = yaExiste ? notificaciones.map((x) => (x.id === n.id ? n : x)) : [...notificaciones, n];
    onUpdate({ ...hospitalizacion, notificaciones: list, updatedAt: new Date().toISOString() });
    setNotificando(false);
    setEditingNotif(null);
  };

  if (addingEvolucion) {
    return <EvolucionForm hospitalizacion={hospitalizacion} onCancel={() => setAddingEvolucion(false)} onSave={guardarEvolucion} />;
  }

  if (editingEvolucion) {
    return (
      <EvolucionForm
        hospitalizacion={hospitalizacion}
        evolucionInicial={editingEvolucion}
        onCancel={() => setEditingEvolucion(null)}
        onSave={guardarEvolucion}
      />
    );
  }

  if (notificando) {
    return (
      <NotificacionForm
        hospitalizacion={hospitalizacion}
        notificacion={editingNotif}
        onCancel={() => {
          setNotificando(false);
          setEditingNotif(null);
        }}
        onSave={guardarNotificacion}
      />
    );
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onBack} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <ArrowLeft size={18} />
        </button>
        <div className="flex-1 min-w-0">
          <h1 className="text-lg font-bold text-slate-800 truncate">{hospitalizacion.nombre}</h1>
          <p className="text-xs text-slate-500">{hospitalizacion.rut} · {hospitalizacion.servicio} · Cama {hospitalizacion.cama || "?"}</p>
        </div>
        {hospitalizacion.estado === "cerrado" ? (
          <Pill tone={hospitalizacion.cierre?.presentoIAAS === "SI" ? "red" : "green"}>
            {hospitalizacion.cierre?.presentoIAAS === "SI" ? "IAAS +" : "Cerrada"}
          </Pill>
        ) : (
          <Pill tone="teal">Activa</Pill>
        )}
      </div>

      <button
        onClick={() => setViewingFicha(true)}
        className="w-full flex items-center justify-center gap-1.5 rounded-lg border border-teal-200 bg-teal-50 text-teal-700 font-semibold text-sm py-2"
      >
        <ClipboardList size={15} /> Vista previa / Imprimir ficha de vigilancia
      </button>

      {alerta && alertaAltaVista && !closing && (
        <div className="rounded-lg border border-amber-200 bg-amber-50 px-3.5 py-2.5 text-xs text-amber-800 space-y-2">
          <div className="flex gap-2">
            <AlertTriangle size={15} className="shrink-0 mt-0.5" />
            <span>Sin registro de visita hace {dias} días. ¿El paciente fue dado de alta?</span>
          </div>
          <div className="flex gap-2 pl-6">
            <button
              onClick={() => setClosing(true)}
              className="rounded-md bg-amber-600 hover:bg-amber-700 text-white text-[11px] font-semibold px-2.5 py-1.5"
            >
              Sí, registrar alta ahora
            </button>
            <button
              onClick={() => setAlertaAltaVista(true)}
              className="rounded-md border border-amber-300 text-amber-700 text-[11px] font-semibold px-2.5 py-1.5"
            >
              No, sigue hospitalizado
            </button>
          </div>
        </div>
      )}

      {alerta && !alertaAltaVista && (
        <AlertaAltaModal
          dias={dias}
          nombre={hospitalizacion.nombre}
          onConfirmarAlta={() => {
            setAlertaAltaVista(true);
            setClosing(true);
          }}
          onSigueHospitalizado={() => setAlertaAltaVista(true)}
        />
      )}

      {historialPrevio.length > 0 && (
        <div className="rounded-lg border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-xs text-slate-600 flex gap-2">
          <History size={15} className="shrink-0 mt-0.5 text-slate-400" />
          <span>{historialPrevio.length} ingreso(s) anterior(es) de este paciente en el histórico.</span>
        </div>
      )}

      <SectionCard icon={ClipboardList} title="Datos de cabecera" defaultOpen={false}>
        <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">
          <div><span className="text-slate-400">Edad:</span> {hospitalizacion.edad || "—"}</div>
          <div><span className="text-slate-400">Previsión:</span> {hospitalizacion.prevision || "—"}</div>
          <div><span className="text-slate-400">F. hospitalización:</span> {fmtDate(hospitalizacion.fechaHospitalizacion)}</div>
          <div><span className="text-slate-400">F. ingreso vigilancia:</span> {fmtDate(hospitalizacion.fechaIngresoVigilancia)}</div>
          <div className="col-span-2"><span className="text-slate-400">Diagnóstico:</span> {hospitalizacion.diagnostico || "—"}</div>
          <div className="col-span-2"><span className="text-slate-400">Antecedentes:</span> {hospitalizacion.antecedentes || "—"}</div>
          <div><span className="text-slate-400">Aislamiento:</span> {formatAislamientos(hospitalizacion)}</div>
          <div><span className="text-slate-400">Agentes IAAS:</span> {hospitalizacion.agentesIAAS || "—"}</div>
        </div>
      </SectionCard>

      <SectionCard icon={Syringe} title="Dispositivos invasivos" defaultOpen={false}>
        <div className="space-y-3">
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-sm font-semibold text-slate-700">CVC</span>
              {cateteresCVCActivos(hospitalizacion).length > 0 && (
                <span className="text-xs font-semibold text-teal-700">{focoDiasTotal(hospitalizacion, "cvc")}d totales</span>
              )}
            </div>
            <CateteresCVCEditor
              cateteres={hospitalizacion.dip.cvc.cateteres}
              onChange={(list) => onUpdate({ ...hospitalizacion, dip: { ...hospitalizacion.dip, cvc: { cateteres: list } } })}
            />
          </div>
          {DISPOSITIVOS.filter((d) => d.key !== "cvc").map((d) => {
            const dip = hospitalizacion.dip[d.key];
            const editable = hospitalizacion.estado === "activo";
            const setDip = (patch) =>
              onUpdate({ ...hospitalizacion, dip: { ...hospitalizacion.dip, [d.key]: { ...dip, ...patch }, }, updatedAt: new Date().toISOString() });

            if (!dip?.instalado) {
              // permitir instalar desde la ficha si no estaba
              return editable ? (
                <label key={d.key} className="flex items-center gap-2 text-sm rounded-lg border border-dashed border-slate-200 px-3 py-2 text-slate-500">
                  <input
                    type="checkbox"
                    checked={false}
                    onChange={() => setDip({ instalado: true, fechaInstalacion: todayISO() })}
                    className="h-4 w-4 accent-teal-700"
                  />
                  Instalar {d.label}
                </label>
              ) : null;
            }

            const diasUso = daysBetween(dip.fechaInstalacion, dip.fechaRetiro || todayISO());
            const previos = dip.previos || []; // episodios anteriores (por cambios)
            const diasPrevios = previos.reduce((s, p) => s + (p.fechaInstalacion ? daysBetween(p.fechaInstalacion, p.fechaRetiro || p.fechaInstalacion) : 0), 0);

            return (
              <div key={d.key} className="rounded-lg border border-slate-200 px-3 py-2.5">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="font-semibold text-slate-700 text-sm">{d.label}</span>
                  <span className="text-xs font-semibold text-teal-700">
                    {diasUso + diasPrevios}d {previos.length > 0 ? "(acum.)" : ""}
                  </span>
                </div>

                {previos.length > 0 && (
                  <div className="text-[11px] text-slate-400 mb-1.5">
                    {previos.map((p, i) => (
                      <div key={i}>
                        Anterior: {fmtDate(p.fechaInstalacion)} → {p.fechaRetiro ? fmtDate(p.fechaRetiro) : "?"}{p.ubicacion ? ` · ${p.ubicacion}` : ""}
                      </div>
                    ))}
                  </div>
                )}

                {editable ? (
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="Instalación (actual)">
                      <TextInput type="date" value={dip.fechaInstalacion} onChange={(e) => setDip({ fechaInstalacion: e.target.value })} />
                    </Field>
                    <Field label="Retiro">
                      <TextInput type="date" value={dip.fechaRetiro} onChange={(e) => setDip({ fechaRetiro: e.target.value })} />
                    </Field>
                    <Field label="Ubicación" className="col-span-2">
                      <TextInput value={dip.ubicacion} onChange={(e) => setDip({ ubicacion: e.target.value })} />
                    </Field>
                  </div>
                ) : (
                  <div className="text-xs text-slate-500">
                    {fmtDate(dip.fechaInstalacion)}{dip.fechaRetiro ? ` a ${fmtDate(dip.fechaRetiro)}` : " · en curso"} · {diasUso}d
                  </div>
                )}

                {editable && (
                  <button
                    onClick={() => {
                      const fRetiro = dip.fechaRetiro || todayISO();
                      const nuevoPrevio = { fechaInstalacion: dip.fechaInstalacion, fechaRetiro: fRetiro, ubicacion: dip.ubicacion };
                      onUpdate({
                        ...hospitalizacion,
                        dip: {
                          ...hospitalizacion.dip,
                          [d.key]: { instalado: true, fechaInstalacion: todayISO(), fechaRetiro: "", ubicacion: "", previos: [...previos, nuevoPrevio] },
                        },
                        updatedAt: new Date().toISOString(),
                      });
                    }}
                    className="mt-2 text-[11px] font-semibold text-teal-700 hover:underline"
                  >
                    + Registrar cambio de {d.label} (nuevo dispositivo)
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </SectionCard>

      <TrasladosCard hospitalizacion={hospitalizacion} onUpdate={onUpdate} />

      <AislamientoCard hospitalizacion={hospitalizacion} onUpdate={onUpdate} />

      <div>
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
            <Clock size={14} /> Evolución ({hospitalizacion.evoluciones.length} visita{hospitalizacion.evoluciones.length !== 1 ? "s" : ""})
          </h2>
          {hospitalizacion.estado === "activo" && (
            <button
              onClick={() => setAddingEvolucion(true)}
              className="flex items-center gap-1 text-xs font-semibold text-teal-700 hover:underline"
            >
              <Plus size={13} /> Añadir visita
            </button>
          )}
        </div>
        {hospitalizacion.evoluciones.length === 0 ? (
          <div className="rounded-xl border border-dashed border-slate-300 bg-white py-8 text-center text-sm text-slate-400">
            Sin visitas registradas todavía.
          </div>
        ) : (
          <div className="space-y-2">
            {[...hospitalizacion.evoluciones]
              .sort((a, b) => (a.fecha < b.fecha ? 1 : -1))
              .map((ev) => (
                <div key={ev.id} className="rounded-xl border border-slate-200 bg-white p-3.5">
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <CalendarClock size={13} className="text-slate-400" /> {fmtDate(ev.fecha)}
                    </div>
                    {hospitalizacion.estado === "activo" && (
                      <div className="flex items-center gap-3">
                        <button
                          onClick={() => setEditingEvolucion(ev)}
                          className="text-[11px] font-semibold text-teal-700 hover:underline"
                        >
                          Editar
                        </button>
                        <button
                          onClick={() => eliminarEvolucion(ev.id)}
                          className="text-[11px] font-semibold text-rose-400 hover:text-rose-600"
                        >
                          Eliminar
                        </button>
                      </div>
                    )}
                  </div>
                  <ResumenSintomasEvolucion ev={ev} />
                </div>
              ))}
          </div>
        )}
      </div>

      <div>
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
            <FileWarning size={14} /> Notificaciones IAAS ({notificaciones.length})
          </h2>
          <button
            onClick={() => {
              setEditingNotif(null);
              setNotificando(true);
            }}
            className="flex items-center gap-1 text-xs font-semibold text-teal-700 hover:underline"
          >
            <Plus size={13} /> Notificar caso
          </button>
        </div>
        {notificaciones.length === 0 ? (
          <div className="rounded-xl border border-dashed border-slate-300 bg-white py-6 text-center text-xs text-slate-400">
            Sin sospecha ni confirmación notificada por ahora.
          </div>
        ) : (
          <div className="space-y-2">
            {[...notificaciones]
              .sort((a, b) => (a.fechaNotificacion < b.fechaNotificacion ? 1 : -1))
              .map((n) => (
                <div key={n.id} className="rounded-xl border border-slate-200 bg-white p-3.5">
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <div className="text-xs font-bold text-slate-700">{fmtDate(n.fechaNotificacion)}</div>
                      <div className="text-xs text-slate-500">{n.diagnosticoIAAS || "Sin diagnóstico IAAS"}</div>
                    </div>
                    <Pill tone={n.confirmacion === "SI" ? "red" : n.confirmacion === "NO" ? "green" : "amber"}>
                      {n.confirmacion || "Pendiente"}
                    </Pill>
                  </div>
                  <div className="flex gap-3 mt-2">
                    <button
                      onClick={() => {
                        setEditingNotif(n);
                        setNotificando(true);
                      }}
                      className="text-xs font-semibold text-teal-700 hover:underline"
                    >
                      Editar
                    </button>
                    <button onClick={() => setViewingNotif(n)} className="text-xs font-semibold text-slate-500 hover:underline">
                      Vista previa / Imprimir
                    </button>
                  </div>
                </div>
              ))}
          </div>
        )}
      </div>

      {hospitalizacion.estado === "activo" && (
        <button
          onClick={() => setClosing(true)}
          className="w-full rounded-lg border border-slate-300 text-slate-600 font-semibold text-sm py-2.5 mb-4"
        >
          Cerrar ficha (egreso)
        </button>
      )}

      {hospitalizacion.estado === "cerrado" && (
        <div className="rounded-lg border border-slate-200 bg-slate-50 px-3.5 py-3 text-sm text-slate-600 mb-4">
          <div className="font-semibold text-slate-700 mb-1">Cierre registrado</div>
          <div>Fecha de alta: {fmtDate(hospitalizacion.cierre?.fechaAlta)}</div>
          {hospitalizacion.cierre?.obs && <div className="mt-1 italic">"{hospitalizacion.cierre.obs}"</div>}
        </div>
      )}

      <button
        onClick={() => {
          if (
            window.confirm(
              `¿Eliminar definitivamente la ficha de ${hospitalizacion.nombre}?\n\nDesaparecerá del censo, del histórico y de los informes en todos los dispositivos. Úsalo solo para registros de prueba o creados por error.`
            )
          ) {
            onDelete(hospitalizacion.id);
          }
        }}
        className="w-full rounded-lg border border-rose-200 text-rose-500 font-semibold text-xs py-2 mb-4"
      >
        Eliminar ficha (prueba o error de registro)
      </button>

      {closing && (
        <CierreForm hospitalizacion={hospitalizacion} onCancel={() => setClosing(false)} onConfirm={confirmarCierre} />
      )}

      {viewingNotif && <NotificacionPrintView notificacion={viewingNotif} onClose={() => setViewingNotif(null)} />}
      {viewingFicha && <FichaVigilanciaPrintView hospitalizacion={hospitalizacion} onClose={() => setViewingFicha(false)} />}
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/* App principal                                                           */
/* ---------------------------------------------------------------------- */

function App() {
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [hospitalizaciones, setHospitalizaciones] = useState([]);
  const [view, setView] = useState("censo"); // censo | nueva | ficha | historico
  const [selectedId, setSelectedId] = useState(null);

  useEffect(() => {
    (async () => {
      const data = await loadHospitalizaciones();
      setHospitalizaciones(data);
      setLoading(false);
    })();
  }, []);

  const persist = useCallback(async (list) => {
    setSaving(true);
    const r = await persistHospitalizaciones(list);
    if (r && r.records) setHospitalizaciones(r.records);
    setSaving(false);
  }, []);

  const handleCreate = async (nuevaFicha) => {
    const ficha = { ...nuevaFicha, updatedAt: new Date().toISOString() };
    const list = [...hospitalizaciones, ficha];
    setHospitalizaciones(list);
    setSelectedId(ficha.id);
    setView("ficha");
    persist(list);
  };

  const handleUpdate = async (updated) => {
    const u = { ...updated, updatedAt: new Date().toISOString() };
    const list = hospitalizaciones.map((h) => (h.id === u.id ? u : h));
    setHospitalizaciones(list);
    persist(list);
  };

  const handleDelete = async (id) => {
    const list = hospitalizaciones.map((h) =>
      h.id === id ? { ...h, eliminado: true, updatedAt: new Date().toISOString() } : h
    );
    setHospitalizaciones(list);
    setSelectedId(null);
    setView("censo");
    persist(list);
  };

  const visibles = hospitalizaciones.filter((h) => !h.eliminado);

  const selected = hospitalizaciones.find((h) => h.id === selectedId);

  if (loading) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <Loader2 className="animate-spin text-teal-700" size={28} />
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-50 pb-24">
      <style>{`
        @media print {
          body * { visibility: hidden; }
          #print-area, #print-area * { visibility: visible; }
          #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 16px; }
        }
        @page ficha { size: A4 landscape; }
        .ficha-vigilancia-print { page: ficha; }
      `}</style>
      <div className="bg-teal-800 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
        <div className="flex items-center gap-2">
          <Stethoscope size={19} />
          <div>
            <div className="font-bold text-sm leading-tight">Vigilancia IAAS</div>
            <div className="text-[11px] text-teal-100 leading-tight">Hospital del Cobre · Calama</div>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {saving && <Loader2 size={14} className="animate-spin text-teal-200" />}
          {USUARIO && USUARIO.nombre && (
            <span className="text-[10px] text-teal-100 max-w-[110px] truncate" title={USUARIO.nombre}>
              {USUARIO.nombre}
            </span>
          )}
          <SyncBadge />
          <button onClick={bloquearApp} title="Bloquear la aplicación" className="text-teal-200 hover:text-white">
            <Lock size={15} />
          </button>
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 pt-4">
        {view === "censo" && (
          <CensoView
            hospitalizaciones={visibles}
            onOpen={(id) => {
              setSelectedId(id);
              setView("ficha");
            }}
            onNuevo={() => setView("nueva")}
          />
        )}
        {view === "nueva" && (
          <NuevaFichaForm hospitalizaciones={visibles} onCancel={() => setView("censo")} onCreate={handleCreate} />
        )}
        {view === "ficha" && selected && (
          <FichaDetail
            hospitalizacion={selected}
            allHospitalizaciones={visibles}
            onBack={() => {
              setSelectedId(null);
              setView(selected.estado === "cerrado" ? "historico" : "censo");
            }}
            onUpdate={handleUpdate}
            onDelete={handleDelete}
          />
        )}
        {view === "indicadores" && <IndicadoresView hospitalizaciones={visibles} />}

        {view === "historico" && (
          <HistoricoView
            hospitalizaciones={visibles}
            onOpen={(id) => {
              setSelectedId(id);
              setView("ficha");
            }}
          />
        )}
      </div>

      <div className="max-w-lg mx-auto px-4 fixed bottom-0 left-0 right-0">
        <div className="max-w-lg mx-auto bg-white border-t border-slate-200 flex shadow-[0_-2px_8px_rgba(0,0,0,0.04)]" style={{ paddingBottom: "env(safe-area-inset-bottom)" }}>
          {[
            { key: "censo", label: "Censo", icon: BedDouble },
            { key: "indicadores", label: "Indicadores", icon: TrendingUp },
            { key: "historico", label: "Histórico", icon: History },
          ].map((t) => (
            <button
              key={t.key}
              onClick={() => {
                setSelectedId(null);
                setView(t.key);
              }}
              className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px] font-semibold ${
                view === t.key || (view === "ficha" && selected?.estado === (t.key === "historico" ? "cerrado" : "activo"))
                  ? "text-teal-700"
                  : "text-slate-400"
              }`}
            >
              <t.icon size={18} />
              {t.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/* Indicador de sincronización                                             */
/* ---------------------------------------------------------------------- */

function SyncBadge() {
  const [online, setOnline] = useState(SyncState.online);
  useEffect(() => {
    const f = (v) => setOnline(v);
    SyncState.listeners.add(f);
    return () => SyncState.listeners.delete(f);
  }, []);
  if (!cloudEnabled()) {
    return (
      <span className="flex items-center gap-1 text-[10px] font-semibold text-amber-200" title="Nube no configurada: los datos quedan solo en este equipo">
        <CloudOff size={14} /> Solo este equipo
      </span>
    );
  }
  if (online === false) {
    return (
      <span className="flex items-center gap-1 text-[10px] font-semibold text-amber-200" title="Sin conexión: guardado local cifrado, se sincronizará al reconectar">
        <CloudOff size={14} /> Sin conexión
      </span>
    );
  }
  return (
    <span className="flex items-center gap-1 text-[10px] font-semibold text-teal-100" title="Sincronizado con la nube">
      <Cloud size={14} /> Nube
    </span>
  );
}

/* ---------------------------------------------------------------------- */
/* Pantalla de clave                                                       */
/* ---------------------------------------------------------------------- */

function LockScreen({ onUnlock }) {
  const [clave, setClave] = useState("");
  const [ver, setVer] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const entrar = async () => {
    if (!clave.trim() || busy) return;
    setBusy(true);
    setError("");
    try {
      await onUnlock(clave.trim());
    } catch (e) {
      if (e && e.code === "clave") setError("Clave incorrecta. Inténtalo nuevamente.");
      else if (e && e.code === "offline") setError("Sin conexión a internet y sin respaldo local en este equipo. Conéctate para el primer ingreso.");
      else setError("No se pudo iniciar. Revisa tu conexión e inténtalo de nuevo.");
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center px-6">
      <div className="w-full max-w-sm">
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex flex-col items-center text-center mb-5">
            <div className="w-12 h-12 rounded-full bg-teal-800 text-white flex items-center justify-center mb-3">
              <Lock size={22} />
            </div>
            <div className="font-bold text-slate-800">Vigilancia IAAS</div>
            <div className="text-xs text-slate-500">Hospital del Cobre · Calama</div>
            <div className="text-[11px] text-slate-400 mt-2">Acceso restringido · Información clínica sensible</div>
          </div>
          <div className="relative">
            <input
              type={ver ? "text" : "password"}
              value={clave}
              autoFocus
              onChange={(e) => setClave(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && entrar()}
              placeholder="Clave de acceso"
              className="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 pr-10 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
            />
            <button
              type="button"
              onClick={() => setVer(!ver)}
              className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
              tabIndex={-1}
            >
              {ver ? <EyeOff size={17} /> : <Eye size={17} />}
            </button>
          </div>
          {error && <div className="mt-2 text-xs text-red-600">{error}</div>}
          <button
            onClick={entrar}
            disabled={busy || !clave.trim()}
            className="mt-4 w-full rounded-lg bg-teal-700 hover:bg-teal-800 disabled:opacity-50 text-white text-sm font-semibold py-2.5 flex items-center justify-center gap-2"
          >
            {busy ? <Loader2 size={16} className="animate-spin" /> : "Ingresar"}
          </button>
          {!cloudEnabled() && (
            <div className="mt-4 text-[11px] leading-snug text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
              La nube aún no está configurada (falta pegar la URL del Apps Script en el archivo). La app funcionará
              solo en este equipo, con los datos cifrados con tu clave.
            </div>
          )}
        </div>
        <div className="text-center text-[10px] text-slate-400 mt-3">
          Los datos se cifran en este dispositivo y se sincronizan con tu planilla privada de Google.
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/* Raíz: bloqueo → app                                                     */
/* ---------------------------------------------------------------------- */

function Root() {
  const [unlocked, setUnlocked] = useState(false);
  const [checking, setChecking] = useState(!!CLAVE);

  useEffect(() => {
    if (!CLAVE) return;
    (async () => {
      try {
        await desbloquear(CLAVE);
        setUnlocked(true);
      } catch (e) {
        window.sessionStorage.removeItem(CLAVE_SESION_KEY);
        CLAVE = null;
      } finally {
        setChecking(false);
      }
    })();
  }, []);

  if (checking) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <Loader2 className="animate-spin text-teal-700" size={28} />
      </div>
    );
  }
  if (!unlocked) {
    return (
      <LockScreen
        onUnlock={async (c) => {
          await desbloquear(c);
          setUnlocked(true);
        }}
      />
    );
  }
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
