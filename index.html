<script>
/* Muestra en pantalla cualquier error de carga, en vez de dejar la app en blanco */
window.addEventListener("error", function (e) {
  var el = document.getElementById("root");
  if (!el || el.hasChildNodes()) return;
  var msg = (e.message || "") + "\n" + (e.filename || "") + (e.lineno ? " línea " + e.lineno : "");
  el.innerHTML =
    '<div style="padding:16px;font-family:system-ui;color:#991b1b;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;margin:12px">' +
    '<b>Error al cargar la aplicación</b>' +
    '<pre style="white-space:pre-wrap;font-size:11px;margin-top:8px">' + msg.replace(/</g, "&lt;") + "</pre>" +
    '<div style="font-size:11px;margin-top:8px">Envíale este texto a Claude para corregirlo.</div></div>';
});
/* Si a los 4 s la app sigue en blanco, avisa (p. ej. archivo incompleto al pegar) */
window.addEventListener("load", function () {
  setTimeout(function () {
    var el = document.getElementById("root");
    if (el && !el.hasChildNodes()) {
      el.innerHTML =
        '<div style="padding:16px;font-family:system-ui;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;margin:12px">' +
        "<b>La aplicación no se cargó</b>" +
        '<div style="font-size:12px;margin-top:8px">No se registró un error concreto. Suele deberse a que el archivo se pegó incompleto en GitHub. ' +
        "Vuelve a copiar el archivo completo (Ctrl+A y Ctrl+C sobre el original) y pégalo de nuevo.</div></div>";
    }
  }, 4000);
});
</script>

function gruposDeFoco(foco) {
  return ["grupoA", "grupoB", "grupoC"].filter((g) => foco[g]);
}

/* Clasifica el tipo de elemento según el grupo del foco (para la narrativa EI/EE/ED).
   grupoA = signos/síntomas o imagen (inespecíficos EI); grupoB = confirmación
   microbiológica o específicos (EE); grupoC = elemento definitivo (ED, ej. urocultivo). */
function tipoElemento(focoKey, grupo, elId) {
  // Los elementos compartidos (fiebre, leucocitosis, hipotensión…) son inespecíficos por definición
  if (elId && ELEMENTOS_COMPARTIDOS_IDS.includes(elId)) return "EI";
  if (grupo === "grupoC") return "ED";
  if (grupo === "grupoB") return "EE";
  return "EI";
}

/* Construye la historia cronológica de vigilancia: todos los elementos identificados
   en todas las visitas, con fecha, foco y tipo (EI/EE/ED), ordenados por fecha.
   Es la narrativa que muestra cómo empezó y cómo se definió la IAAS. */
function construirLineaTiempoVigilancia(hospitalizacion) {
  const eventos = [];

  // Recopilar de cada visita (criteriosRevisados) para tener la historia completa
  const fuentes = [];
  (hospitalizacion.evoluciones || []).forEach((ev) => {
    if (ev.criteriosRevisados) fuentes.push(ev.criteriosRevisados);
  });
  // Incluir también el acumulado por si hay elementos solo ahí
  if (hospitalizacion.criteriosIAAS) fuentes.push(hospitalizacion.criteriosIAAS);

  fuentes.forEach((criterios) => {
    const compartidos = criterios.compartidos || {};
    Object.keys(CRITERIOS_FOCOS).forEach((focoKey) => {
      const foco = CRITERIOS_FOCOS[focoKey];
      const focoEstados = criterios[focoKey] || {};
      gruposDeFoco(foco).forEach((g) => {
        foco[g].elementos.forEach((el) => {
          const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
          const estado = esCompartido ? compartidos[el.id] : focoEstados[el.id];
          if (estado?.estado !== "presente") return;
          eventos.push({
            fecha: estado.fecha || "",
            tipo: tipoElemento(focoKey, g, el.id),
            texto: el.texto,
            foco: foco.label,
            focoKey,
            compartido: esCompartido,
          });
        });
      });
    });
  });

  // Deduplicar (mismo elemento/fecha puede aparecer en varias fuentes)
  const vistos = new Set();
  const dedup = [];
  eventos.forEach((e) => {
    const clave = e.compartido ? `comp-${e.texto}-${e.fecha}` : `${e.focoKey}-${e.texto}-${e.fecha}`;
    if (vistos.has(clave)) return;
    vistos.add(clave);
    dedup.push(e);
  });

  return dedup.sort((a, b) => (a.fecha < b.fecha ? -1 : a.fecha > b.fecha ? 1 : 0));
}

// Elementos que se repiten en más de un foco (ej. fiebre aparece en CVC, CUP y VMI):
// se preguntan una sola vez por visita y se aplican a todos los focos correspondientes.
const ELEMENTOS_COMPARTIDOS = {
  fiebre: { texto: "Fiebre ≥ 38 °C axilar" },
  hipotermia: { texto: "Hipotermia ≤ 36 °C axilar" },
  taquiBradi: { texto: "Taquicardia o bradicardia" },
  hipotension: { texto: "Hipotensión" },
  compromisoConciencia: { texto: "Compromiso de conciencia" },
  leucocitosis: { texto: "Leucocitosis o leucopenia" },
  apnea: { texto: "Apnea (menor de 1 año)" },
  calofrios: { texto: "Calofríos" },
};
const ELEMENTOS_COMPARTIDOS_IDS = Object.keys(ELEMENTOS_COMPARTIDOS);

function parseEdadAnios(edadStr) {
  if (!edadStr) return null;
  const m = String(edadStr).match(/(\d+)/);
  if (!m) return null;
  const num = parseInt(m[1], 10);
  if (/mes/i.test(edadStr)) return num / 12;
  return num;
}

// Algunos elementos de la definición oficial solo aplican a un grupo etario específico.
// Este hospital no maneja pacientes menores de 1 año, así que ese criterio queda oculto salvo excepción.
function elementoAplicable(elId, hospitalizacion) {
  const edad = parseEdadAnios(hospitalizacion?.edad);
  if (elId === "apnea") return edad !== null && edad < 1;
  if (elId === "alteracionConciencia") return edad !== null && edad >= 65;
  return true;
}

function initEstadosFoco(focoKey) {
  const foco = CRITERIOS_FOCOS[focoKey];
  const estados = {};
  gruposDeFoco(foco).forEach((g) => {
    foco[g].elementos.forEach((el) => {
      if (ELEMENTOS_COMPARTIDOS_IDS.includes(el.id)) return;
      estados[el.id] = { estado: "no_revisado", fecha: "" };
    });
  });
  return estados;
}

function initCompartidos() {
  const estados = {};
  ELEMENTOS_COMPARTIDOS_IDS.forEach((id) => {
    estados[id] = { estado: "no_revisado", fecha: "" };
  });
  return estados;
}

function ensureCriteriosIAAS(h) {
  const actual = h.criteriosIAAS || {};
  const result = { ...actual };
  let algunFocoActivo = false;
  Object.keys(CRITERIOS_FOCOS).forEach((key) => {
    if (focoInstalado(h, key)) {
      algunFocoActivo = true;
      if (!result[key]) result[key] = initEstadosFoco(key);
    }
  });
  if (algunFocoActivo && !result.compartidos) {
    result.compartidos = initCompartidos();
  }
  return result;
}

// Junta los elementos "presente" de un foco, ya sea que vivan en el bucket propio del foco
// o en el bucket compartido (fiebre, etc.), para notificación y resúmenes.
function elementosPresentesFoco(criteriosIAAS, focoKey) {
  const foco = CRITERIOS_FOCOS[focoKey];
  if (!foco) return [];
  const focoEstados = criteriosIAAS?.[focoKey] || {};
  const compartidos = criteriosIAAS?.compartidos || {};
  const result = [];
  gruposDeFoco(foco).forEach((g) => {
    foco[g].elementos.forEach((el) => {
      const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
      const estado = esCompartido ? compartidos[el.id] : focoEstados[el.id];
      if (estado?.estado === "presente") {
        result.push({ texto: el.texto, fecha: estado.fecha });
      }
    });
  });
  return result;
}

/* Grupos etarios de días-cama (denominador AREpi), según HDC.
   El denominador lo ingresa la usuaria cada cuatrimestre (viene de estadística/GRD). */
const GRUPOS_ETARIOS = [
  { key: "neonatos", label: "Neonatos (<28 días)" },
  { key: "lactantes", label: "Lactantes (29 días–2 años)" },
  { key: "pediatricos", label: "Pediátricos (2–15 años)" },
  { key: "adultos", label: "Adultos (≥15 años)" },
];

/* Grupo etario de un paciente según su edad (en años).
   Para <2 años se distingue neonato/lactante con el campo edadDias si existe;
   si no, se asume lactante (los neonatos <28 días son excepcionales en HDC). */
function grupoEtarioPaciente(h, arepiKey) {
  const edadAnios = parseFloat(h.edad);
  // SDA en neonatos: si el AREpi es específicamente neonatal y el paciente es <1 mes
  if (!isNaN(edadAnios)) {
    if (edadAnios < 2) {
      // menor de 2 años: neonato o lactante
      // si la app registró edad en días y es <28, es neonato
      const dias = parseFloat(h.edadDias);
      if (!isNaN(dias) && dias <= 28) return "neonatos";
      return "lactantes";
    }
    if (edadAnios < 15) return "pediatricos";
    return "adultos";
  }
  // Sin edad clara: usar el grupo típico del AREpi como respaldo
  return AREPI_GRUPO_DEFECTO[arepiKey] || "adultos";
}

/* Respaldo cuando no hay edad registrada (grupo más frecuente de cada AREpi). */
const AREPI_GRUPO_DEFECTO = {
  sdaNeonatos: "lactantes",
  iravbLactantes: "lactantes",
  edaCDifficile: "adultos",
  sarsCov2: "adultos",
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(d) {
  if (!d) return "—";
  const dt = new Date(d + "T00:00:00");
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString("es-CL", { day: "2-digit", month: "2-digit", year: "numeric" });
}

/* Servicio responsable del paciente en una fecha dada, según historial de traslados.
   El servicio inicial rige desde el ingreso; cada traslado cambia el servicio desde su fecha. */
function servicioEnFecha(h, fecha) {
  const trs = [...(h.traslados || [])].filter((t) => t.fecha && t.servicio).sort((a, b) => (a.fecha < b.fecha ? -1 : 1));
  let servicio = h.servicio;
  for (const t of trs) {
    if (t.fecha <= fecha) servicio = t.servicio;
    else break;
  }
  return servicio;
}

/* Suma días-dispositivo de un tramo [inst, retiro] atribuidos a un servicio específico,
   respetando los traslados (cada día calendario cuenta para el servicio de ese día). */
function diasDipEnServicioTramo(fInst, fRetiro, h, servicioObjetivo, desde, hasta) {
  if (!fInst) return 0;
  const ini = fInst > desde ? fInst : desde;
  const finReal = fRetiro || todayISO();
  const fin = finReal < hasta ? finReal : hasta;
  if (fin < ini) return 0;
  let cuenta = 0;
  let d = new Date(ini + "T00:00:00");
  const dFin = new Date(fin + "T00:00:00");
  while (d <= dFin) {
    const iso = d.toISOString().slice(0, 10);
    if (servicioEnFecha(h, iso) === servicioObjetivo) cuenta += 1;
    d.setDate(d.getDate() + 1);
  }
  return cuenta;
}

function daysBetween(a, b) {
  const A = new Date(a + "T00:00:00");
  const B = new Date(b + "T00:00:00");
  return Math.round((B - A) / 86400000);
}

function lastMovementDate(h) {
  const dates = [h.fechaIngresoVigilancia, ...h.evoluciones.map((e) => e.fecha)].filter(Boolean);
  if (!dates.length) return h.fechaIngresoVigilancia;
  return dates.sort().slice(-1)[0];
}

function emptyDip() {
  const base = {
    cup: { instalado: false, fechaInstalacion: "", ubicacion: "", fechaRetiro: "" },
    vmi: { instalado: false, fechaInstalacion: "", ubicacion: "", fechaRetiro: "" },
    cvc: { cateteres: [] },
  };
  return base;
}

function newCateterCVC() {
  return {
    id: uid(),
    tipo: TIPOS_CVC[0],
    fechaInstalacion: todayISO(),
    ubicacion: "",
    fechaRetiro: "",
    nutricionParenteral: false,
  };
}

function cateteresCVCActivos(h) {
  return (h.dip?.cvc?.cateteres || []).filter((c) => !c.fechaRetiro);
}

function focoInstalado(h, key) {
  if (key === "cvc") return cateteresCVCActivos(h).length > 0;
  return !!h.dip?.[key]?.instalado && !h.dip[key]?.fechaRetiro;
}

function focoDiasTotal(h, key) {
  if (key === "cvc") {
    return (h.dip?.cvc?.cateteres || []).reduce(
      (sum, c) => sum + daysBetween(c.fechaInstalacion, c.fechaRetiro || todayISO()),
      0
    );
  }
  const d = h.dip?.[key];
  if (!d?.instalado) return 0;
  const actual = daysBetween(d.fechaInstalacion, d.fechaRetiro || todayISO());
  const previos = (d.previos || []).reduce(
    (s, p) => s + (p.fechaInstalacion ? daysBetween(p.fechaInstalacion, p.fechaRetiro || p.fechaInstalacion) : 0),
    0
  );
  return actual + previos;
}

/* ---------------------------------------------------------------------- */
/* Pesquisa temprana: motor de alertas                                     */
/* ---------------------------------------------------------------------- */

/* Días de permanencia a partir de los cuales conviene revisar el dispositivo.
   Son umbrales de atención para pesquisa, no límites clínicos oficiales. */
const DIAS_ALERTA_DISPOSITIVO = { cvc: 7, cup: 7, vmi: 5 };

/* Nombre corto de cada foco/dispositivo */
const NOMBRE_DISPOSITIVO = { cvc: "CVC", cup: "CUP", vmi: "VMI" };

/* Devuelve las alertas activas de un paciente (para pesquisa temprana). */
function alertasDePaciente(h) {
  if (h.estado !== "activo") return [];
  const alertas = [];
  const hoy = todayISO();

  // 1) Dispositivos que superan el umbral de días de permanencia
  ["cvc", "cup", "vmi"].forEach((key) => {
    if (!focoInstalado(h, key)) return;
    const dias = focoDiasTotal(h, key);
    if (dias >= DIAS_ALERTA_DISPOSITIVO[key]) {
      alertas.push({
        nivel: "media",
        tipo: "dispositivo",
        texto: `${NOMBRE_DISPOSITIVO[key]} lleva ${dias} días — revisar necesidad de mantenerlo`,
      });
    }
  });

  // 2) Elementos de criterio presentes SIN diagnóstico cerrado, dentro de la ventana de 5 días
  //    (fiebre + hemocultivo, leucocituria, etc. que aún no se han resuelto)
  const esPasiva = h.modoVigilancia === "pasiva";
  const notificado = (h.notificaciones || []).length > 0;
  if (!esPasiva) {
    Object.keys(CRITERIOS_FOCOS).forEach((focoKey) => {
      const presentes = elementosPresentesFoco(h.criteriosIAAS, focoKey);
      if (presentes.length === 0) return;
      // fecha del elemento más reciente
      const fechas = presentes.map((e) => e.fecha).filter(Boolean).sort();
      const ultima = fechas[fechas.length - 1] || lastMovementDate(h);
      const diasDesde = daysBetween(ultima, hoy);
      if (!notificado && diasDesde <= 5) {
        alertas.push({
          nivel: "alta",
          tipo: "criterio",
          texto: `${CRITERIOS_FOCOS[focoKey].label}: ${presentes.length} elemento(s) presente(s) — completar dentro de la ventana de 5 días`,
        });
      }
    });

    // 3) Paciente sin visita reciente (seguimiento semanal mínimo) — solo vigilancia activa
    const diasSinVisita = daysBetween(lastMovementDate(h), hoy);
    if (diasSinVisita >= 7) {
      alertas.push({
        nivel: "media",
        tipo: "seguimiento",
        texto: `Sin visita hace ${diasSinVisita} días — la vigilancia mínima es semanal`,
      });
    }
  }

  return alertas;
}

function nivelMaximoAlerta(alertas) {
  if (alertas.some((a) => a.nivel === "alta")) return "alta";
  if (alertas.some((a) => a.nivel === "media")) return "media";
  return null;
}

/* Notificaciones que requieren atención del equipo:
   - sin resolución (confirmacion vacía) → pendiente de confirmar
   - confirmadas por enfermera sin aval médico → pendiente de aval */
function notificacionesPendientes(hospitalizaciones) {
  const out = [];
  hospitalizaciones.forEach((h) => {
    (h.notificaciones || []).forEach((n) => {
      if (!n.confirmacion) {
        out.push({ h, n, tipo: "sin_resolver" });
      } else if (!n.avalMedico) {
        out.push({ h, n, tipo: "sin_aval" });
      }
    });
  });
  return out;
}

/* ---------------------------------------------------------------------- */
/* Indicadores: cálculo de tasas MINSAL                                    */
/* ---------------------------------------------------------------------- */

/* Días de exposición a un dispositivo dentro de una ventana [desde, hasta],
   sumando solo la parte del uso que cae dentro del período. */
function diasDispositivoEnPeriodo(fInst, fRetiro, desde, hasta) {
  if (!fInst) return 0;
  const ini = fInst > desde ? fInst : desde;
  const finReal = fRetiro || todayISO();
  const fin = finReal < hasta ? finReal : hasta;
  if (fin < ini) return 0;
  return daysBetween(ini, fin) + 1; // +1: fecha inicio y término aportan día (regla MINSAL)
}

/* Suma días-dispositivo de un tipo, para un paciente, en el período y (opcional) servicio.
   Si se pide un servicio, reparte por traslados: cada día calendario cuenta al servicio
   responsable ese día (regla MINSAL de servicio derivador / receptor). */
function diasDipPacientePeriodo(h, key, desde, hasta, servicio) {
  const tramos =
    key === "cvc"
      ? (h.dip?.cvc?.cateteres || []).map((c) => [c.fechaInstalacion, c.fechaRetiro])
      : h.dip?.[key]?.instalado
      ? [
          [h.dip[key].fechaInstalacion, h.dip[key].fechaRetiro],
          ...(h.dip[key].previos || []).map((p) => [p.fechaInstalacion, p.fechaRetiro]),
        ]
      : [];
  if (tramos.length === 0) return 0;

  if (servicio) {
    return tramos.reduce((s, [ini, fin]) => s + diasDipEnServicioTramo(ini, fin, h, servicio, desde, hasta), 0);
  }
  return tramos.reduce((s, [ini, fin]) => s + diasDispositivoEnPeriodo(ini, fin, desde, hasta), 0);
}

/* Calcula numerador (IAAS confirmadas) y denominador (días-dispositivo) para un foco. */
function calcularTasa(hospitalizaciones, focoKey, desde, hasta, servicio) {
  let diasDip = 0;
  const listaCasos = [];
  hospitalizaciones.forEach((h) => {
    diasDip += diasDipPacientePeriodo(h, focoKey, desde, hasta, servicio);
    // Un caso cuenta si hay una notificación con este foco = "SI", confirmada, con fecha en el período
    (h.notificaciones || []).forEach((n) => {
      if (n.confirmacion !== "SI") return;
      const f = n.dip?.[focoKey];
      if (!f || f.siNo !== "SI") return;
      // La fecha de la IAAS (inicio de síntomas) es la que ubica el caso en el período.
      // Si no está registrada, se usa la fecha de notificación como respaldo.
      const fechaN = n.fechaIAAS || n.fechaNotificacion || "";
      if (fechaN < desde || fechaN > hasta) return;
      if (servicio && servicioEnFecha(h, fechaN) !== servicio) return;
      listaCasos.push({
        pacienteId: h.id,
        notifId: n.id,
        nombre: h.nombre,
        rut: h.rut,
        fecha: fechaN,
        diagnostico: n.diagnosticoIAAS,
        servicio: servicioEnFecha(h, fechaN),
        avalMedico: n.avalMedico,
      });
    });
  });
  const casos = listaCasos.length;
  const tasa = diasDip > 0 ? (casos / diasDip) * 1000 : 0;
  return { casos, diasDip, tasa, listaCasos };
}

function primerDiaMes(iso) {
  return iso.slice(0, 7) + "-01";
}

/* Cuenta casos AREpi confirmados de un tipo en el período, desglosados por grupo etario real.
   Devuelve { total, porGrupo: {neonatos, lactantes, pediatricos, adultos} }. */
function casosArepi(hospitalizaciones, arepiKey, desde, hasta) {
  const porGrupo = { neonatos: 0, lactantes: 0, pediatricos: 0, adultos: 0 };
  const listaCasos = { neonatos: [], lactantes: [], pediatricos: [], adultos: [] };
  let total = 0;
  hospitalizaciones.forEach((h) => {
    (h.notificaciones || []).forEach((n) => {
      if (n.confirmacion !== "SI") return;
      const a = n.arepi?.[arepiKey];
      if (!a || a.siNo !== "SI") return;
      const f = a.fechaInicioSintomas || n.fechaIAAS || n.fechaNotificacion || "";
      if (f < desde || f > hasta) return;
      const g = grupoEtarioPaciente(h, arepiKey);
      porGrupo[g] = (porGrupo[g] || 0) + 1;
      listaCasos[g].push({ pacienteId: h.id, notifId: n.id, nombre: h.nombre, rut: h.rut, fecha: f, diagnostico: n.diagnosticoIAAS, avalMedico: n.avalMedico });
      total += 1;
    });
  });
  return { total, porGrupo, listaCasos };
}

/* Tasa AREpi = casos / días-cama del grupo × 1000. diasCama viene del input manual. */
function tasaArepi(casos, diasCama) {
  const dc = parseFloat(diasCama) || 0;
  return dc > 0 ? (casos / dc) * 1000 : 0;
}

/* Plazo de vigilancia de una cirugía: 30 días para todas; 10 solo para cataratas. */
function diasVigilanciaCx(reg) {
  const cx = CIRUGIAS_TRAZADORAS.find((x) => x.key === reg.tipoProcedimiento);
  return cx ? cx.diasSeguimiento : 30;
}

/* Estado del plazo: cuántos días van y si ya cumplió para dar el alta de vigilancia. */
function plazoCirugia(reg) {
  const requeridos = diasVigilanciaCx(reg);
  const transcurridos = reg.fechaProcedimiento ? daysBetween(reg.fechaProcedimiento, todayISO()) : 0;
  const enVigilancia = (reg.estado || "activo") === "activo";
  return {
    requeridos,
    transcurridos,
    restantes: Math.max(0, requeridos - transcurridos),
    cumplido: enVigilancia && transcurridos >= requeridos, // toca revisar y dar alta
    enVigilancia,
  };
}

/* Diagnósticos IAAS del manual MINSAL (para lista desplegable en la notificación) */
/* Criterios de confirmación por foco (según formato oficial de notificación HDC).
   Se marcan como casillas en la notificación para corroborar el diagnóstico. */
/* Criterios de confirmación por foco, tomados directamente del manual (CRITERIOS_FOCOS).
   Devuelve los grupos con su título, para marcarlos como casillas en la notificación.
   Incluye signos/síntomas, sedimento/imagen y cultivos según corresponda a cada foco. */
function criteriosConfirmacionFoco(focoKey) {
  const foco = CRITERIOS_FOCOS[focoKey];
  if (!foco) return [];
  return gruposDeFoco(foco).map((g) => ({
    grupo: g,
    titulo: foco[g].titulo,
    tipo: tipoElemento(focoKey, g),
    elementos: foco[g].elementos.map((el) => el.texto),
  }));
}

/* Adapta un registro de cirugía o de procedimiento ambulatorio a la forma que
   espera la ficha de notificación (que fue diseñada para hospitalizaciones). */
function registroComoHospitalizacion(reg) {
  const esCirugia = reg.tipoRegistro === "cirugia";
  const tipoAmb = !esCirugia ? TIPOS_PROCEDIMIENTO_AMB.find((t) => t.key === reg.tipo) : null;
  const cx = esCirugia ? CIRUGIAS_TRAZADORAS.find((c) => c.key === reg.tipoProcedimiento) : null;
  return {
    id: reg.id,
    nombre: reg.nombre,
    rut: reg.rut,
    edad: reg.edad,
    edadDias: "",
    prevision: reg.prevision || "",
    servicio: esCirugia ? "MQ" : reg.unidadInformante || "Ambulatorio",
    traslados: [],
    fechaHospitalizacion: esCirugia ? reg.fechaProcedimiento : reg.fechaIngresoVigilancia,
    diagnostico: esCirugia ? cx?.label || "" : tipoAmb?.label || "",
    antecedentes: "",
    agentesIAAS: reg.mo || "",
    dip: emptyDip(),
    evoluciones: [],
    criteriosIAAS: {},
    aislamientos: [],
    notificaciones: reg.notificaciones || [],
    cierre: esCirugia
      ? reg.fechaAlta
        ? { fechaAlta: reg.fechaAlta }
        : null
      : reg.fechaEgresoVigilancia
      ? { fechaAlta: reg.fechaEgresoVigilancia }
      : null,
  };
}

function newNotificacion(h) {
  const diasEstadia = daysBetween(h.fechaHospitalizacion, h.cierre?.fechaAlta || todayISO());
  return {
    id: uid(),
    fechaNotificacion: todayISO(),
    fechaIAAS: "", // fecha del primer elemento / inicio de síntomas — la que cuenta para indicadores
    // autocompletado
    nombre: h.nombre,
    edad: h.edad,
    edadDias: h.edadDias || "",
    rut: h.rut,
    prevision: h.prevision,
    servicio: h.servicio,
    fechaIngreso: h.fechaHospitalizacion,
    diasEstadia,
    fechaEgreso: h.cierre?.fechaAlta || "",
    diagnosticoIngreso: h.diagnostico,
    // a completar
    diagnosticoIAAS: "",
    fallecio: "",
    categoria: "",
    dip: Object.keys(CRITERIOS_FOCOS).reduce((acc, key) => {
      const instalado = focoInstalado(h, key);
      // Los elementos presentes son solo REFERENCIA para la junta, no deciden el foco.
      // El siNo queda SIEMPRE vacío: lo define la enfermera/médico conscientemente en la notificación.
      const presentes = elementosPresentesFoco(h.criteriosIAAS, key).map((e) => `${e.texto} (${fmtDate(e.fecha)})`);
      acc[key] = {
        siNo: "",
        diasCalendario: instalado ? focoDiasTotal(h, key) : "",
        criteriosMarcados: presentes,
        mo: h.agentesIAAS || "",
      };
      return acc;
    }, {}),
    cirugias: CIRUGIAS_TRAZADORAS.reduce((acc, c) => {
      acc[c.key] = { siNo: "", fecha: "", mo: "", criteriosMarcados: [] };
      return acc;
    }, {}),
    arepi: AREPI_LIST.reduce((acc, a) => {
      acc[a.key] = { siNo: "", fechaInicioSintomas: "", servicio: "", criteriosMarcados: [], cultivoConfirmacion: "" };
      return acc;
    }, {}),
    resumenClinico: "",
    confirmacion: "",
    confirmadoPorRol: "",   // "medico" | "enfermera" — quién dio la confirmación
    confirmadoPorNombre: "",
    avalMedico: false,       // true cuando el médico avala (aunque haya confirmado la enfermera)
    fechaConfirmacion: "",
    enfermeraIAAS: USUARIO && USUARIO.rol === "enfermera" ? USUARIO.nombre : "",
    medicoIAAS: USUARIO && USUARIO.rol === "medico" ? USUARIO.nombre : "",
    createdAt: new Date().toISOString(),
  };
}

const CACHE_KEY = "vigilancia-iaas-cache-v2";      // respaldo local CIFRADO
const PENDING_KEY = "vigilancia-iaas-pendiente";   // hay cambios sin subir a la nube
const CLAVE_SESION_KEY = "vigilancia-iaas-clave";  // clave durante la sesión

let CLAVE = window.sessionStorage.getItem(CLAVE_SESION_KEY) || null;
let USUARIO = null;
try {
  USUARIO = JSON.parse(window.sessionStorage.getItem("vigilancia-iaas-usuario") || "null");
} catch (e) {}
let PRELOADED = null;

const cloudEnabled = () =>
  /^https:\/\//.test(SYNC_URL) && SYNC_URL.indexOf("PEGA_AQUI") === -1;

/* Estado de sincronización (para el indicador del encabezado) */
const SyncState = {
  online: null,
  listeners: new Set(),
  set(v) {
    if (this.online !== v) {
      this.online = v;
      this.listeners.forEach((f) => f(v));
    }
  },
};

/* --- Cifrado local: AES-GCM con llave derivada de la clave (PBKDF2) --- */
const _te = new TextEncoder();
const _td = new TextDecoder();
const _b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const _unb64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

async function deriveKey(clave, salt) {
  const base = await crypto.subtle.importKey("raw", _te.encode(clave), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 120000, hash: "SHA-256" },
    base,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function cacheSave(list) {
  try {
    if (!window.crypto || !crypto.subtle || !CLAVE) return;
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(CLAVE, salt);
    const data = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, _te.encode(JSON.stringify(list)));
    window.localStorage.setItem(CACHE_KEY, JSON.stringify({ salt: _b64(salt), iv: _b64(iv), data: _b64(data) }));
  } catch (e) {
    /* el respaldo local es best-effort */
  }
}

async function cacheLoad() {
  const raw = window.localStorage.getItem(CACHE_KEY);
  if (!raw) return null;
  const p = JSON.parse(raw);
  const key = await deriveKey(CLAVE, _unb64(p.salt));
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: _unb64(p.iv) }, key, _unb64(p.data));
  return JSON.parse(_td.decode(plain)); // lanza error si la clave es incorrecta
}

/* --- Datos antiguos (versión anterior, sin cifrar) --- */
function legacyLoad() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function mergeById(base, extra) {
  const map = new Map((base || []).map((r) => [r.id, r]));
  for (const r of extra || []) {
    const prev = map.get(r.id);
    if (!prev || String(r.updatedAt || "") >= String(prev.updatedAt || "")) map.set(r.id, r);
  }
  return [...map.values()];
}

/* --- Llamadas a la nube --- */
async function cloudGet() {
  const res = await fetch(SYNC_URL + "?clave=" + encodeURIComponent(CLAVE), { redirect: "follow" });
  return res.json();
}

async function cloudPost(records) {
  const res = await fetch(SYNC_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ clave: CLAVE, records }),
    redirect: "follow",
  });
  return res.json();
}

/* --- Desbloqueo: valida la clave y carga los datos --- */
async function desbloquear(claveIngresada) {
  CLAVE = claveIngresada;
  const legacy = legacyLoad();

  if (cloudEnabled()) {
    let data;
    try {
      data = await cloudGet();
    } catch (e) {
      /* Sin conexión: intentar respaldo local cifrado */
      try {
        const cached = await cacheLoad();
        if (cached === null && !legacy) throw new Error("sin-datos");
        PRELOADED = mergeById(cached || [], legacy || []);
        SyncState.set(false);
        window.sessionStorage.setItem(CLAVE_SESION_KEY, CLAVE);
        return;
      } catch (e2) {
        CLAVE = null;
        throw { code: "offline" };
      }
    }
    if (!data.ok) {
      CLAVE = null;
      throw { code: "clave" };
    }
    USUARIO = data.usuario || null;
    try {
      window.sessionStorage.setItem("vigilancia-iaas-usuario", JSON.stringify(USUARIO));
    } catch (e) {}
    let records = data.records || [];
    /* Subir cambios pendientes hechos sin conexión */
    if (window.localStorage.getItem(PENDING_KEY)) {
      try {
        const cached = await cacheLoad();
        if (cached) {
          const r = await cloudPost(cached);
          if (r.ok) records = r.records || records;
        }
        window.localStorage.removeItem(PENDING_KEY);
      } catch (e) {}
    }
    /* Migrar datos de la versión anterior (una sola vez) */
    if (legacy && legacy.length) {
      const stamped = legacy.map((h) => ({ ...h, updatedAt: h.updatedAt || h.createdAt || new Date().toISOString() }));
      const r = await cloudPost(mergeById(records, stamped));
      if (r.ok) records = r.records || records;
      window.localStorage.removeItem(STORAGE_KEY);
    }
    await cacheSave(records);
    PRELOADED = records;
    SyncState.set(true);
  } else {
    /* Modo solo-local (URL de nube aún no configurada) */
    const hasCache = !!window.localStorage.getItem(CACHE_KEY);
    let records = [];
    if (hasCache) {
      try {
        records = (await cacheLoad()) || [];
      } catch (e) {
        CLAVE = null;
        throw { code: "clave" };
      }
    }
    if (legacy && legacy.length) {
      records = mergeById(records, legacy);
      window.localStorage.removeItem(STORAGE_KEY);
    }
    await cacheSave(records);
    PRELOADED = records;
    SyncState.set(null);
  }
  window.sessionStorage.setItem(CLAVE_SESION_KEY, CLAVE);
}

function bloquearApp() {
  window.sessionStorage.removeItem(CLAVE_SESION_KEY);
  window.sessionStorage.removeItem("vigilancia-iaas-usuario");
  window.location.reload();
}

/* --- Interfaz usada por la app (mismas firmas que antes) --- */
async function loadHospitalizaciones() {
  if (PRELOADED) {
    const d = PRELOADED;
    PRELOADED = null;
    return d;
  }
  try {
    return (await cacheLoad()) || [];
  } catch (e) {
    return [];
  }
}

async function persistHospitalizaciones(list) {
  await cacheSave(list);
  if (!cloudEnabled()) return { ok: true };
  try {
    const r = await cloudPost(list);
    if (r.ok) {
      SyncState.set(true);
      window.localStorage.removeItem(PENDING_KEY);
      if (r.records) await cacheSave(r.records);
      return { ok: true, records: r.records };
    }
    throw new Error("rechazado");
  } catch (e) {
    window.localStorage.setItem(PENDING_KEY, "1");
    SyncState.set(false);
    return { ok: true, offline: true };
  }
}

function TableroPendientes({ hospitalizaciones, onOpen }) {
  const pendientes = notificacionesPendientes(hospitalizaciones);
  if (pendientes.length === 0) return null;

  const sinResolver = pendientes.filter((p) => p.tipo === "sin_resolver");
  const sinAval = pendientes.filter((p) => p.tipo === "sin_aval");
  const esMedico = USUARIO?.rol === "medico";

  return (
    <div className="rounded-xl border border-amber-200 bg-amber-50 p-3">
      <div className="flex items-center gap-1.5 mb-2">
        <FileWarning size={15} className="text-amber-600" />
        <span className="text-sm font-bold text-amber-800">
          Notificaciones por revisar ({pendientes.length})
        </span>
      </div>
      <p className="text-[11px] text-amber-700 mb-2">
        {esMedico
          ? "Casos que requieren tu resolución o aval como médico IAAS."
          : "Casos sin resolución de junta o pendientes de aval médico."}

      <div className="space-y-1.5">
        {[...sinResolver, ...sinAval].map(({ h, n, tipo }) => (
          <button
            key={n.id}
            onClick={() => onOpen(h.id)}

                <div className="text-xs font-bold text-slate-800 truncate">{h.nombre || "Sin nombre"}</div>
                <div className="text-[11px] text-slate-500 truncate">
                  {n.diagnosticoIAAS || "IAAS sin diagnóstico"} · {fmtDate(n.fechaNotificacion)}

              </div>
              {tipo === "sin_resolver" ? (
                <span className="shrink-0 text-[10px] font-bold bg-rose-100 text-rose-700 border border-rose-200 rounded px-1.5 py-0.5">

                <span className="shrink-0 text-[10px] font-bold bg-amber-100 text-amber-700 border border-amber-300 rounded px-1.5 py-0.5">
                  {n.confirmacion} · falta aval
                </span>
              )}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

                      )}

                  </div>
                </button>
              );
            })}
        </div>
      )}

      {rapido && (

const SERVICIOS_ITU = ["Medicina", "MQ", "UPC"]; // desglose ITU/CUP por servicio

function IndicadoresProcedimientos({ procedimientos = [], desde, hasta, onOpenCaso }) {
  // Días/procedimiento del período: suma de los meses que caen dentro del cuatrimestre
  const mesesEnRango = (per) => {
    const m = (per.mes || "") + "-01";
    return m >= desde && m <= hasta;
  };

  const porTipo = TIPOS_PROCEDIMIENTO_AMB.map((t) => {
    const regs = procedimientos.filter((p) => p.tipo === t.key);
    let dias = 0;
    regs.forEach((p) => {
      (p.periodos || []).filter(mesesEnRango).forEach((per) => {
        dias += parseInt(per.dias, 10) || 0;
      });
    });
    const casos = regs.filter((p) => {
      if (p.its !== "SI") return false;
      const f = p.fechaITS || "";
      return f >= desde && f <= hasta;
    });
    const indice = dias > 0 ? (casos.length / dias) * 1000 : 0;
    return { t, regs, dias, casos, indice };
  }).filter((r) => r.dias > 0 || r.casos.length > 0);

  if (porTipo.length === 0) return null;

  return (
    <div className="rounded-xl border border-slate-200 bg-white p-3.5">
      <div className="font-bold text-sm text-slate-700 mb-1">Procedimientos ambulatorios periódicos</div>
      <p className="text-[11px] text-slate-500 mb-2">
        Índice de ITS por 1.000 días/procedimiento del cuatrimestre (quimioterapia por CVC y hemodiálisis por CHD).
      </p>
      <table className="w-full text-xs">
        <thead>
          <tr className="text-slate-500 border-b border-slate-200">
            <th className="text-left py-1">Indicador</th>
            <th className="text-right py-1">ITS</th>
            <th className="text-right py-1">Días/proc.</th>
            <th className="text-right py-1">Índice ‰</th>
          </tr>
        </thead>
        <tbody>
          {porTipo.map((r) => (
            <React.Fragment key={r.t.key}>
              <tr className="border-b border-slate-100">
                <td className="py-1.5">
                  <div className="font-semibold text-slate-700 leading-tight">{r.t.indicador}</div>
                  <div className="text-[10px] text-slate-400">{r.t.label} · {r.regs.length} paciente(s)</div>
                </td>
                <td className="text-right align-top pt-1.5">{r.casos.length}</td>
                <td className="text-right align-top pt-1.5">{r.dias}</td>
                <td className="text-right align-top pt-1.5 font-bold text-teal-700">{r.indice.toFixed(2)}</td>
              </tr>
              {r.casos.map((c, i) => (
                <tr key={i} className="bg-slate-50">
                  <td colSpan={4} className="px-2 py-1.5">
                    <button
                      onClick={() => onOpenCaso && onOpenCaso()}
                      className="w-full text-left rounded-lg bg-white border border-slate-200 px-2.5 py-1.5 hover:border-teal-400"
                    >
                      <span className="text-xs font-bold text-slate-800">{c.nombre || "Sin nombre"}</span>
                      <span className="text-[11px] text-slate-500">
                        {" "}· {c.rut || "s/RUT"} · ITS {fmtDate(c.fechaITS)}{c.mo ? ` · ${c.mo}` : ""}
                      </span>
                      <span className="text-[10px] text-teal-600 font-semibold float-right">Revisar ›</span>
                    </button>
                  </td>
                </tr>
              ))}
            </React.Fragment>
          ))}
        </tbody>
      </table>
      <p className="text-[10px] text-slate-400 mt-2">Índice = (N° ITS ÷ total días/procedimiento) × 1.000</p>
    </div>
  );
}

function IndicadoresCirugias({ cirugias, desde, hasta, anio, cuatri, onOpenCaso }) {
  const [totalCx, setTotalCx] = useState(() => cargarTotalCx(anio, cuatri));

  useEffect(() => {
    setTotalCx(cargarTotalCx(anio, cuatri));
  }, [anio, cuatri]);

  const setTotalTipo = (key, valor) => {
    const nuevo = { ...totalCx, [key]: valor };
    setTotalCx(nuevo);
    guardarTotalCx(anio, cuatri, nuevo);
  };

  const enPeriodo = cirugias.filter((c) => c.fechaProcedimiento >= desde && c.fechaProcedimiento <= hasta);

  const porTipo = CIRUGIAS_TRAZADORAS.map((cx) => {
    const registros = enPeriodo.filter((c) => c.tipoProcedimiento === cx.key);
    const vigilados = registros.length;
    const casos = registros.filter((c) => c.iaas === "SI");
    // Total realizado: el ingresado manualmente (pabellón), o los vigilados si no se ingresó
    const realizados = parseInt(totalCx[cx.key], 10) || 0;
    const denomIncidencia = vigilados; // la incidencia se calcula sobre lo vigilado
    const incidencia = denomIncidencia > 0 ? (casos.length / denomIncidencia) * 100 : 0;
    const cobertura = realizados > 0 ? (vigilados / realizados) * 100 : null;
    return { cx, vigilados, realizados, casos, incidencia, cobertura };
  }).filter((r) => r.vigilados > 0 || r.realizados > 0);

  if (porTipo.length === 0) return null;

  return (
    <div className="rounded-xl border border-slate-200 bg-white p-3.5">
      <div className="font-bold text-sm text-slate-700 mb-1">Cirugías y procedimientos trazadores</div>
      <p className="text-[11px] text-slate-500 mb-3">
        Ingresa el <b>total realizado</b> por tipo (dato de pabellón) para calcular la cobertura de vigilancia.
        La incidencia de IHO/endometritis se calcula sobre los procedimientos vigilados.
      </p>
      <table className="w-full text-xs">
        <thead>
          <tr className="text-slate-500 border-b border-slate-200">
            <th className="text-left py-1">Procedimiento</th>
            <th className="text-right py-1">Vig.</th>
            <th className="text-right py-1">Realiz.</th>
            <th className="text-right py-1">Cobert.%</th>
            <th className="text-right py-1">IAAS</th>
            <th className="text-right py-1">Inc.%</th>
          </tr>
        </thead>
        <tbody>
          {porTipo.map((r) => (
            <React.Fragment key={r.cx.key}>
              <tr className="border-b border-slate-100">
                <td className="py-1.5 font-semibold text-slate-700 leading-tight">{r.cx.label}</td>
                <td className="text-right">{r.vigilados}</td>
                <td className="text-right">
                  <input
                    type="number"
                    inputMode="numeric"
                    value={totalCx[r.cx.key] || ""}
                    onChange={(e) => setTotalTipo(r.cx.key, e.target.value)}
                    placeholder="—"
                    className="w-12 text-right rounded border border-slate-300 px-1 py-0.5 text-xs"
                  />
                </td>
                <td className={`text-right font-bold ${r.cobertura !== null && r.cobertura < 90 ? "text-amber-600" : "text-slate-700"}`}>
                  {r.cobertura !== null ? r.cobertura.toFixed(0) : "—"}
                </td>
                <td className="text-right">{r.casos.length}</td>
                <td className="text-right font-bold text-teal-700">{r.incidencia.toFixed(1)}</td>
              </tr>
              {r.casos.map((c, i) => (
                <tr key={i} className="bg-slate-50">
                  <td colSpan={6} className="px-2 py-1.5">
                    <button
                      onClick={() => onOpenCaso && onOpenCaso(c.id, "cirugia")}
                      className="w-full text-left rounded-lg bg-white border border-slate-200 px-2.5 py-1.5 hover:border-teal-400"
                    >
                      <span className="text-xs font-bold text-slate-800">{c.nombre || "Sin nombre"}</span>
                      <span className="text-[11px] text-slate-500"> · {c.rut || "s/RUT"} · Cx {fmtDate(c.fechaProcedimiento)}</span>
                      <span className="text-[10px] text-teal-600 font-semibold float-right">Revisar ›</span>
                    </button>
                  </td>
                </tr>
              ))}
            </React.Fragment>
          ))}
        </tbody>
      </table>
      <p className="text-[10px] text-slate-400 mt-2">
        Cobertura = (vigilados ÷ realizados) × 100 · Incidencia = (IHO ÷ vigilados) × 100
      </p>
    </div>
  );
}

function IndicadoresView({ hospitalizaciones, cirugias = [], procedimientos = [], onOpenCaso, onQuitarFoco, onOpenAmbulatorio }) {
  const hoy = todayISO();
  const [anio, setAnio] = useState(hoy.slice(0, 4));
  const [cuatri, setCuatri] = useState(cuatriActual(hoy));
  const [diasCama, setDiasCama] = useState(() => cargarDiasCama(hoy.slice(0, 4), cuatriActual(hoy)));
  const [ituAbierto, setItuAbierto] = useState(null);

  const { desde, hasta } = rangoCuatrimestre(anio, cuatri);

  // Recargar días-cama al cambiar de período
  useEffect(() => {
    setDiasCama(cargarDiasCama(anio, cuatri));
  }, [anio, cuatri]);

  const setDiasCamaGrupo = (grupoKey, valor) => {
    const nuevo = { ...diasCama, [grupoKey]: valor };
    setDiasCama(nuevo);
    guardarDiasCama(anio, cuatri, nuevo);
  };

  // Tasas globales por 1.000 días-dispositivo
  const itsCvc = calcularTasa(hospitalizaciones, "cvc", desde, hasta);
  const navmi = calcularTasa(hospitalizaciones, "vmi", desde, hasta);
  const ituGlobal = calcularTasa(hospitalizaciones, "cup", desde, hasta);

  // ITU/CUP por servicio (como pide MINSAL)
  const ituPorServicio = SERVICIOS_ITU.map((s) => ({
    servicio: s,
    ...calcularTasa(hospitalizaciones, "cup", desde, hasta, s),
  }));

  // Tendencia mensual de cada foco dentro del cuatrimestre
  const meses = mesesDeCuatrimestre(anio, cuatri);
  const tendencia = meses.map((mIso) => {
    const d0 = primerDiaMes(mIso);
    const d1 = ultimoDiaMes(mIso);
    return {
      mes: nombreMes(mIso),
      itsCvc: calcularTasa(hospitalizaciones, "cvc", d0, d1).tasa,
      navmi: calcularTasa(hospitalizaciones, "vmi", d0, d1).tasa,
      itu: calcularTasa(hospitalizaciones, "cup", d0, d1).tasa,
    };
  });

  const arepiExport = AREPI_LIST.flatMap((a) => {
    const { porGrupo } = casosArepi(hospitalizaciones, a.key, desde, hasta);
    const gruposConCasos = GRUPOS_ETARIOS.filter((g) => porGrupo[g.key] > 0);
    const filas = gruposConCasos.length > 0 ? gruposConCasos : [GRUPOS_ETARIOS.find((g) => g.key === AREPI_GRUPO_DEFECTO[a.key])];
    return filas.map((g) => {
      const casos = porGrupo[g.key] || 0;
      const dc = diasCama[g.key] || "";
      return { label: `${a.label} (${g.label})`, casos, diasCama: dc, tasa: tasaArepi(casos, dc) };
    });
  });

  const cirugiasEnPeriodo = cirugias.filter((c) => c.fechaProcedimiento >= desde && c.fechaProcedimiento <= hasta);
  const totalCxExport = cargarTotalCx(anio, cuatri);
  const cirugiasExport = CIRUGIAS_TRAZADORAS.map((cx) => {
    const regs = cirugiasEnPeriodo.filter((c) => c.tipoProcedimiento === cx.key);
    const casos = regs.filter((c) => c.iaas === "SI").length;
    const realizados = parseInt(totalCxExport[cx.key], 10) || 0;
    return {
      label: cx.label,
      casos,
      vigilados: regs.length,
      realizados,
      cobertura: realizados > 0 ? (regs.length / realizados) * 100 : null,
      incidencia: regs.length > 0 ? (casos / regs.length) * 100 : 0,
    };
  }).filter((r) => r.vigilados > 0 || r.realizados > 0);

  const procExport = TIPOS_PROCEDIMIENTO_AMB.map((t) => {
    const regs = procedimientos.filter((p) => p.tipo === t.key);
    let dias = 0;
    regs.forEach((p) => {
      (p.periodos || []).forEach((per) => {
        const m = (per.mes || "") + "-01";
        if (m >= desde && m <= hasta) dias += parseInt(per.dias, 10) || 0;
      });
    });
    const casos = regs.filter((p) => p.its === "SI" && (p.fechaITS || "") >= desde && (p.fechaITS || "") <= hasta).length;
    return { label: t.indicador, casos, dias, indice: dias > 0 ? (casos / dias) * 1000 : 0 };
  }).filter((r) => r.dias > 0 || r.casos > 0);

  const exportar = () => exportarIndicadores({ anio, cuatri, desde, hasta, itsCvc, navmi, ituGlobal, ituPorServicio, tendencia, arepiExport, cirugiasExport, procExport });

  return (
    <div className="space-y-4">
      <div>
        <h1 className="text-lg font-bold text-slate-800">Indicadores IAAS</h1>
        <p className="text-xs text-slate-500">Tasas por 1.000 días-dispositivo · formato MINSAL</p>
      </div>

      {/* Selector de período */}
      <div className="flex items-center gap-2">
        <select value={anio} onChange={(e) => setAnio(e.target.value)} className="rounded-lg border border-slate-300 text-sm px-2 py-1.5">
          {aniosDisponibles(hospitalizaciones, hoy).map((a) => (
            <option key={a} value={a}>{a}</option>
          ))}
        </select>
        <select value={cuatri} onChange={(e) => setCuatri(parseInt(e.target.value, 10))} className="rounded-lg border border-slate-300 text-sm px-2 py-1.5">
          <option value={1}>1º cuatrimestre (ene–abr)</option>
          <option value={2}>2º cuatrimestre (may–ago)</option>
          <option value={3}>3º cuatrimestre (sep–dic)</option>
        </select>
      </div>

      {/* Tarjetas de tasa principal */}
      <div className="grid grid-cols-1 gap-2">
        <TasaCard titulo="ITS / CVC" subtitulo="Infección torrente sanguíneo asociada a CVC" data={itsCvc} focoKey="cvc" onOpenCaso={onOpenCaso} onQuitarFoco={onQuitarFoco} />
        <TasaCard titulo="NAVMI" subtitulo="Neumonía asociada a VMI" data={navmi} focoKey="vmi" onOpenCaso={onOpenCaso} onQuitarFoco={onQuitarFoco} />
        <TasaCard titulo="ITU / CUP (global)" subtitulo="Infección urinaria asociada a CUP" data={ituGlobal} focoKey="cup" onOpenCaso={onOpenCaso} onQuitarFoco={onQuitarFoco} />
      </div>

      {/* ITU/CUP por servicio */}
      <div className="rounded-xl border border-slate-200 bg-white p-3.5">
        <div className="font-bold text-sm text-slate-700 mb-2">ITU / CUP por servicio</div>
        <table className="w-full text-xs">
          <thead>
            <tr className="text-slate-500 border-b border-slate-200">
              <th className="text-left py-1">Servicio</th>
              <th className="text-right py-1">Casos</th>
              <th className="text-right py-1">Días CUP</th>
              <th className="text-right py-1">Tasa ‰</th>
            </tr>
          </thead>
          <tbody>
            {ituPorServicio.map((r) => (
              <React.Fragment key={r.servicio}>
                <tr
                  className={`border-b border-slate-100 ${r.casos > 0 ? "cursor-pointer" : ""}`}
                  onClick={() => r.casos > 0 && setItuAbierto(ituAbierto === r.servicio ? null : r.servicio)}
                >
                  <td className="py-1.5 font-semibold text-slate-700">
                    {r.servicio} {r.casos > 0 && <span className="text-teal-600">▾</span>}
                  </td>
                  <td className="text-right">{r.casos}</td>
                  <td className="text-right">{r.diasDip}</td>
                  <td className="text-right font-bold text-teal-700">{r.tasa.toFixed(2)}</td>
                </tr>
                {ituAbierto === r.servicio &&
                  (r.listaCasos || []).map((c, i) => (
                    <tr key={i} className="bg-slate-50">
                      <td colSpan={4} className="px-2 py-1.5">

/* Mini-gráfico de líneas SVG sin dependencias */
function TendenciaChart({ data }) {
  const W = 300, H = 130, pad = 24;
  const series = [
    { key: "itsCvc", color: "#0d9488", label: "ITS/CVC" },
    { key: "navmi", color: "#dc2626", label: "NAVMI" },
    { key: "itu", color: "#2563eb", label: "ITU/CUP" },
  ];
  const maxY = Math.max(1, ...data.flatMap((d) => series.map((s) => d[s.key])));
  const x = (i) => pad + (i * (W - pad * 2)) / Math.max(1, data.length - 1);
  const y = (v) => H - pad - (v / maxY) * (H - pad * 2);

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
        {/* ejes */}
        <line x1={pad} y1={H - pad} x2={W - pad} y2={H - pad} stroke="#e2e8f0" />
        <line x1={pad} y1={pad} x2={pad} y2={H - pad} stroke="#e2e8f0" />
        <text x={pad - 4} y={pad + 4} textAnchor="end" fontSize="8" fill="#94a3b8">{maxY.toFixed(1)}</text>
        <text x={pad - 4} y={H - pad} textAnchor="end" fontSize="8" fill="#94a3b8">0</text>
        {series.map((s) => {
          const pts = data.map((d, i) => `${x(i)},${y(d[s.key])}`).join(" ");
          return (
            <g key={s.key}>
              <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2" />
              {data.map((d, i) => (
                <circle key={i} cx={x(i)} cy={y(d[s.key])} r="2.5" fill={s.color} />
              ))}
            </g>
          );
        })}
        {data.map((d, i) => (
          <text key={i} x={x(i)} y={H - pad + 10} textAnchor="middle" fontSize="8" fill="#64748b">{d.mes}</text>
        ))}
      </svg>
      <div className="flex items-center justify-center gap-3 mt-1">
        {series.map((s) => (
          <span key={s.key} className="flex items-center gap-1 text-[10px] text-slate-500">
            <span className="w-2.5 h-2.5 rounded-full" style={{ background: s.color }} /> {s.label}
          </span>
        ))}
      </div>
    </div>
  );
}

/* Helpers de cuatrimestre */
function cuatriActual(iso) {
  const m = parseInt(iso.slice(5, 7), 10);
  return m <= 4 ? 1 : m <= 8 ? 2 : 3;
}
function rangoCuatrimestre(anio, c) {
  const inicio = { 1: "01", 2: "05", 3: "09" }[c];
  const finMes = { 1: "04", 2: "08", 3: "12" }[c];
  return { desde: `${anio}-${inicio}-01`, hasta: ultimoDiaMes(`${anio}-${finMes}`) };
}
function mesesDeCuatrimestre(anio, c) {
  const base = { 1: [1, 2, 3, 4], 2: [5, 6, 7, 8], 3: [9, 10, 11, 12] }[c];
  return base.map((m) => `${anio}-${String(m).padStart(2, "0")}`);
}
function ultimoDiaMes(iso) {
  const [y, m] = iso.split("-").map(Number);
  const d = new Date(y, m, 0).getDate();
  return `${iso}-${String(d).padStart(2, "0")}`;
}
function aniosDisponibles(hosp, hoy) {
  const set = new Set([hoy.slice(0, 4)]);
  hosp.forEach((h) => { if (h.fechaHospitalizacion) set.add(h.fechaHospitalizacion.slice(0, 4)); });
  return [...set].sort().reverse();
}

function exportarIndicadores({ anio, cuatri, desde, hasta, itsCvc, navmi, ituGlobal, ituPorServicio, tendencia, arepiExport, cirugiasExport, procExport }) {
  const lineas = [];
  lineas.push(`Indicadores IAAS - HDC Calama`);
  lineas.push(`Periodo,${anio} cuatrimestre ${cuatri},${desde} a ${hasta}`);
  lineas.push("");
  lineas.push("Indicador,Casos,Dias-dispositivo,Tasa x1000");
  lineas.push(`ITS/CVC,${itsCvc.casos},${itsCvc.diasDip},${itsCvc.tasa.toFixed(2)}`);
  lineas.push(`NAVMI,${navmi.casos},${navmi.diasDip},${navmi.tasa.toFixed(2)}`);
  lineas.push(`ITU/CUP global,${ituGlobal.casos},${ituGlobal.diasDip},${ituGlobal.tasa.toFixed(2)}`);
  lineas.push("");
  lineas.push("ITU/CUP por servicio,Casos,Dias-CUP,Tasa x1000");
  ituPorServicio.forEach((r) => lineas.push(`${r.servicio},${r.casos},${r.diasDip},${r.tasa.toFixed(2)}`));
  lineas.push("");
  lineas.push("AREpi,Casos,Dias-cama,Tasa x1000");
  (arepiExport || []).forEach((r) =>
    lineas.push(`${r.label.replace(/,/g, ";")},${r.casos},${r.diasCama || ""},${r.diasCama ? r.tasa.toFixed(2) : ""}`)
  );
  lineas.push("");
  lineas.push("Tendencia mensual,ITS/CVC,NAVMI,ITU/CUP");
  tendencia.forEach((t) => lineas.push(`${t.mes},${t.itsCvc.toFixed(2)},${t.navmi.toFixed(2)},${t.itu.toFixed(2)}`));

  if (cirugiasExport && cirugiasExport.length > 0) {
    lineas.push("");
    lineas.push("Cirugias/procedimientos,Vigilados,Realizados,Cobertura x100,IAAS,Incidencia x100");
    cirugiasExport.forEach((r) =>
      lineas.push(`${r.label.replace(/,/g, ";")},${r.vigilados},${r.realizados || ""},${r.cobertura !== null ? r.cobertura.toFixed(0) : ""},${r.casos},${r.incidencia.toFixed(1)}`)
    );
  }

  if (procExport && procExport.length > 0) {
    lineas.push("");
    lineas.push("Procedimientos ambulatorios,ITS,Dias/procedimiento,Indice x1000");
    procExport.forEach((r) => lineas.push(`${r.label.replace(/,/g, ";")},${r.casos},${r.dias},${r.indice.toFixed(2)}`));
  }

  const blob = new Blob(["\uFEFF" + lineas.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Indicadores_IAAS_${anio}_C${cuatri}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function ElementoToggle({ texto, estado, fecha, onChange }) {
  return (
    <div className="rounded-lg border border-slate-200 px-3 py-2">
      <div className="flex items-start justify-between gap-2">
        <span className="text-sm text-slate-700 flex-1">{texto}</span>
        <div className="flex gap-1 shrink-0">
          <button
            type="button"
            onClick={() => onChange({ estado: "no_presenta", fecha: "" })}
            className={`text-[11px] rounded-full px-2 py-1 border font-semibold ${
              estado === "no_presenta" ? "bg-emerald-600 text-white border-emerald-600" : "border-slate-300 text-slate-500"
            }`}
          >
            No presenta
          </button>
          <button
            type="button"
            onClick={() => onChange({ estado: "presente", fecha: fecha || todayISO() })}
            className={`text-[11px] rounded-full px-2 py-1 border font-semibold ${
              estado === "presente" ? "bg-rose-600 text-white border-rose-600" : "border-slate-300 text-slate-500"
            }`}
          >
            Presente
          </button>
        </div>
      </div>
      {estado === "presente" && (
        <div className="mt-1.5 flex items-center gap-1.5">
          <span className="text-[11px] text-slate-500">Fecha del elemento:</span>
          <input
            type="date"
            value={fecha}
            onChange={(e) => onChange({ estado: "presente", fecha: e.target.value })}
            className="text-xs rounded-md border border-slate-300 px-2 py-1"
          />
        </div>
      )}
      {estado === "no_revisado" && <span className="text-[10px] text-amber-600 mt-1 inline-block">Sin revisar</span>}
    </div>
  );
}

function GrupoElementos({ grupo, estados, onToggle, hospitalizacion }) {
  const visibles = grupo.elementos.filter(
    (el) => !ELEMENTOS_COMPARTIDOS_IDS.includes(el.id) && elementoAplicable(el.id, hospitalizacion)
  );
  if (visibles.length === 0) return null;
  return (
    <div className="space-y-1.5">
      <p className="text-[11px] font-semibold uppercase tracking-wide text-slate-500">{grupo.titulo}</p>
      <div className="space-y-1.5">
        {visibles.map((el) => (
          <ElementoToggle
            key={el.id}
            texto={el.texto}
            estado={estados[el.id]?.estado || "no_revisado"}
            fecha={estados[el.id]?.fecha || ""}
            onChange={(patch) => onToggle(el.id, patch)}
          />
        ))}
      </div>
    </div>
  );
}

function CriteriosFocoSection({ focoKey, estados, onUpdate, hospitalizacion }) {
  const foco = CRITERIOS_FOCOS[focoKey];
  const idsVisibles = gruposDeFoco(foco)
    .flatMap((g) => foco[g].elementos)
    .filter((el) => !ELEMENTOS_COMPARTIDOS_IDS.includes(el.id) && elementoAplicable(el.id, hospitalizacion))
    .map((el) => el.id);
  const sinRevisar = idsVisibles.filter((id) => (estados[id]?.estado || "no_revisado") === "no_revisado").length;
  return (
    <SectionCard icon={FileWarning} title={`Elementos IAAS — ${foco.label}`} subtitle={foco.foco}>
      {sinRevisar > 0 && (
        <p className="text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5">
          {sinRevisar} elemento(s) sin revisar en esta visita.
        </p>
      )}
      {gruposDeFoco(foco).map((g) => (
        <GrupoElementos
          key={g}
          grupo={foco[g]}
          estados={estados}
          hospitalizacion={hospitalizacion}
          onToggle={(id, patch) => onUpdate({ ...estados, [id]: { ...estados[id], ...patch } })}
        />
      ))}
    </SectionCard>
  );
}

function SeccionSignosGenerales({ estados, onUpdate, hospitalizacion }) {
  return (
    <SectionCard
      icon={AlertTriangle}
      title="Signos generales (inespecíficos)"
      subtitle="Hallazgos del paciente, no atados a ningún dispositivo. Marca los presentes con su fecha; orientan la búsqueda."
    >
      <div className="space-y-1.5">
        {ELEMENTOS_COMPARTIDOS_IDS.map((id) => (
          <ElementoToggle
            key={id}
            texto={ELEMENTOS_COMPARTIDOS[id].texto}
            estado={estados[id]?.estado || "no_revisado"}
            fecha={estados[id]?.fecha || ""}
            onChange={(patch) => onUpdate({ ...estados, [id]: { ...estados[id], ...patch } })}
          />
        ))}
      </div>
    </SectionCard>
  );
}

function EvolucionForm({ hospitalizacion, evolucionInicial, onCancel, onSave }) {
  const editando = !!evolucionInicial;
  const [ev, setEv] = useState(() => evolucionInicial || emptyEvolucion());
  const [criterios, setCriterios] = useState(() => ensureCriteriosIAAS(hospitalizacion));
  const [errorFechas, setErrorFechas] = useState([]);

  const setSintoma = (key, patch) =>
    setEv((e) => ({ ...e, sintomas: { ...e.sintomas, [key]: { ...e.sintomas[key], ...patch } } }));

  const validar = () => {
    const faltantes = SINTOMAS.filter((s) => ev.sintomas[s.key].presente && !ev.sintomas[s.key].fecha).map((s) => s.label);
    setErrorFechas(faltantes);
    return faltantes.length === 0;
  };

  const guardar = () => {
    if (!validar()) return;
    onSave({ ...ev, criteriosRevisados: criterios }, criterios);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onCancel} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <ArrowLeft size={18} />
        </button>
        <div>
          <h1 className="text-lg font-bold text-slate-800">{editando ? "Editar visita" : "Registrar visita"}</h1>
          <p className="text-xs text-slate-500">{hospitalizacion.nombre}</p>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <Field label="Fecha de la visita">
          <TextInput type="date" value={ev.fecha} onChange={(e) => setEv({ ...ev, fecha: e.target.value })} />
        </Field>
        <Field label="Ubicación (servicio/cama)">
          <TextInput
            value={ev.ubicacion || ""}
            onChange={(e) => setEv({ ...ev, ubicacion: e.target.value })}
            placeholder={hospitalizacion.servicio ? `Ej: ${hospitalizacion.servicio}-3` : "Ej: UCI-3"}
          />
        </Field>
      </div>

      {Object.keys(criterios).length > 0 && (
        <div className="space-y-3">
          {criterios.compartidos && (
            <SeccionSignosGenerales
              estados={criterios.compartidos}
              onUpdate={(next) => setCriterios((c) => ({ ...c, compartidos: next }))}
              hospitalizacion={hospitalizacion}
            />
          )}
          {Object.keys(criterios)
            .filter((k) => k !== "compartidos")
            .map((focoKey) => (
              <CriteriosFocoSection
                key={focoKey}
                focoKey={focoKey}
                estados={criterios[focoKey]}
                hospitalizacion={hospitalizacion}
                onUpdate={(next) => setCriterios((c) => ({ ...c, [focoKey]: next }))}
              />
            ))}
        </div>
      )}

      {hospitalizacion.dip?.vmi?.instalado && !hospitalizacion.dip?.vmi?.fechaRetiro && (
        <SectionCard icon={Wind} title="Parámetros VMI del día" defaultOpen={false}>
          <p className="text-[11px] text-slate-500 mb-2">
            Registra los parámetros ventilatorios de esta visita. Al imprimir la ficha verás los de los últimos días en columnas,
            para seguir la tendencia (útil en la vigilancia de NAVMI).
          </p>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Modo ventilatorio">
              <TextInput
                value={ev.vmiParam?.modo || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, modo: e.target.value } })}
                placeholder="Ej: VC, PC, SIMV"
              />
            </Field>
            <Field label="FiO₂ (%)">
              <TextInput
                value={ev.vmiParam?.fio2 || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, fio2: e.target.value } })}
              />
            </Field>
            <Field label="PEEP (cmH₂O)">
              <TextInput
                value={ev.vmiParam?.peep || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, peep: e.target.value } })}

            <Field label="Volumen corriente (mL)">
              <TextInput

                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, volumen: e.target.value } })}

            </Field>
          </div>
          <Field label="Secreciones (aspecto/cantidad)">
            <TextInput
              value={ev.vmiParam?.secreciones || ""}
              onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, secreciones: e.target.value } })}
              placeholder="Ej: purulentas abundantes"
            />
          </Field>
        </SectionCard>
      )}

      <SectionCard icon={Droplet} title="Exámenes de laboratorio" defaultOpen={false}>
        <Field label="Fecha de toma de muestra (si difiere de la visita)">

                      </label>
                      <button
                        onClick={() => setEv({ ...ev, hemocultivos: ev.hemocultivos.filter((_, j) => j !== i) })}

                        Quitar

                    </div>

              })}

        <div className="space-y-2.5">
          {CULTIVOS.map((c) => (
            <div key={c.key}>
              <div className="flex gap-2 items-start">
                <div className="flex-1">
                  <Field label={c.label}>
                    <TextInput
                      value={ev.cultivos[c.key].resultado}
                      onChange={(e) =>
                        setEv({ ...ev, cultivos: { ...ev.cultivos, [c.key]: { ...ev.cultivos[c.key], resultado: e.target.value } } })

function ResumenSintomasEvolucion({ ev }) {
  const activos = SINTOMAS.filter((s) => ev.sintomas[s.key]?.presente);
  const examenesLlenos = EXAMENES.filter((e) => ev.examenes[e.key]);
  const elementosPresentes = [];
  const compartidosVistos = new Set();
  Object.keys(ev.criteriosRevisados || {})
    .filter((k) => k !== "compartidos")
    .forEach((focoKey) => {
      const foco = CRITERIOS_FOCOS[focoKey];
      if (!foco) return;
      const estados = ev.criteriosRevisados[focoKey];
      const compartidos = ev.criteriosRevisados.compartidos || {};
      gruposDeFoco(foco).forEach((g) => {
        foco[g].elementos.forEach((el) => {
          const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
          const estado = esCompartido ? compartidos[el.id] : estados[el.id];
          if (estado?.estado !== "presente") return;
          if (esCompartido) {
            if (compartidosVistos.has(el.id)) return;
            compartidosVistos.add(el.id);
            elementosPresentes.push({ key: `compartido-${el.id}`, texto: el.texto, fecha: estado.fecha });
          } else {
            elementosPresentes.push({ key: `${focoKey}-${el.id}`, texto: `${foco.label}: ${el.texto}`, fecha: estado.fecha });
          }
        });
      });
    });
  return (
    <div className="space-y-1.5">
      {elementosPresentes.length > 0 && (
        <div className="flex flex-wrap gap-1">
          {elementosPresentes.map((e) => (
            <span key={e.key} className="text-[10px] font-bold bg-rose-50 text-rose-700 border border-rose-200 rounded px-1.5 py-0.5">
              {e.texto} · {fmtDate(e.fecha)}
            </span>
          ))}
        </div>
      )}
      {activos.length > 0 && (
        <div className="flex flex-wrap gap-1">
          {activos.map((s) => (
            <span key={s.key} className="text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-200 rounded px-1.5 py-0.5">
              {s.label} · {fmtDate(ev.sintomas[s.key].fecha)}
            </span>
          ))}
        </div>
      )}
      {examenesLlenos.length > 0 && (
        <div className="text-xs text-slate-600">
          {examenesLlenos.map((e) => `${e.label} ${ev.examenes[e.key]}`).join(" · ")}
          {ev.fechaExamenes ? ` (muestra ${fmtDate(ev.fechaExamenes)})` : ""}
        </div>
      )}
      {(ev.hemocultivos || []).length > 0 && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Hemocultivos:</span>{" "}
          {ev.hemocultivos
            .map((hc) => {
              const origen = hc.origen === "arrastre" ? "arrastre" : hc.origen === "punta" ? "punta cat." : "perif.";
              const res = hc.pendiente ? "(p)" : hc.resultado || "—";
              return `${res} [${origen}${hc.fecha ? ` ${fmtDate(hc.fecha)}` : ""}]`;
            })
            .join(" · ")}
        </div>
      )}
      {CULTIVOS.filter((c) => ev.cultivos[c.key]?.resultado || ev.cultivos[c.key]?.pendiente).length > 0 && (
        <div className="text-xs text-slate-600">
          {CULTIVOS.filter((c) => ev.cultivos[c.key]?.resultado || ev.cultivos[c.key]?.pendiente)
            .map((c) => {
              const cu = ev.cultivos[c.key];
              return `${c.label}: ${cu.pendiente ? "(p)" : cu.resultado}${cu.fecha ? ` (${fmtDate(cu.fecha)})` : ""}`;
            })
            .join(" · ")}
        </div>
      )}
      {ev.imagenes?.torax && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Img. tórax:</span> {ev.imagenes.torax}
        </div>
      )}
      {ev.imagenes?.otros && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Otras imágenes:</span> {ev.imagenes.otros}
        </div>
      )}
      {ev.antibioticos && <div className="text-xs text-slate-600">ATB: {ev.antibioticos}</div>}
      {ev.comentario && <div className="text-xs text-slate-500 italic">"{ev.comentario}"</div>}
      {elementosPresentes.length === 0 && activos.length === 0 && examenesLlenos.length === 0 && (ev.hemocultivos || []).length === 0 && !ev.imagenes?.torax && !ev.imagenes?.otros && !ev.antibioticos && !ev.comentario && (
        <div className="text-xs text-slate-400">Visita sin hallazgos relevantes registrados.</div>
      )}
    </div>
  );
}

/* Rellena campos faltantes de una notificación guardada con versión anterior,
   para que el formulario no falle al acceder a estructuras que no existían. */
function normalizarNotificacion(notif, h) {
  const base = newNotificacion(h);
  const out = { ...base, ...notif };
  // Asegurar estructuras de focos DIP
  out.dip = out.dip || {};
  Object.keys(CRITERIOS_FOCOS).forEach((key) => {
    out.dip[key] = { siNo: "", diasCalendario: "", criteriosMarcados: [], mo: "", ...(out.dip[key] || {}) };
    if (!Array.isArray(out.dip[key].criteriosMarcados)) out.dip[key].criteriosMarcados = [];
  });
  // Asegurar cirugías
  out.cirugias = out.cirugias || {};
  CIRUGIAS_TRAZADORAS.forEach((c) => {
    out.cirugias[c.key] = { siNo: "", fecha: "", mo: "", criteriosMarcados: [], ...(out.cirugias[c.key] || {}) };
    if (!Array.isArray(out.cirugias[c.key].criteriosMarcados)) out.cirugias[c.key].criteriosMarcados = [];
  });
  // Asegurar AREpi
  out.arepi = out.arepi || {};
  AREPI_LIST.forEach((a) => {
    out.arepi[a.key] = { siNo: "", fechaInicioSintomas: "", servicio: "", criteriosMarcados: [], cultivoConfirmacion: "", ...(out.arepi[a.key] || {}) };
    if (!Array.isArray(out.arepi[a.key].criteriosMarcados)) out.arepi[a.key].criteriosMarcados = [];
  });
  return out;
}

/* Tarjeta de notificación IAAS reutilizable para registros de cirugía y ambulatorio.
   Permite crear/editar la notificación oficial, ver su aval e imprimirla. */
function NotificacionRegistroCard({ registro, onChange }) {
  const [editando, setEditando] = useState(null); // notificación en edición
  const [creando, setCreando] = useState(false);
  const [imprimiendo, setImprimiendo] = useState(null);

  const hAdapt = registroComoHospitalizacion(registro);
  const notifs = registro.notificaciones || [];

  const guardar = (n) => {
    const existe = notifs.some((x) => x.id === n.id);
    const lista = existe ? notifs.map((x) => (x.id === n.id ? n : x)) : [...notifs, n];
    onChange({ ...registro, notificaciones: lista, updatedAt: new Date().toISOString() });
    setEditando(null);
    setCreando(false);
  };

  if (creando || editando) {
    return (
      <NotificacionForm
        hospitalizacion={hAdapt}
        notificacion={editando}
        onCancel={() => {
          setCreando(false);
          setEditando(null);
        }}
        onSave={guardar}
      />
    );
  }

  return (
    <>
      <SectionCard icon={FileWarning} title="Notificación IAAS" defaultOpen={notifs.length > 0}>
        <p className="text-[11px] text-slate-500 mb-2">
          Confirmado el caso, confecciona la ficha oficial de notificación con sus criterios y el aval del médico IAAS.
        </p>
        {notifs.length === 0 ? (
          <p className="text-[11px] text-slate-400 mb-2">Sin notificación registrada.</p>
        ) : (
          <div className="space-y-1.5 mb-2">
            {notifs.map((n) => (
              <div key={n.id} className="rounded-lg border border-slate-200 px-3 py-2">
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <div className="text-xs font-bold text-slate-700">{fmtDate(n.fechaNotificacion)}</div>
                    <div className="text-xs text-slate-500 truncate">{n.diagnosticoIAAS || "Sin diagnóstico IAAS"}</div>
                  </div>
                  <div className="flex flex-col items-end gap-1 shrink-0">
                    <Pill tone={n.confirmacion === "SI" ? "red" : n.confirmacion === "NO" ? "green" : "amber"}>
                      {n.confirmacion || "Pendiente"}
                    </Pill>
                    {n.confirmacion &&
                      (n.avalMedico ? (
                        <span className="text-[9px] font-semibold text-emerald-600">✓ aval médico</span>
                      ) : (
                        <span className="text-[9px] font-semibold text-amber-600">falta aval</span>
                      ))}
                  </div>
                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={() => setEditando(n)} className="text-xs font-semibold text-teal-700 hover:underline">
                    Editar
                  </button>

                    Ver / Imprimir
                  </button>
                </div>
              </div>
            ))}

        )}

          className="w-full rounded-lg border border-dashed border-slate-300 text-slate-500 text-xs font-semibold py-2 hover:border-teal-400 hover:text-teal-700"
        >
          + Nueva notificación IAAS
        </button>
      </SectionCard>

      {imprimiendo && (
        <NotificacionPrintView notificacion={imprimiendo} hospitalizacion={hAdapt} onClose={() => setImprimiendo(null)} />
      )}
    </>
  );
}

/* Estilos comunes para las tablas oficiales del PDF de notificación */
const OFI = {
  header: { background: "#f5d9c8" },
  th: "border border-slate-500 px-1.5 py-1 text-center font-bold",
  td: "border border-slate-400 px-1.5 py-0.5",
  cellChk: "border border-slate-400 px-1 py-0.5 text-center",
};

/* Marca ✓ si un criterio (por texto) está presente en criteriosMarcados */
function tieneCriterio(marcados, texto) {
  return (marcados || []).some((m) => m.toLowerCase().includes(texto.toLowerCase().slice(0, 12)));
}

/* Fila de dos criterios lado a lado (como el formato oficial) */
function FilaCriterios2({ izq, der, marcados }) {
  return (
    <tr>
      <td className={OFI.td}>{izq}</td>
      <td className={OFI.cellChk} style={{ width: "24px" }}>{izq && tieneCriterio(marcados, izq) ? "✓" : ""}</td>
      <td className={OFI.td}>{der || ""}</td>
      <td className={OFI.cellChk} style={{ width: "24px" }}>{der && tieneCriterio(marcados, der) ? "✓" : ""}</td>
    </tr>
  );
}

function TablaFactoresDIP({ n }) {
  const filas = {
    cup: [["Fiebre", "Leucocituria"], ["Sint. irritativo vesical", "Placa pus"], ["Dolor costo vertebral", "Piocitos"], ["Alteración estado conciencia en AM", ""]],
    cvc: [["Taquicardia o bradicardia", "Fiebre o hipotermia"], ["Apnea menor de 1 año", "Hipotensión"], ["Eritema y exudado sitio inserción CVC", ""]],
    vmi: [["Fiebre", "Infiltrado"], ["Leucocitosis o leucopenia", "condensación"], ["Deterioro intercambio gaseoso", "Cavitación"], ["Expect. purulenta o aumento aspiración de secreciones", "Hemoptisis"]],
  };
  const labels = { cup: "CUP", cvc: "CVC", vmi: "VMI" };
  return (
    <div className="mb-3">
      <table className="w-full border-collapse text-[11px]">
        <thead>
          <tr style={OFI.header}>
            <th className={OFI.th} colSpan={6} style={{ textAlign: "left" }}>Factores de riesgo asociados a DIP</th>
          </tr>
          <tr style={OFI.header}>
            <th className={OFI.th}>DIP</th>
            <th className={OFI.th}>SI/NO</th>
            <th className={OFI.th}>Días calend.</th>
            <th className={OFI.th} colSpan={2}>Criterios confirmación</th>
            <th className={OFI.th}>MO</th>
          </tr>
        </thead>
        <tbody>
          {["cup", "cvc", "vmi"].map((key) => {
            const v = n.dip[key] || {};
            const fs = filas[key];
            return fs.map((par, idx) => (
              <tr key={key + idx}>
                {idx === 0 && (
                  <>
                    <td className={OFI.td + " font-bold text-center"} rowSpan={fs.length} style={{ background: "#f5d9c8" }}>{labels[key]}</td>
                    <td className={OFI.cellChk + " font-bold"} rowSpan={fs.length}>{v.siNo || ""}</td>
                    <td className={OFI.cellChk} rowSpan={fs.length}>{v.diasCalendario || ""}</td>
                  </>
                )}
                <td className={OFI.td}>{par[0]}</td>
                <td className={OFI.cellChk} style={{ width: "22px" }}>{par[0] && tieneCriterio(v.criteriosMarcados, par[0]) ? "✓" : ""}</td>
                {idx === 0 ? (
                  <td className={OFI.td} rowSpan={fs.length}>{v.mo || ""}</td>
                ) : null}
                {idx === 0 ? null : null}
              </tr>
            ));
          })}
        </tbody>
      </table>
    </div>
  );
}

/* Matriz horizontal: fechas en columnas, parámetros en filas (para el PDF) */
const DIAS_POR_PAGINA = 4;

function MatrizEvolucionHorizontal({ evoluciones }) {
  const todas = [...evoluciones].sort((a, b) => (a.fecha < b.fecha ? -1 : 1));
  if (todas.length === 0) return <div className="text-xs text-slate-500">Sin visitas registradas.</div>;

  const bloques = [];
  for (let i = 0; i < todas.length; i += DIAS_POR_PAGINA) bloques.push(todas.slice(i, i + DIAS_POR_PAGINA));

  return (
    <div>
      {bloques.map((bloque, idx) => (
        <div key={idx} className={idx < bloques.length - 1 ? "bloque-matriz" : ""}>
          {bloques.length > 1 && (
            <div className="text-[10px] text-slate-400 mb-1">
              Visitas {idx * DIAS_POR_PAGINA + 1}–{idx * DIAS_POR_PAGINA + bloque.length} de {todas.length}
            </div>
          )}
          <MatrizBloque evs={bloque} />
        </div>
      ))}
    </div>
  );
}

  const rowLabel = "border border-slate-300 px-1.5 py-1 font-semibold bg-slate-50 whitespace-nowrap text-left";

  return (
    <div className="overflow-x-auto">
      <table className="border-collapse text-[10px] w-full" style={{ tableLayout: "fixed" }}>
        <thead>
          <tr>

              <th key={ev.id} className={th}>{fmtDate(ev.fecha)}</th>

        <tbody>
          {EXAMENES.map((ex) => (

          ))}

            <tr>
              <td className={rowLabel}>Ubicación</td>
              {evs.map((ev) => (
                <td key={ev.id} className={cell}>{ev.ubicacion || "—"}</td>
              ))}
            </tr>
          )}
          {evs.some((ev) => ev.fechaExamenes) && (
            <tr>
              <td className={rowLabel}>Fecha muestra (labs)</td>

                <td key={ev.id} className={cell}>{ev.fechaExamenes ? fmtDate(ev.fechaExamenes) : "—"}</td>
              ))}
            </tr>

          {evs.some((ev) => (ev.hemocultivos || []).length > 0) && (

                    ? ev.hemocultivos
                        .map((hc) => {
                          const o = hc.origen === "arrastre" ? "arr." : hc.origen === "punta" ? "punta" : "perif.";
                          return `${hc.pendiente ? "(p)" : hc.resultado || "—"} [${o}${hc.fecha ? " " + fmtDate(hc.fecha) : ""}]`;
