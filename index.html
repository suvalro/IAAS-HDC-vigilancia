/* Oculta identificación para proyectar en el Comité: "Rosa Díaz" -> "R.D." */
function anonimo(nombre) {
  if (!nombre) return "—";
  return nombre
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map((p) => (p[0] || "").toUpperCase() + ".")
    .join(" ");
}

/* Riesgo por servicio calculado con reglas explícitas y auditables.
   No es un modelo predictivo: es un semáforo con causas verificables. */
function riesgoServicio(hospitalizaciones, servicio, desde, hasta) {
  const activos = hospitalizaciones.filter((h) => h.estado === "activo" && h.servicio === servicio);
  let alertasAltas = 0;
  let alertasMedias = 0;
  const motivos = [];

  activos.forEach((h) => {
    alertasDePaciente(h).forEach((a) => {
      if (a.nivel === "alta") alertasAltas += 1;
      else alertasMedias += 1;
    });
  });

  // Casos IAAS confirmados del período en este servicio
  let casos = 0;
  hospitalizaciones.forEach((h) => {
    (h.notificaciones || []).forEach((n) => {
      if (n.confirmacion !== "SI") return;
      const f = n.fechaIAAS || n.fechaNotificacion || "";
      if (f < desde || f > hasta) return;
      if (servicioEnFecha(h, f) !== servicio) return;
      casos += 1;
    });
  });

  // Dispositivos con permanencia prolongada
  let prolongados = 0;
  activos.forEach((h) => {
    DISPOSITIVOS.forEach((d) => {
      if (!focoInstalado(h, d.key)) return;
      const dias = focoDiasTotal(h, d.key);
      const umbral = d.key === "vmi" ? 5 : 7;
      if (dias >= umbral) prolongados += 1;
    });
  });

  if (casos > 0) motivos.push(`${casos} IAAS confirmada(s) en el período`);
  if (prolongados > 0) motivos.push(`${prolongados} dispositivo(s) de permanencia prolongada`);
  if (alertasAltas > 0) motivos.push(`${alertasAltas} alerta(s) de criterios a revisar`);
  if (motivos.length === 0 && activos.length > 0) motivos.push("Sin hallazgos pendientes");

  let nivel = "bajo";
  if (casos > 0 || alertasAltas >= 2 || prolongados >= 2) nivel = "alto";
  else if (alertasAltas === 1 || prolongados === 1 || alertasMedias >= 2) nivel = "medio";

  return { servicio, nivel, casos, prolongados, alertasAltas, alertasMedias, pacientes: activos.length, motivos };
}

function DashboardView({ hospitalizaciones, cirugias, procedimientos, anio, cuatri, onIrA, onOpenPaciente }) {
  const [oculto, setOculto] = useState(false);
  const [presentacion, setPresentacion] = useState(false);
  const { desde, hasta } = rangoCuatrimestre(anio, cuatri);

  const togglePresentacion = () => {
    const entrando = !presentacion;
    setPresentacion(entrando);
    try {
      const el = document.documentElement;
      if (entrando && el.requestFullscreen) el.requestFullscreen().catch(() => {});
      else if (!entrando && document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
    } catch (e) {}
  };

  // Si el usuario sale de pantalla completa con Esc, se refleja en el botón
  useEffect(() => {
    const onFs = () => {
      if (!document.fullscreenElement) setPresentacion(false);
    };
    document.addEventListener("fullscreenchange", onFs);
    return () => document.removeEventListener("fullscreenchange", onFs);
  }, []);

  const activos = hospitalizaciones.filter((h) => h.estado === "activo");
  const pendientes = notificacionesPendientes(hospitalizaciones);
  const cxVigilancia = cirugias.filter((c) => (c.estado || "activo") === "activo");
  const cxPorRevisar = cxVigilancia.filter((c) => plazoCirugia(c).cumplido);

  // Alertas consolidadas de todo el hospital
  const alertas = [];
  activos.forEach((h) => {
    alertasDePaciente(h).forEach((a) => {
      alertas.push({
        nivel: a.nivel,
        titulo: a.texto,
        detalle: `${oculto ? anonimo(h.nombre) : h.nombre} · ${h.servicio}`,
        id: h.id,
        tipo: "paciente",
      });
    });
  });
  cxPorRevisar.forEach((c) => {
    const pz = plazoCirugia(c);
    alertas.push({
      nivel: "media",
      titulo: `Cirugía cumplió ${pz.requeridos} días — revisar y dar alta`,
      detalle: oculto ? anonimo(c.nombre) : c.nombre,
      tipo: "cirugia",
    });
  });
  pendientes.forEach((p) => {
    alertas.push({
      nivel: p.tipo === "sin_aval" ? "media" : "alta",
      titulo: p.tipo === "sin_aval" ? "Notificación pendiente de aval médico" : "Notificación sin resolver",
      detalle: `${oculto ? anonimo(p.h.nombre) : p.h.nombre} · ${p.h.servicio}`,
      id: p.h.id,
      tipo: "paciente",
    });
  });
  const orden = { alta: 0, media: 1, baja: 2 };
  alertas.sort((a, b) => (orden[a.nivel] ?? 3) - (orden[b.nivel] ?? 3));

  // Tasas del cuatrimestre
  const its = calcularTasa(hospitalizaciones, "cvc", desde, hasta);
  const itu = calcularTasa(hospitalizaciones, "cup", desde, hasta);
  const nav = calcularTasa(hospitalizaciones, "vmi", desde, hasta);
  const iaasTotal = its.casos + itu.casos + nav.casos;
  const diasTotales = its.diasDip + itu.diasDip + nav.diasDip;

  // Cobertura quirúrgica del período
  const totalCx = cargarTotalCx(anio, cuatri);
  const cxPeriodo = cirugias.filter((c) => c.fechaProcedimiento >= desde && c.fechaProcedimiento <= hasta);
  const realizadosTot = CIRUGIAS_TRAZADORAS.reduce((sum, cx) => sum + (parseInt(totalCx[cx.key], 10) || 0), 0);
  const cobertura = realizadosTot > 0 ? (cxPeriodo.length / realizadosTot) * 100 : null;

  const riesgos = SERVICIOS.map((sv) => riesgoServicio(hospitalizaciones, sv, desde, hasta)).filter((r) => r.pacientes > 0);

  const tonoRiesgo = {
    alto: "bg-rose-100 border-rose-300 text-rose-800",
    medio: "bg-amber-100 border-amber-300 text-amber-800",
    bajo: "bg-emerald-100 border-emerald-300 text-emerald-800",
  };
  const puntoRiesgo = { alto: "bg-rose-500", medio: "bg-amber-500", bajo: "bg-emerald-500" };

  const TONOS = {
    slate: "text-slate-700",
    teal: "text-teal-700",
    rose: "text-rose-600",
    amber: "text-amber-600",
    sky: "text-sky-700",
  };
  const Tarjeta = ({ titulo, valor, sub, tono = "slate", onClick }) => (
    <button
      onClick={onClick}
      disabled={!onClick}
      className={`rounded-xl border border-slate-200 bg-white p-3 text-left ${onClick ? "hover:border-teal-400" : ""}`}
    >
      <div className="text-[11px] font-semibold text-slate-500">{titulo}</div>
      <div className={`font-bold leading-tight mt-0.5 dash-num ${TONOS[tono] || TONOS.slate}`}>{valor}</div>
      {sub && <div className="text-[10px] text-slate-400 mt-0.5">{sub}</div>}
    </button>
  );

  return (
    <div className={presentacion ? "dash-presenta space-y-4" : "space-y-4"}>
      <div className="flex items-start justify-between gap-2">
        <div>
          <h1 className="text-lg font-bold text-slate-800">Panel de vigilancia IAAS</h1>
          <p className="text-xs text-slate-500">
            {anio} · {cuatri}º cuatrimestre · actualizado {fmtDate(todayISO())}
          </p>
        </div>
        <div className="flex gap-1.5 shrink-0">
          <button
            onClick={() => setOculto((v) => !v)}
            className={`rounded-lg border px-2.5 py-1.5 text-[11px] font-semibold flex items-center gap-1 ${
              oculto ? "bg-slate-700 text-white border-slate-700" : "border-slate-300 text-slate-600"
            }`}
            title="Ocultar nombres y RUT para proyectar"
          >
            {oculto ? <EyeOff size={13} /> : <Eye size={13} />}
            {oculto ? "Oculto" : "Datos"}
          </button>
          <button
            onClick={togglePresentacion}
            className={`rounded-lg border px-2.5 py-1.5 text-[11px] font-semibold flex items-center gap-1 ${
              presentacion ? "bg-teal-700 text-white border-teal-700" : "border-slate-300 text-slate-600"
            }`}
          >
            <Maximize size={13} />
            {presentacion ? "Salir" : "Proyectar"}
          </button>
        </div>
      </div>

      {presentacion && (
        <p className="text-[11px] text-slate-500 -mt-2">
          Modo presentación activo. {oculto ? "Identificación oculta." : "Considera activar \u201cOculto\u201d antes de proyectar."}
        </p>
      )}

      {/* 1. Resumen institucional */}
      <div>
        <div className="text-xs font-bold text-slate-600 uppercase tracking-wide mb-1.5">Resumen institucional</div>
        <div className="grid grid-cols-2 gap-2 dash-grid-4">
          <Tarjeta titulo="Pacientes en vigilancia" valor={activos.length} sub={`${hospitalizaciones.filter((h) => h.modoVigilancia === "pasiva" && h.estado === "activo").length} en modo pasivo`} tono="teal" onClick={() => onIrA("censo")} />
          <Tarjeta titulo="IAAS confirmadas" valor={iaasTotal} sub="DIP del cuatrimestre" tono="rose" onClick={() => onIrA("indicadores")} />
          <Tarjeta titulo="Alertas activas" valor={alertas.length} sub={`${alertas.filter((a) => a.nivel === "alta").length} de prioridad alta`} tono="amber" />
          <Tarjeta titulo="Cirugías en vigilancia" valor={cxVigilancia.length} sub={`${cxPorRevisar.length} por dar de alta`} tono="sky" onClick={() => onIrA("cirugias")} />
        </div>
      </div>

      <div className="dash-cols">
        {/* 2. Riesgo por servicio */}
        <div>
          <div className="text-xs font-bold text-slate-600 uppercase tracking-wide mb-1.5">Riesgo por servicio</div>
          {riesgos.length === 0 ? (
            <div className="rounded-xl border border-slate-200 bg-white p-4 text-xs text-slate-400">Sin pacientes activos.</div>
          ) : (
            <div className="grid grid-cols-2 gap-2 dash-grid-3">
              {riesgos.map((r) => (
                <div key={r.servicio} className={`rounded-xl border p-3 ${tonoRiesgo[r.nivel]}`}>
                  <div className="flex items-center justify-between">
                    <span className="font-bold text-sm">{r.servicio}</span>
                    <span className={`w-2.5 h-2.5 rounded-full ${puntoRiesgo[r.nivel]}`} />
                  </div>
                  <div className="text-[11px] font-semibold capitalize">Riesgo {r.nivel}</div>
                  <div className="text-[10px] mt-1 opacity-80">{r.pacientes} paciente(s)</div>
                  <ul className="text-[10px] mt-1 space-y-0.5 opacity-90">
                    {r.motivos.map((m, i) => (
                      <li key={i}>· {m}</li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          )}
          <p className="text-[10px] text-slate-400 mt-1.5">
            Semáforo por reglas verificables (casos confirmados, permanencia de dispositivos y alertas), no por predicción estadística.
          </p>
        </div>

        {/* 3. Centro de alertas */}
        <div>
          <div className="text-xs font-bold text-slate-600 uppercase tracking-wide mb-1.5">
            Centro de alertas {alertas.length > 0 && <span className="text-rose-600">({alertas.length})</span>}
          </div>
          <div className="rounded-xl border border-slate-200 bg-white p-2 space-y-1.5 dash-scroll">
            {alertas.length === 0 ? (
              <p className="text-xs text-slate-400 p-2">Sin alertas activas.</p>
            ) : (
              alertas.slice(0, 40).map((a, i) => (
                <button
                  key={i}
                  onClick={() => (a.tipo === "cirugia" ? onIrA("cirugias") : a.id && onOpenPaciente(a.id))}
                  className="w-full text-left rounded-lg border border-slate-200 px-2.5 py-1.5 hover:border-teal-400 flex items-start gap-2"
                >
                  <span
                    className={`text-[9px] font-bold rounded px-1.5 py-0.5 shrink-0 mt-0.5 ${
                      a.nivel === "alta" ? "bg-rose-100 text-rose-700" : "bg-amber-100 text-amber-700"
                    }`}
                  >
                    {a.nivel === "alta" ? "ALTA" : "MEDIA"}
                  </span>
                  <span className="min-w-0">
                    <span className="block text-xs font-semibold text-slate-700 leading-tight">{a.titulo}</span>
                    <span className="block text-[10px] text-slate-400">{a.detalle}</span>
                  </span>
                </button>
              ))
            )}
          </div>
        </div>
      </div>

      {/* 4. Indicadores clave */}
      <div>
        <div className="text-xs font-bold text-slate-600 uppercase tracking-wide mb-1.5">Indicadores clave del cuatrimestre</div>
        <div className="grid grid-cols-2 gap-2 dash-grid-4">
          <Tarjeta titulo="ITS / CVC" valor={its.tasa.toFixed(2)} sub={`${its.casos} caso(s) · ${its.diasDip} días`} tono="teal" onClick={() => onIrA("indicadores")} />
          <Tarjeta titulo="ITU / CUP" valor={itu.tasa.toFixed(2)} sub={`${itu.casos} caso(s) · ${itu.diasDip} días`} tono="teal" onClick={() => onIrA("indicadores")} />
          <Tarjeta titulo="NAVM / VMI" valor={nav.tasa.toFixed(2)} sub={`${nav.casos} caso(s) · ${nav.diasDip} días`} tono="teal" onClick={() => onIrA("indicadores")} />
          <Tarjeta
            titulo="Cobertura quirúrgica"
            valor={cobertura !== null ? `${cobertura.toFixed(0)}%` : "—"}
            sub={cobertura !== null ? `${cxPeriodo.length} de ${realizadosTot} realizadas` : "Ingresa el total de pabellón"}
            tono={cobertura !== null && cobertura < 90 ? "amber" : "teal"}
            onClick={() => onIrA("indicadores")}
          />
        </div>
        <div className="grid grid-cols-2 gap-2 mt-2 dash-grid-4">
          <Tarjeta titulo="Días dispositivo" valor={diasTotales} sub="CUP + CVC + VMI" />
          <Tarjeta titulo="Ambulatorios" valor={procedimientos.length} sub="quimio y diálisis" tono="sky" onClick={() => onIrA("ambulatorio")} />
          <Tarjeta titulo="Notificaciones pendientes" valor={pendientes.length} sub="sin resolver o sin aval" tono="amber" />
          <Tarjeta titulo="Fichas cerradas" valor={hospitalizaciones.filter((h) => h.estado === "cerrado").length} sub="en histórico" onClick={() => onIrA("historico")} />
        </div>
        <p className="text-[10px] text-slate-400 mt-1.5">Tasas por 1.000 días-dispositivo · metodología MINSAL</p>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [hospitalizaciones, setHospitalizaciones] = useState([]);
  const [view, setView] = useState("censo"); // censo | nueva | ficha | historico
  const [selectedId, setSelectedId] = useState(null);

  useEffect(() => {
    (async () => {
      const data = await loadHospitalizaciones();
      setHospitalizaciones(data);
      setLoading(false);
    })();
  }, []);

  const persist = useCallback(async (list) => {
    setSaving(true);
    const r = await persistHospitalizaciones(list);
    if (r && r.records) setHospitalizaciones(r.records);
    setSaving(false);
  }, []);

  const handleCreate = async (nuevaFicha) => {
    const ficha = { ...nuevaFicha, updatedAt: new Date().toISOString() };
    const list = [...hospitalizaciones, ficha];
    setHospitalizaciones(list);
    setSelectedId(ficha.id);
    setView("ficha");
    persist(list);
  };

  const handleUpdate = async (updated) => {
    const u = { ...updated, updatedAt: new Date().toISOString() };
    const list = hospitalizaciones.map((h) => (h.id === u.id ? u : h));
    setHospitalizaciones(list);
    persist(list);
  };

  const handleDelete = async (id) => {
    const list = hospitalizaciones.map((h) =>
      h.id === id ? { ...h, eliminado: true, updatedAt: new Date().toISOString() } : h
    );
    setHospitalizaciones(list);
    setSelectedId(null);
    setView("censo");
    persist(list);
  };

  const visibles = hospitalizaciones.filter(
    (h) => !h.eliminado && h.tipoRegistro !== "cirugia" && h.tipoRegistro !== "ambulatorio" && h.tipoRegistro !== "procedimiento"
  );
  const cirugias = hospitalizaciones.filter((h) => !h.eliminado && h.tipoRegistro === "cirugia");
  const procedimientos = hospitalizaciones.filter((h) => !h.eliminado && h.tipoRegistro === "procedimiento");

  const selected = hospitalizaciones.find((h) => h.id === selectedId);

  if (loading) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <Loader2 className="animate-spin text-teal-700" size={28} />
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-50 pb-24">
      <style>{`
        @media print {
          body * { visibility: hidden; }
          .print-active #print-area, .print-active #print-area * { visibility: visible; }
          .print-active #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 16px; }
        }
        @page ficha { size: A4 landscape; }
        .ficha-vigilancia-print { page: ficha; }

        /* Panel: número grande de las tarjetas */
        .dash-num { font-size: 22px; }
        .dash-scroll { max-height: 340px; overflow-y: auto; }

        /* En pantalla ancha el panel se despliega en varias columnas */
        @media (min-width: 900px) {
          .app-ancho { max-width: 1400px !important; }
          .dash-grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)) !important; }
          .dash-grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
          .dash-cols { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
        }

        /* Modo presentación: todo más grande para proyectar */
        .dash-presenta .dash-num { font-size: 40px; }
        .dash-presenta { font-size: 15px; }
        .dash-presenta .dash-scroll { max-height: 60vh; }
        @media (min-width: 900px) {
          .dash-presenta .dash-grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        }
        @media print {
          .bloque-matriz { page-break-after: always; break-after: page; }
          table { page-break-inside: auto; }
          tr { page-break-inside: avoid; break-inside: avoid; }
        }
      `}</style>
      <div className="bg-teal-800 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
        <div className="flex items-center gap-2">
          <Stethoscope size={19} />
          <div>
            <div className="font-bold text-sm leading-tight">Vigilancia IAAS</div>
            <div className="text-[11px] text-teal-100 leading-tight">Hospital del Cobre · Calama</div>
          </div>
        </div>
        <div className="flex items-center gap-3">
          {saving && <Loader2 size={14} className="animate-spin text-teal-200" />}
          {USUARIO && USUARIO.nombre && (
            <span className="text-[10px] text-teal-100 max-w-[110px] truncate" title={USUARIO.nombre}>
              {USUARIO.nombre}
            </span>
          )}
          <SyncBadge />
          <button onClick={bloquearApp} title="Bloquear la aplicación" className="text-teal-200 hover:text-white">
            <Lock size={15} />
          </button>
        </div>
      </div>

      <div className={`mx-auto px-4 pt-4 ${view === "panel" ? "max-w-lg app-ancho" : "max-w-lg"}`}>
        {view === "panel" && (
          <DashboardView
            hospitalizaciones={visibles}
            cirugias={cirugias}
            procedimientos={procedimientos}
            anio={parseInt(todayISO().slice(0, 4), 10)}
            cuatri={Math.min(3, Math.floor((parseInt(todayISO().slice(5, 7), 10) - 1) / 4) + 1)}
            onIrA={(v) => {
              setSelectedId(null);
              setView(v);
            }}
            onOpenPaciente={(id) => {
              setSelectedId(id);
              setView("ficha");
            }}
          />
        )}

        {view === "censo" && (
          <CensoView
            hospitalizaciones={visibles}
            onOpen={(id) => {
              setSelectedId(id);
              setView("ficha");
            }}
            onNuevo={() => setView("nueva")}
            onNuevoRapido={(h) => {
              const list = [...hospitalizaciones, h];
              setHospitalizaciones(list);
              persist(list);
            }}
          />
        )}
        {view === "nueva" && (
          <NuevaFichaForm hospitalizaciones={visibles} onCancel={() => setView("censo")} onCreate={handleCreate} />
        )}
        {view === "ficha" && selected && (
          <FichaDetail
            hospitalizacion={selected}
            allHospitalizaciones={visibles}
            onBack={() => {
              setSelectedId(null);
              setView(selected.estado === "cerrado" ? "historico" : "censo");
            }}
            onUpdate={handleUpdate}
            onDelete={handleDelete}
          />
        )}
        {view === "ambulatorio" && (
          <ProcedimientosView
            procedimientos={procedimientos}
            onSave={(reg) => {
              const existe = hospitalizaciones.some((h) => h.id === reg.id);
              const list = existe ? hospitalizaciones.map((h) => (h.id === reg.id ? reg : h)) : [...hospitalizaciones, reg];
              setHospitalizaciones(list);
              persist(list);
            }}
            onDelete={(id) => {
              const list = hospitalizaciones.map((h) => (h.id === id ? { ...h, eliminado: true, updatedAt: new Date().toISOString() } : h));
              setHospitalizaciones(list);
              persist(list);
            }}
          />
        )}

        {view === "cirugias" && (
          <CirugiasView
            cirugias={cirugias}
            onSave={(reg) => {
              const existe = hospitalizaciones.some((h) => h.id === reg.id);
              const list = existe ? hospitalizaciones.map((h) => (h.id === reg.id ? reg : h)) : [...hospitalizaciones, reg];
              setHospitalizaciones(list);
              persist(list);
            }}
            onDelete={(id) => {
              const list = hospitalizaciones.map((h) => (h.id === id ? { ...h, eliminado: true, updatedAt: new Date().toISOString() } : h));
              setHospitalizaciones(list);
              persist(list);
            }}
          />
        )}

        {view === "indicadores" && (
          <IndicadoresView
            hospitalizaciones={visibles}
            cirugias={cirugias}
            procedimientos={procedimientos}
            onOpenAmbulatorio={() => setView("ambulatorio")}
            onOpenCaso={(id, tipo) => {
              if (tipo === "cirugia") {
                setView("cirugias");
              } else {
                setSelectedId(id);
                setView("ficha");
              }
            }}
            onQuitarFoco={(pacienteId, notifId, clave, tipo) => {
              const list = hospitalizaciones.map((h) => {
                if (h.id !== pacienteId) return h;
                return {
                  ...h,
                  notificaciones: (h.notificaciones || []).map((n) => {
                    if (n.id !== notifId) return n;
                    if (tipo === "arepi") {
                      return {
                        ...n,
                        arepi: { ...n.arepi, [clave]: { ...(n.arepi?.[clave] || {}), siNo: "", criteriosMarcados: [] } },
                      };
                    }
                    return {
                      ...n,
                      dip: { ...n.dip, [clave]: { ...(n.dip?.[clave] || {}), siNo: "", criteriosMarcados: [] } },
                    };
                  }),
                  updatedAt: new Date().toISOString(),
                };
              });
              setHospitalizaciones(list);
              persist(list);
            }}
          />
        )}

        {view === "historico" && (
          <HistoricoView
            hospitalizaciones={visibles}
            onOpen={(id) => {
              setSelectedId(id);
              setView("ficha");
            }}
          />
        )}
      </div>

      <div className="max-w-lg mx-auto px-4 fixed bottom-0 left-0 right-0">
        <div className="max-w-lg mx-auto bg-white border-t border-slate-200 flex shadow-[0_-2px_8px_rgba(0,0,0,0.04)]" style={{ paddingBottom: "env(safe-area-inset-bottom)" }}>
          {[
            { key: "panel", label: "Panel", icon: LayoutGrid },
            { key: "censo", label: "Censo", icon: BedDouble },
            { key: "cirugias", label: "Cirugías", icon: Syringe },
            { key: "ambulatorio", label: "Ambulat.", icon: Droplet },
            { key: "indicadores", label: "Indicad.", icon: TrendingUp },
            { key: "historico", label: "Histór.", icon: History },
          ].map((t) => (
            <button
              key={t.key}
              onClick={() => {
                setSelectedId(null);
                setView(t.key);
              }}
              className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px] font-semibold ${
                view === t.key || (view === "ficha" && selected?.estado === (t.key === "historico" ? "cerrado" : "activo"))
                  ? "text-teal-700"
                  : "text-slate-400"
              }`}
            >
              <t.icon size={18} />
              {t.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/* Indicador de sincronización                                             */
/* ---------------------------------------------------------------------- */

function SyncBadge() {
  const [online, setOnline] = useState(SyncState.online);
  useEffect(() => {
    const f = (v) => setOnline(v);
    SyncState.listeners.add(f);
    return () => SyncState.listeners.delete(f);
  }, []);
  if (!cloudEnabled()) {
    return (
      <span className="flex items-center gap-1 text-[10px] font-semibold text-amber-200" title="Nube no configurada: los datos quedan solo en este equipo">
        <CloudOff size={14} /> Solo este equipo
      </span>
    );
  }
  if (online === false) {
    return (
      <span className="flex items-center gap-1 text-[10px] font-semibold text-amber-200" title="Sin conexión: guardado local cifrado, se sincronizará al reconectar">
        <CloudOff size={14} /> Sin conexión
      </span>
    );
  }
  return (
    <span className="flex items-center gap-1 text-[10px] font-semibold text-teal-100" title="Sincronizado con la nube">
      <Cloud size={14} /> Nube
    </span>
  );
}

/* ---------------------------------------------------------------------- */
/* Pantalla de clave                                                       */
/* ---------------------------------------------------------------------- */

function LockScreen({ onUnlock }) {
  const [clave, setClave] = useState("");
  const [ver, setVer] = useState(false);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const entrar = async () => {
    if (!clave.trim() || busy) return;
    setBusy(true);
    setError("");
    try {
      await onUnlock(clave.trim());
    } catch (e) {
      if (e && e.code === "clave") setError("Clave incorrecta. Inténtalo nuevamente.");
      else if (e && e.code === "offline") setError("Sin conexión a internet y sin respaldo local en este equipo. Conéctate para el primer ingreso.");
      else setError("No se pudo iniciar. Revisa tu conexión e inténtalo de nuevo.");
      setBusy(false);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center px-6">
      <div className="w-full max-w-sm">
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div className="flex flex-col items-center text-center mb-5">
            <div className="w-12 h-12 rounded-full bg-teal-800 text-white flex items-center justify-center mb-3">
              <Lock size={22} />
            </div>
            <div className="font-bold text-slate-800">Vigilancia IAAS</div>
            <div className="text-xs text-slate-500">Hospital del Cobre · Calama</div>
            <div className="text-[11px] text-slate-400 mt-2">Acceso restringido · Información clínica sensible</div>
          </div>
          <div className="relative">
            <input
              type={ver ? "text" : "password"}
              value={clave}
              autoFocus
              onChange={(e) => setClave(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && entrar()}
              placeholder="Clave de acceso"
              className="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 pr-10 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
            />
            <button
              type="button"
              onClick={() => setVer(!ver)}
              className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
              tabIndex={-1}
            >
              {ver ? <EyeOff size={17} /> : <Eye size={17} />}
            </button>
          </div>
          {error && <div className="mt-2 text-xs text-red-600">{error}</div>}
          <button
            onClick={entrar}
            disabled={busy || !clave.trim()}
            className="mt-4 w-full rounded-lg bg-teal-700 hover:bg-teal-800 disabled:opacity-50 text-white text-sm font-semibold py-2.5 flex items-center justify-center gap-2"
          >
            {busy ? <Loader2 size={16} className="animate-spin" /> : "Ingresar"}
          </button>
          {!cloudEnabled() && (
            <div className="mt-4 text-[11px] leading-snug text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
              La nube aún no está configurada (falta pegar la URL del Apps Script en el archivo). La app funcionará
              solo en este equipo, con los datos cifrados con tu clave.
            </div>
          )}
        </div>
        <div className="text-center text-[10px] text-slate-400 mt-3">
          Los datos se cifran en este dispositivo y se sincronizan con tu planilla privada de Google.
        </div>
      </div>
    </div>
  );
}

function Root() {
  const [unlocked, setUnlocked] = useState(false);
  const [checking, setChecking] = useState(!!CLAVE);

  useEffect(() => {
    if (!CLAVE) return;
    (async () => {
      try {
        await desbloquear(CLAVE);
        setUnlocked(true);
      } catch (e) {
        window.sessionStorage.removeItem(CLAVE_SESION_KEY);
        CLAVE = null;
      } finally {
        setChecking(false);
      }
    })();
  }, []);

  if (checking) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <Loader2 className="animate-spin text-teal-700" size={28} />
      </div>
    );
  }
  if (!unlocked) {
    return (
      <LockScreen
        onUnlock={async (c) => {
          await desbloquear(c);
          setUnlocked(true);
        }}
      />
    );
  }
  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
