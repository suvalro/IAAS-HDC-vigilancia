  return lista
    .map((a) => {

    .join(" + ");

function gruposDeFoco(foco) {
  return ["grupoA", "grupoB", "grupoC"].filter((g) => foco[g]);
}

// Elementos que se repiten en más de un foco (ej. fiebre aparece en CVC, CUP y VMI):
// se preguntan una sola vez por visita y se aplican a todos los focos correspondientes.
const ELEMENTOS_COMPARTIDOS = {
  fiebre: { texto: "Fiebre ≥ 38 °C axilar" },
};
const ELEMENTOS_COMPARTIDOS_IDS = Object.keys(ELEMENTOS_COMPARTIDOS);

function parseEdadAnios(edadStr) {
  if (!edadStr) return null;
  const m = String(edadStr).match(/(\d+)/);
  if (!m) return null;
  const num = parseInt(m[1], 10);
  if (/mes/i.test(edadStr)) return num / 12;
  return num;
}

// Algunos elementos de la definición oficial solo aplican a un grupo etario específico.
// Este hospital no maneja pacientes menores de 1 año, así que ese criterio queda oculto salvo excepción.
function elementoAplicable(elId, hospitalizacion) {
  const edad = parseEdadAnios(hospitalizacion?.edad);
  if (elId === "apnea") return edad !== null && edad < 1;
  if (elId === "alteracionConciencia") return edad !== null && edad >= 65;
  return true;
}

function initEstadosFoco(focoKey) {
  const foco = CRITERIOS_FOCOS[focoKey];
  const estados = {};
  gruposDeFoco(foco).forEach((g) => {
    foco[g].elementos.forEach((el) => {
      if (ELEMENTOS_COMPARTIDOS_IDS.includes(el.id)) return;
      estados[el.id] = { estado: "no_revisado", fecha: "" };
    });
  });
  return estados;
}

function initCompartidos() {
  const estados = {};
  ELEMENTOS_COMPARTIDOS_IDS.forEach((id) => {
    estados[id] = { estado: "no_revisado", fecha: "" };
  });
  return estados;
}

function ensureCriteriosIAAS(h) {
  const actual = h.criteriosIAAS || {};
  const result = { ...actual };
  let algunFocoActivo = false;
  Object.keys(CRITERIOS_FOCOS).forEach((key) => {
    if (focoInstalado(h, key)) {
      algunFocoActivo = true;
      if (!result[key]) result[key] = initEstadosFoco(key);
    }
  });
  if (algunFocoActivo && !result.compartidos) {
    result.compartidos = initCompartidos();
  }
  return result;
}

// Junta los elementos "presente" de un foco, ya sea que vivan en el bucket propio del foco
// o en el bucket compartido (fiebre, etc.), para notificación y resúmenes.
function elementosPresentesFoco(criteriosIAAS, focoKey) {
  const foco = CRITERIOS_FOCOS[focoKey];
  if (!foco) return [];
  const focoEstados = criteriosIAAS?.[focoKey] || {};
  const compartidos = criteriosIAAS?.compartidos || {};
  const result = [];
  gruposDeFoco(foco).forEach((g) => {
    foco[g].elementos.forEach((el) => {
      const estado = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id) ? compartidos[el.id] : focoEstados[el.id];
      if (estado?.estado === "presente") {
        result.push({ texto: el.texto, fecha: estado.fecha });
      }
    });
  });
  return result;
}

/* Grupos etarios de días-cama (denominador AREpi), según HDC.
   El denominador lo ingresa la usuaria cada cuatrimestre (viene de estadística/GRD). */
const GRUPOS_ETARIOS = [
  { key: "neonatos", label: "Neonatos (<28 días)" },
  { key: "lactantes", label: "Lactantes (29 días–2 años)" },
  { key: "pediatricos", label: "Pediátricos (2–15 años)" },
  { key: "adultos", label: "Adultos (≥15 años)" },
];

/* Grupo etario de un paciente según su edad (en años).
   Para <2 años se distingue neonato/lactante con el campo edadDias si existe;
   si no, se asume lactante (los neonatos <28 días son excepcionales en HDC). */
function grupoEtarioPaciente(h, arepiKey) {
  const edadAnios = parseFloat(h.edad);
  // SDA en neonatos: si el AREpi es específicamente neonatal y el paciente es <1 mes
  if (!isNaN(edadAnios)) {
    if (edadAnios < 2) {
      // menor de 2 años: neonato o lactante
      // si la app registró edad en días y es <28, es neonato
      const dias = parseFloat(h.edadDias);
      if (!isNaN(dias) && dias <= 28) return "neonatos";
      return "lactantes";
    }
    if (edadAnios < 15) return "pediatricos";
    return "adultos";
  }
  // Sin edad clara: usar el grupo típico del AREpi como respaldo
  return AREPI_GRUPO_DEFECTO[arepiKey] || "adultos";
}

/* Respaldo cuando no hay edad registrada (grupo más frecuente de cada AREpi). */
const AREPI_GRUPO_DEFECTO = {
  sdaNeonatos: "lactantes",
  iravbLactantes: "lactantes",
  edaCDifficile: "adultos",
  sarsCov2: "adultos",
};

}

function fmtDate(d) {
  if (!d) return "—";
  const dt = new Date(d + "T00:00:00");
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString("es-CL", { day: "2-digit", month: "2-digit", year: "numeric" });
}

/* Servicio responsable del paciente en una fecha dada, según historial de traslados.
   El servicio inicial rige desde el ingreso; cada traslado cambia el servicio desde su fecha. */
function servicioEnFecha(h, fecha) {
  const trs = [...(h.traslados || [])].filter((t) => t.fecha && t.servicio).sort((a, b) => (a.fecha < b.fecha ? -1 : 1));
  let servicio = h.servicio;
  for (const t of trs) {
    if (t.fecha <= fecha) servicio = t.servicio;
    else break;
  }
  return servicio;
}

/* Suma días-dispositivo de un tramo [inst, retiro] atribuidos a un servicio específico,
   respetando los traslados (cada día calendario cuenta para el servicio de ese día). */
function diasDipEnServicioTramo(fInst, fRetiro, h, servicioObjetivo, desde, hasta) {
  if (!fInst) return 0;
  const ini = fInst > desde ? fInst : desde;
  const finReal = fRetiro || todayISO();
  const fin = finReal < hasta ? finReal : hasta;
  if (fin < ini) return 0;
  let cuenta = 0;
  let d = new Date(ini + "T00:00:00");
  const dFin = new Date(fin + "T00:00:00");
  while (d <= dFin) {
    const iso = d.toISOString().slice(0, 10);
    if (servicioEnFecha(h, iso) === servicioObjetivo) cuenta += 1;
    d.setDate(d.getDate() + 1);
  }
  return cuenta;
}

function daysBetween(a, b) {
  const A = new Date(a + "T00:00:00");
  const B = new Date(b + "T00:00:00");
  return Math.round((B - A) / 86400000);
}

function lastMovementDate(h) {
  const dates = [h.fechaIngresoVigilancia, ...h.evoluciones.map((e) => e.fecha)].filter(Boolean);
  if (!dates.length) return h.fechaIngresoVigilancia;
  return dates.sort().slice(-1)[0];
}

function emptyDip() {
  const base = {
    cup: { instalado: false, fechaInstalacion: "", ubicacion: "", fechaRetiro: "" },
    vmi: { instalado: false, fechaInstalacion: "", ubicacion: "", fechaRetiro: "" },
    cvc: { cateteres: [] },
  };
  return base;
}

function newCateterCVC() {

}

function cateteresCVCActivos(h) {
  return (h.dip?.cvc?.cateteres || []).filter((c) => !c.fechaRetiro);
}

function focoInstalado(h, key) {
  if (key === "cvc") return cateteresCVCActivos(h).length > 0;
  return !!h.dip?.[key]?.instalado && !h.dip[key]?.fechaRetiro;
}

function focoDiasTotal(h, key) {
  if (key === "cvc") {
    return (h.dip?.cvc?.cateteres || []).reduce(
      (sum, c) => sum + daysBetween(c.fechaInstalacion, c.fechaRetiro || todayISO()),
      0
    );
  }
  const d = h.dip?.[key];
  if (!d?.instalado) return 0;
  const actual = daysBetween(d.fechaInstalacion, d.fechaRetiro || todayISO());
  const previos = (d.previos || []).reduce(
    (s, p) => s + (p.fechaInstalacion ? daysBetween(p.fechaInstalacion, p.fechaRetiro || p.fechaInstalacion) : 0),
    0
  );
  return actual + previos;
}

/* ---------------------------------------------------------------------- */
/* Pesquisa temprana: motor de alertas                                     */
/* ---------------------------------------------------------------------- */

/* Días de permanencia a partir de los cuales conviene revisar el dispositivo.
   Son umbrales de atención para pesquisa, no límites clínicos oficiales. */
const DIAS_ALERTA_DISPOSITIVO = { cvc: 7, cup: 7, vmi: 5 };

/* Nombre corto de cada foco/dispositivo */
const NOMBRE_DISPOSITIVO = { cvc: "CVC", cup: "CUP", vmi: "VMI" };

/* Devuelve las alertas activas de un paciente (para pesquisa temprana). */
function alertasDePaciente(h) {
  if (h.estado !== "activo") return [];
  const alertas = [];
  const hoy = todayISO();

  // 1) Dispositivos que superan el umbral de días de permanencia
  ["cvc", "cup", "vmi"].forEach((key) => {
    if (!focoInstalado(h, key)) return;
    const dias = focoDiasTotal(h, key);
    if (dias >= DIAS_ALERTA_DISPOSITIVO[key]) {
      alertas.push({
        nivel: "media",
        tipo: "dispositivo",
        texto: `${NOMBRE_DISPOSITIVO[key]} lleva ${dias} días — revisar necesidad de mantenerlo`,
      });
    }
  });

  // 2) Elementos de criterio presentes SIN diagnóstico cerrado, dentro de la ventana de 5 días
  //    (fiebre + hemocultivo, leucocituria, etc. que aún no se han resuelto)
  const notificado = (h.notificaciones || []).length > 0;
  Object.keys(CRITERIOS_FOCOS).forEach((focoKey) => {
    const presentes = elementosPresentesFoco(h.criteriosIAAS, focoKey);
    if (presentes.length === 0) return;
    // fecha del elemento más reciente
    const fechas = presentes.map((e) => e.fecha).filter(Boolean).sort();
    const ultima = fechas[fechas.length - 1] || lastMovementDate(h);
    const diasDesde = daysBetween(ultima, hoy);
    if (!notificado && diasDesde <= 5) {
      alertas.push({
        nivel: "alta",
        tipo: "criterio",
        texto: `${CRITERIOS_FOCOS[focoKey].label}: ${presentes.length} elemento(s) presente(s) — completar dentro de la ventana de 5 días`,
      });
    }
  });

  // 3) Paciente sin visita reciente (seguimiento semanal mínimo)
  const diasSinVisita = daysBetween(lastMovementDate(h), hoy);
  if (diasSinVisita >= 7) {
    alertas.push({
      nivel: "media",
      tipo: "seguimiento",
      texto: `Sin visita hace ${diasSinVisita} días — la vigilancia mínima es semanal`,
    });
  }

  return alertas;
}

function nivelMaximoAlerta(alertas) {
  if (alertas.some((a) => a.nivel === "alta")) return "alta";
  if (alertas.some((a) => a.nivel === "media")) return "media";
  return null;
}

/* ---------------------------------------------------------------------- */
/* Indicadores: cálculo de tasas MINSAL                                    */
/* ---------------------------------------------------------------------- */

/* Días de exposición a un dispositivo dentro de una ventana [desde, hasta],
   sumando solo la parte del uso que cae dentro del período. */
function diasDispositivoEnPeriodo(fInst, fRetiro, desde, hasta) {
  if (!fInst) return 0;
  const ini = fInst > desde ? fInst : desde;
  const finReal = fRetiro || todayISO();
  const fin = finReal < hasta ? finReal : hasta;
  if (fin < ini) return 0;
  return daysBetween(ini, fin) + 1; // +1: fecha inicio y término aportan día (regla MINSAL)
}

/* Suma días-dispositivo de un tipo, para un paciente, en el período y (opcional) servicio.
   Si se pide un servicio, reparte por traslados: cada día calendario cuenta al servicio
   responsable ese día (regla MINSAL de servicio derivador / receptor). */
function diasDipPacientePeriodo(h, key, desde, hasta, servicio) {
  const tramos =
    key === "cvc"
      ? (h.dip?.cvc?.cateteres || []).map((c) => [c.fechaInstalacion, c.fechaRetiro])
      : h.dip?.[key]?.instalado
      ? [
          [h.dip[key].fechaInstalacion, h.dip[key].fechaRetiro],
          ...(h.dip[key].previos || []).map((p) => [p.fechaInstalacion, p.fechaRetiro]),
        ]
      : [];
  if (tramos.length === 0) return 0;

  if (servicio) {
    return tramos.reduce((s, [ini, fin]) => s + diasDipEnServicioTramo(ini, fin, h, servicio, desde, hasta), 0);
  }
  return tramos.reduce((s, [ini, fin]) => s + diasDispositivoEnPeriodo(ini, fin, desde, hasta), 0);
}

/* Calcula numerador (IAAS confirmadas) y denominador (días-dispositivo) para un foco. */
function calcularTasa(hospitalizaciones, focoKey, desde, hasta, servicio) {
  let diasDip = 0;
  let casos = 0;
  hospitalizaciones.forEach((h) => {
    diasDip += diasDipPacientePeriodo(h, focoKey, desde, hasta, servicio);
    // Un caso cuenta si hay una notificación con este foco = "SI", confirmada, con fecha en el período
    (h.notificaciones || []).forEach((n) => {
      if (n.confirmacion !== "confirmada") return;
      const f = n.dip?.[focoKey];
      if (!f || f.siNo !== "SI") return;
      const fechaN = n.fechaNotificacion || "";
      if (fechaN < desde || fechaN > hasta) return;
      if (servicio && servicioEnFecha(h, fechaN) !== servicio) return;
      casos += 1;
    });
  });
  const tasa = diasDip > 0 ? (casos / diasDip) * 1000 : 0;
  return { casos, diasDip, tasa };
}

function primerDiaMes(iso) {
  return iso.slice(0, 7) + "-01";
}

/* Cuenta casos AREpi confirmados de un tipo en el período, desglosados por grupo etario real.
   Devuelve { total, porGrupo: {neonatos, lactantes, pediatricos, adultos} }. */
function casosArepi(hospitalizaciones, arepiKey, desde, hasta) {
  const porGrupo = { neonatos: 0, lactantes: 0, pediatricos: 0, adultos: 0 };
  let total = 0;
  hospitalizaciones.forEach((h) => {
    (h.notificaciones || []).forEach((n) => {
      if (n.confirmacion !== "confirmada") return;
      const a = n.arepi?.[arepiKey];
      if (!a || a.siNo !== "SI") return;
      const f = a.fechaInicioSintomas || n.fechaNotificacion || "";
      if (f < desde || f > hasta) return;
      const g = grupoEtarioPaciente(h, arepiKey);
      porGrupo[g] = (porGrupo[g] || 0) + 1;
      total += 1;
    });
  });
  return { total, porGrupo };
}

/* Tasa AREpi = casos / días-cama del grupo × 1000. diasCama viene del input manual. */
function tasaArepi(casos, diasCama) {
  const dc = parseFloat(diasCama) || 0;
  return dc > 0 ? (casos / dc) * 1000 : 0;
}

/* Días-cama por período: se guardan localmente (vienen de estadística cada cuatrimestre). */
function keyDiasCama(anio, cuatri) {
  return `vigilancia-iaas-diascama-${anio}-C${cuatri}`;
}
function cargarDiasCama(anio, cuatri) {
  try {
    const raw = window.localStorage.getItem(keyDiasCama(anio, cuatri));
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function guardarDiasCama(anio, cuatri, data) {
  try {
    window.localStorage.setItem(keyDiasCama(anio, cuatri), JSON.stringify(data));
  } catch (e) {}
}
function nombreMes(iso) {
  const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  const [y, m] = iso.split("-");
  return `${meses[parseInt(m, 10) - 1]} ${y.slice(2)}`;
}

const CACHE_KEY = "vigilancia-iaas-cache-v2";      // respaldo local CIFRADO
const PENDING_KEY = "vigilancia-iaas-pendiente";   // hay cambios sin subir a la nube
const CLAVE_SESION_KEY = "vigilancia-iaas-clave";  // clave durante la sesión

let CLAVE = window.sessionStorage.getItem(CLAVE_SESION_KEY) || null;
let USUARIO = null;
try {
  USUARIO = JSON.parse(window.sessionStorage.getItem("vigilancia-iaas-usuario") || "null");
} catch (e) {}
let PRELOADED = null;

const cloudEnabled = () =>
  /^https:\/\//.test(SYNC_URL) && SYNC_URL.indexOf("PEGA_AQUI") === -1;

/* Estado de sincronización (para el indicador del encabezado) */
const SyncState = {
  online: null,
  listeners: new Set(),
  set(v) {
    if (this.online !== v) {
      this.online = v;
      this.listeners.forEach((f) => f(v));
    }
  },
};

/* --- Cifrado local: AES-GCM con llave derivada de la clave (PBKDF2) --- */
const _te = new TextEncoder();
const _td = new TextDecoder();
const _b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const _unb64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

async function deriveKey(clave, salt) {
  const base = await crypto.subtle.importKey("raw", _te.encode(clave), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 120000, hash: "SHA-256" },
    base,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function cacheSave(list) {
  try {
    if (!window.crypto || !crypto.subtle || !CLAVE) return;
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(CLAVE, salt);
    const data = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, _te.encode(JSON.stringify(list)));
    window.localStorage.setItem(CACHE_KEY, JSON.stringify({ salt: _b64(salt), iv: _b64(iv), data: _b64(data) }));
  } catch (e) {
    /* el respaldo local es best-effort */
  }
}

async function cacheLoad() {
  const raw = window.localStorage.getItem(CACHE_KEY);
  if (!raw) return null;
  const p = JSON.parse(raw);
  const key = await deriveKey(CLAVE, _unb64(p.salt));
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: _unb64(p.iv) }, key, _unb64(p.data));
  return JSON.parse(_td.decode(plain)); // lanza error si la clave es incorrecta
}

/* --- Datos antiguos (versión anterior, sin cifrar) --- */
function legacyLoad() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function mergeById(base, extra) {
  const map = new Map((base || []).map((r) => [r.id, r]));
  for (const r of extra || []) {
    const prev = map.get(r.id);
    if (!prev || String(r.updatedAt || "") >= String(prev.updatedAt || "")) map.set(r.id, r);
  }
  return [...map.values()];
}

/* --- Llamadas a la nube --- */
async function cloudGet() {
  const res = await fetch(SYNC_URL + "?clave=" + encodeURIComponent(CLAVE), { redirect: "follow" });
  return res.json();
}

async function cloudPost(records) {
  const res = await fetch(SYNC_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ clave: CLAVE, records }),
    redirect: "follow",
  });
  return res.json();
}

/* --- Desbloqueo: valida la clave y carga los datos --- */
async function desbloquear(claveIngresada) {
  CLAVE = claveIngresada;
  const legacy = legacyLoad();

  if (cloudEnabled()) {
    let data;
    try {
      data = await cloudGet();
    } catch (e) {
      /* Sin conexión: intentar respaldo local cifrado */
      try {
        const cached = await cacheLoad();
        if (cached === null && !legacy) throw new Error("sin-datos");
        PRELOADED = mergeById(cached || [], legacy || []);
        SyncState.set(false);
        window.sessionStorage.setItem(CLAVE_SESION_KEY, CLAVE);
        return;
      } catch (e2) {
        CLAVE = null;
        throw { code: "offline" };
      }
    }
    if (!data.ok) {
      CLAVE = null;
      throw { code: "clave" };
    }
    USUARIO = data.usuario || null;
    try {
      window.sessionStorage.setItem("vigilancia-iaas-usuario", JSON.stringify(USUARIO));
    } catch (e) {}
    let records = data.records || [];
    /* Subir cambios pendientes hechos sin conexión */
    if (window.localStorage.getItem(PENDING_KEY)) {
      try {
        const cached = await cacheLoad();
        if (cached) {
          const r = await cloudPost(cached);
          if (r.ok) records = r.records || records;
        }
        window.localStorage.removeItem(PENDING_KEY);
      } catch (e) {}
    }
    /* Migrar datos de la versión anterior (una sola vez) */
    if (legacy && legacy.length) {
      const stamped = legacy.map((h) => ({ ...h, updatedAt: h.updatedAt || h.createdAt || new Date().toISOString() }));
      const r = await cloudPost(mergeById(records, stamped));
      if (r.ok) records = r.records || records;
      window.localStorage.removeItem(STORAGE_KEY);
    }
    await cacheSave(records);
    PRELOADED = records;
    SyncState.set(true);
  } else {
    /* Modo solo-local (URL de nube aún no configurada) */
    const hasCache = !!window.localStorage.getItem(CACHE_KEY);
    let records = [];
    if (hasCache) {
      try {
        records = (await cacheLoad()) || [];
      } catch (e) {
        CLAVE = null;
        throw { code: "clave" };
      }
    }
    if (legacy && legacy.length) {
      records = mergeById(records, legacy);
      window.localStorage.removeItem(STORAGE_KEY);
    }
    await cacheSave(records);
    PRELOADED = records;
    SyncState.set(null);
  }
  window.sessionStorage.setItem(CLAVE_SESION_KEY, CLAVE);
}

function bloquearApp() {
  window.sessionStorage.removeItem(CLAVE_SESION_KEY);
  window.sessionStorage.removeItem("vigilancia-iaas-usuario");
  window.location.reload();
}

/* --- Interfaz usada por la app (mismas firmas que antes) --- */
async function loadHospitalizaciones() {
  if (PRELOADED) {
    const d = PRELOADED;
    PRELOADED = null;
    return d;
  }
  try {
    return (await cacheLoad()) || [];
  } catch (e) {
    return [];
  }
}

async function persistHospitalizaciones(list) {
  await cacheSave(list);
  if (!cloudEnabled()) return { ok: true };
  try {
    const r = await cloudPost(list);
    if (r.ok) {
      SyncState.set(true);
      window.localStorage.removeItem(PENDING_KEY);
      if (r.records) await cacheSave(r.records);
      return { ok: true, records: r.records };
    }
    throw new Error("rechazado");
  } catch (e) {
    window.localStorage.setItem(PENDING_KEY, "1");
    SyncState.set(false);
    return { ok: true, offline: true };
  }
}

function Field({ label, children, className = "" }) {
  return (
    <label className={`block ${className}`}>
      <span className="block text-[11px] font-semibold uppercase tracking-wide text-slate-500 mb-1">
        {label}
      </span>
      {children}
    </label>
  );
}

const inputCls =
  "w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 placeholder:text-slate-400";

function TextInput(props) {
  return <input {...props} className={inputCls + (props.className ? " " + props.className : "")} />;
}

function TextArea(props) {
  return <textarea {...props} className={inputCls + " min-h-[70px] " + (props.className || "")} />;
}

function Select({ children, ...props }) {
  return (
    <select {...props} className={inputCls}>
      {children}
    </select>
  );
}

function Pill({ tone = "slate", children }) {
  const tones = {
    slate: "bg-slate-100 text-slate-600",
    teal: "bg-teal-50 text-teal-700 border border-teal-200",
    amber: "bg-amber-50 text-amber-700 border border-amber-200",
    red: "bg-rose-50 text-rose-700 border border-rose-200",
    green: "bg-emerald-50 text-emerald-700 border border-emerald-200",
  };
  return (
    <span className={`inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-[11px] font-semibold ${tones[tone]}`}>
      {children}
    </span>
  );
}

function SectionCard({ icon: Icon, title, subtitle, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="rounded-xl border border-slate-200 bg-white overflow-hidden">
      <button
        type="button"
        onClick={() => setOpen((o) => !o)}
        className="w-full flex items-center justify-between gap-3 px-4 py-3 bg-slate-50 hover:bg-slate-100 transition-colors"
      >
        <div className="flex items-center gap-2.5 text-left">
          {Icon && <Icon size={16} className="text-teal-700 shrink-0" />}
          <div>
            <div className="text-sm font-bold text-slate-800">{title}</div>
            {subtitle && <div className="text-xs text-slate-500">{subtitle}</div>}
          </div>
        </div>
        <ChevronRight size={16} className={`text-slate-400 transition-transform ${open ? "rotate-90" : ""}`} />
      </button>
      {open && <div className="p-4 space-y-3">{children}</div>}
    </div>
  );
}

function CensoView({ hospitalizaciones, onOpen, onNuevo }) {
  const [filtroServicio, setFiltroServicio] = useState("Todos");
  const [busqueda, setBusqueda] = useState("");

  const activos = hospitalizaciones.filter((h) => h.estado === "activo");

  const filtrados = activos.filter((h) => {
    const matchServicio = filtroServicio === "Todos" || h.servicio === filtroServicio;
    const q = busqueda.trim().toLowerCase();
    const matchQ =
      !q || h.nombre.toLowerCase().includes(q) || h.rut.toLowerCase().includes(q) || h.cama.toLowerCase().includes(q);
    return matchServicio && matchQ;
  });

  const conAlerta = filtrados.filter((h) => alertasDePaciente(h).length > 0).length;
  const altaPrioridad = filtrados.filter((h) => nivelMaximoAlerta(alertasDePaciente(h)) === "alta").length;

  return (

            {conAlerta > 0 && (
              <span className="text-amber-600 font-semibold">
                {" "}· {conAlerta} con alerta{altaPrioridad > 0 ? ` (${altaPrioridad} a revisar)` : ""}
              </span>
            )}
          </p>
        </div>
        <button
          onClick={onNuevo}
          className="flex items-center gap-1.5 rounded-lg bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-3.5 py-2 shadow-sm shrink-0"
        >
          <UserPlus size={16} /> Nuevo
        </button>
      </div>

      <div className="flex gap-2">
        <div className="relative flex-1">
          <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />

            onChange={(e) => setBusqueda(e.target.value)}
            placeholder="Buscar por nombre, RUT o cama…"
            className={inputCls + " pl-9"}
          />
        </div>
      </div>

      <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-1 px-1">
        {["Todos", ...SERVICIOS].map((s) => (
          <button
            key={s}
            onClick={() => setFiltroServicio(s)}
            className={`shrink-0 rounded-full px-3 py-1.5 text-xs font-semibold border transition-colors ${
              filtroServicio === s
                ? "bg-teal-700 text-white border-teal-700"
                : "bg-white text-slate-600 border-slate-300 hover:border-teal-400"
            }`}
          >
            {s}
          </button>
        ))}
      </div>

      {filtrados.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-300 bg-white py-12 text-center">
          <BedDouble size={28} className="mx-auto text-slate-300 mb-2" />
          <p className="text-sm text-slate-500">
            {activos.length === 0 ? "Aún no hay pacientes en vigilancia activa." : "Sin resultados para este filtro."}
          </p>
          <button onClick={onNuevo} className="mt-3 text-sm font-semibold text-teal-700 hover:underline">
            Activar primera ficha
          </button>
        </div>
      ) : (
        <div className="space-y-2">
          {filtrados
            .map((h) => ({ h, alertas: alertasDePaciente(h) }))
            .sort((a, b) => {
              const orden = { alta: 2, media: 1, null: 0 };
              const na = orden[nivelMaximoAlerta(a.alertas)] || 0;
              const nb = orden[nivelMaximoAlerta(b.alertas)] || 0;
              if (na !== nb) return nb - na;
              return daysBetween(lastMovementDate(a.h), todayISO()) < daysBetween(lastMovementDate(b.h), todayISO()) ? 1 : -1;
            })
            .map(({ h, alertas }) => {
              const nivel = nivelMaximoAlerta(alertas);
              const dispositivosActivos = DISPOSITIVOS.filter((d) => focoInstalado(h, d.key));
              return (
                <button
                  key={h.id}
                  onClick={() => onOpen(h.id)}
                  className={`w-full text-left rounded-xl border bg-white p-3.5 hover:shadow-sm transition-all ${
                    nivel === "alta" ? "border-rose-300" : nivel === "media" ? "border-amber-300" : "border-slate-200 hover:border-teal-400"
                  }`}
                >
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="font-bold text-slate-800 text-sm truncate">{h.nombre || "Sin nombre"}</div>
                      <div className="text-xs text-slate-500 mt-0.5">
                        {h.rut || "Sin RUT"} · {h.edad ? `${h.edad} años` : "edad ?"} · Cama {h.cama || "?"}
                      </div>
                    </div>
                    <div className="flex flex-col items-end gap-1 shrink-0">
                      <Pill tone="teal">{h.servicio}</Pill>
                      {nivel === "alta" && (
                        <Pill tone="red">

                        </Pill>
                      )}
                      {nivel === "media" && (
                        <Pill tone="amber">
                          <AlertTriangle size={10} /> Atención
                        </Pill>
                      )}
                    </div>
                  </div>

                  {alertas.length > 0 && (
                    <div className="mt-2 space-y-1">
                      {alertas.map((a, i) => (
                        <div
                          key={i}
                          className={`text-[11px] rounded px-2 py-1 border ${
                            a.nivel === "alta"
                              ? "bg-rose-50 text-rose-700 border-rose-200"
                              : "bg-amber-50 text-amber-700 border-amber-200"
                          }`}
                        >
                          {a.texto}
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="flex items-center justify-between mt-2.5">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      {dispositivosActivos.length > 0 ? (
                        dispositivosActivos.map((d) => (
                          <span key={d.key} className="text-[10px] font-bold bg-sky-50 text-sky-700 border border-sky-200 rounded px-1.5 py-0.5">
                            {d.label}
                          </span>
                        ))
                      ) : (
                        <span className="text-[11px] text-slate-400">Sin DIP activo</span>
                      )}
                    </div>
                    <span className="text-[11px] text-slate-400">
                      {h.evoluciones.length} visita{h.evoluciones.length !== 1 ? "s" : ""}
                    </span>
                  </div>
                </button>
              );
            })}
        </div>
      )}
    </div>
  );
}

/* Mini-gráfico de líneas SVG sin dependencias */
function TendenciaChart({ data }) {
  const W = 300, H = 130, pad = 24;
  const series = [
    { key: "itsCvc", color: "#0d9488", label: "ITS/CVC" },
    { key: "navmi", color: "#dc2626", label: "NAVMI" },
    { key: "itu", color: "#2563eb", label: "ITU/CUP" },
  ];
  const maxY = Math.max(1, ...data.flatMap((d) => series.map((s) => d[s.key])));
  const x = (i) => pad + (i * (W - pad * 2)) / Math.max(1, data.length - 1);
  const y = (v) => H - pad - (v / maxY) * (H - pad * 2);

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
        {/* ejes */}
        <line x1={pad} y1={H - pad} x2={W - pad} y2={H - pad} stroke="#e2e8f0" />
        <line x1={pad} y1={pad} x2={pad} y2={H - pad} stroke="#e2e8f0" />
        <text x={pad - 4} y={pad + 4} textAnchor="end" fontSize="8" fill="#94a3b8">{maxY.toFixed(1)}</text>
        <text x={pad - 4} y={H - pad} textAnchor="end" fontSize="8" fill="#94a3b8">0</text>
        {series.map((s) => {
          const pts = data.map((d, i) => `${x(i)},${y(d[s.key])}`).join(" ");
          return (
            <g key={s.key}>
              <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2" />
              {data.map((d, i) => (
                <circle key={i} cx={x(i)} cy={y(d[s.key])} r="2.5" fill={s.color} />
              ))}
            </g>
          );
        })}
        {data.map((d, i) => (
          <text key={i} x={x(i)} y={H - pad + 10} textAnchor="middle" fontSize="8" fill="#64748b">{d.mes}</text>
        ))}
      </svg>
      <div className="flex items-center justify-center gap-3 mt-1">
        {series.map((s) => (
          <span key={s.key} className="flex items-center gap-1 text-[10px] text-slate-500">
            <span className="w-2.5 h-2.5 rounded-full" style={{ background: s.color }} /> {s.label}
          </span>
        ))}
      </div>
    </div>
  );
}

/* Helpers de cuatrimestre */
function cuatriActual(iso) {
  const m = parseInt(iso.slice(5, 7), 10);
  return m <= 4 ? 1 : m <= 8 ? 2 : 3;
}
function rangoCuatrimestre(anio, c) {
  const inicio = { 1: "01", 2: "05", 3: "09" }[c];
  const finMes = { 1: "04", 2: "08", 3: "12" }[c];
  return { desde: `${anio}-${inicio}-01`, hasta: ultimoDiaMes(`${anio}-${finMes}`) };
}
function mesesDeCuatrimestre(anio, c) {
  const base = { 1: [1, 2, 3, 4], 2: [5, 6, 7, 8], 3: [9, 10, 11, 12] }[c];
  return base.map((m) => `${anio}-${String(m).padStart(2, "0")}`);
}
function ultimoDiaMes(iso) {
  const [y, m] = iso.split("-").map(Number);
  const d = new Date(y, m, 0).getDate();
  return `${iso}-${String(d).padStart(2, "0")}`;
}
function aniosDisponibles(hosp, hoy) {
  const set = new Set([hoy.slice(0, 4)]);
  hosp.forEach((h) => { if (h.fechaHospitalizacion) set.add(h.fechaHospitalizacion.slice(0, 4)); });
  return [...set].sort().reverse();
}

function exportarIndicadores({ anio, cuatri, desde, hasta, itsCvc, navmi, ituGlobal, ituPorServicio, tendencia, arepiExport }) {
  const lineas = [];
  lineas.push(`Indicadores IAAS - HDC Calama`);
  lineas.push(`Periodo,${anio} cuatrimestre ${cuatri},${desde} a ${hasta}`);
  lineas.push("");
  lineas.push("Indicador,Casos,Dias-dispositivo,Tasa x1000");
  lineas.push(`ITS/CVC,${itsCvc.casos},${itsCvc.diasDip},${itsCvc.tasa.toFixed(2)}`);
  lineas.push(`NAVMI,${navmi.casos},${navmi.diasDip},${navmi.tasa.toFixed(2)}`);
  lineas.push(`ITU/CUP global,${ituGlobal.casos},${ituGlobal.diasDip},${ituGlobal.tasa.toFixed(2)}`);
  lineas.push("");
  lineas.push("ITU/CUP por servicio,Casos,Dias-CUP,Tasa x1000");
  ituPorServicio.forEach((r) => lineas.push(`${r.servicio},${r.casos},${r.diasDip},${r.tasa.toFixed(2)}`));
  lineas.push("");
  lineas.push("AREpi,Casos,Dias-cama,Tasa x1000");
  (arepiExport || []).forEach((r) =>
    lineas.push(`${r.label.replace(/,/g, ";")},${r.casos},${r.diasCama || ""},${r.diasCama ? r.tasa.toFixed(2) : ""}`)
  );
  lineas.push("");
  lineas.push("Tendencia mensual,ITS/CVC,NAVMI,ITU/CUP");
  tendencia.forEach((t) => lineas.push(`${t.mes},${t.itsCvc.toFixed(2)},${t.navmi.toFixed(2)},${t.itu.toFixed(2)}`));

  const blob = new Blob(["\uFEFF" + lineas.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Indicadores_IAAS_${anio}_C${cuatri}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

          <History size={28} className="mx-auto text-slate-300 mb-2" />
          <p className="text-sm text-slate-500">Sin fichas cerradas aún.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {filtrados
            .sort((a, b) => (a.cierre?.fechaAlta < b.cierre?.fechaAlta ? 1 : -1))
            .map((h) => (
              <button
                key={h.id}
                onClick={() => onOpen(h.id)}
                className="w-full text-left rounded-xl border border-slate-200 bg-white p-3.5 hover:border-teal-400 transition-all"
              >
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <div className="font-bold text-slate-800 text-sm truncate">{h.nombre}</div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      {h.rut} · Ingreso {fmtDate(h.fechaHospitalizacion)} → Alta {fmtDate(h.cierre?.fechaAlta)}
                    </div>
                  </div>
                  <Pill tone={h.cierre?.presentoIAAS === "SI" ? "red" : "green"}>
                    {h.cierre?.presentoIAAS === "SI" ? "Presentó IAAS" : "Sin IAAS"}
                  </Pill>
                </div>
              </button>
            ))}
        </div>
      )}
    </div>
  );
}

function CateteresCVCEditor({ cateteres, onChange }) {
  const addCateter = () => onChange([...cateteres, newCateterCVC()]);
  const updateCateter = (id, patch) => onChange(cateteres.map((c) => (c.id === id ? { ...c, ...patch } : c)));
  const removeCateter = (id) => onChange(cateteres.filter((c) => c.id !== id));

  return (
    <div className="space-y-2">
      {cateteres.map((c, idx) => (
        <div key={c.id} className="rounded-lg border border-slate-200 p-3 space-y-2 bg-slate-50">
          <div className="flex items-center justify-between">
            <span className="text-xs font-bold text-slate-500">
              Catéter #{idx + 1} {c.fechaRetiro ? "· retirado" : ""}
            </span>
            <button type="button" onClick={() => removeCateter(c.id)} className="text-rose-600">
              <X size={14} />
            </button>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <Field label="Tipo de catéter">
              <Select value={c.tipo} onChange={(e) => updateCateter(c.id, { tipo: e.target.value })}>
                {TIPOS_CVC.map((t) => (
                  <option key={t}>{t}</option>
                ))}
              </Select>
            </Field>
            <Field label="Ubicación / lado">
              <TextInput value={c.ubicacion} onChange={(e) => updateCateter(c.id, { ubicacion: e.target.value })} placeholder="Ej. derecho" />
            </Field>
            <Field label="Fecha instalación">
              <TextInput
                type="date"
                value={c.fechaInstalacion}
                onChange={(e) => updateCateter(c.id, { fechaInstalacion: e.target.value })}
              />
            </Field>
            <Field label="Fecha retiro (si aplica)">
              <TextInput type="date" value={c.fechaRetiro} onChange={(e) => updateCateter(c.id, { fechaRetiro: e.target.value })} />
            </Field>
          </div>
          <label className="flex items-center gap-2">
            <input
              type="checkbox"
              checked={c.nutricionParenteral}
              onChange={(e) => updateCateter(c.id, { nutricionParenteral: e.target.checked })}
              className="h-4 w-4 accent-teal-700"
            />
            <span className="text-sm text-slate-700">En uso para nutrición parenteral</span>
          </label>
        </div>
      ))}
      <button
        type="button"
        onClick={addCateter}
        className="flex items-center gap-1.5 text-sm font-semibold text-teal-700 hover:underline"
      >
        <Plus size={14} /> Agregar catéter CVC
      </button>
      {cateteres.length === 0 && <p className="text-xs text-slate-400">Sin catéteres CVC registrados.</p>}
    </div>
  );
}

                <div className="grid grid-cols-2 gap-2 pl-6">

                    <TextInput

      </div>
    </div>
  );

function ElementoToggle({ texto, estado, fecha, onChange }) {
  return (
    <div className="rounded-lg border border-slate-200 px-3 py-2">
      <div className="flex items-start justify-between gap-2">
        <span className="text-sm text-slate-700 flex-1">{texto}</span>
        <div className="flex gap-1 shrink-0">
          <button
            type="button"
            onClick={() => onChange({ estado: "no_presenta", fecha: "" })}
            className={`text-[11px] rounded-full px-2 py-1 border font-semibold ${
              estado === "no_presenta" ? "bg-emerald-600 text-white border-emerald-600" : "border-slate-300 text-slate-500"
            }`}
          >
            No presenta
          </button>
          <button
            type="button"
            onClick={() => onChange({ estado: "presente", fecha: fecha || todayISO() })}
            className={`text-[11px] rounded-full px-2 py-1 border font-semibold ${
              estado === "presente" ? "bg-rose-600 text-white border-rose-600" : "border-slate-300 text-slate-500"
            }`}
          >
            Presente
          </button>
        </div>
      </div>
      {estado === "presente" && (
        <div className="mt-1.5 flex items-center gap-1.5">
          <span className="text-[11px] text-slate-500">Fecha del elemento:</span>
          <input
            type="date"
            value={fecha}
            onChange={(e) => onChange({ estado: "presente", fecha: e.target.value })}
            className="text-xs rounded-md border border-slate-300 px-2 py-1"
          />
        </div>
      )}
      {estado === "no_revisado" && <span className="text-[10px] text-amber-600 mt-1 inline-block">Sin revisar</span>}
    </div>
  );
}

function GrupoElementos({ grupo, estados, onToggle, hospitalizacion }) {
  const visibles = grupo.elementos.filter(
    (el) => !ELEMENTOS_COMPARTIDOS_IDS.includes(el.id) && elementoAplicable(el.id, hospitalizacion)
  );
  if (visibles.length === 0) return null;
  return (
    <div className="space-y-1.5">
      <p className="text-[11px] font-semibold uppercase tracking-wide text-slate-500">{grupo.titulo}</p>
      <div className="space-y-1.5">
        {visibles.map((el) => (
          <ElementoToggle
            key={el.id}
            texto={el.texto}
            estado={estados[el.id]?.estado || "no_revisado"}
            fecha={estados[el.id]?.fecha || ""}
            onChange={(patch) => onToggle(el.id, patch)}
          />
        ))}
      </div>
    </div>
  );
}

function CriteriosFocoSection({ focoKey, estados, onUpdate, hospitalizacion }) {
  const foco = CRITERIOS_FOCOS[focoKey];
  const idsVisibles = gruposDeFoco(foco)
    .flatMap((g) => foco[g].elementos)
    .filter((el) => !ELEMENTOS_COMPARTIDOS_IDS.includes(el.id) && elementoAplicable(el.id, hospitalizacion))
    .map((el) => el.id);
  const sinRevisar = idsVisibles.filter((id) => (estados[id]?.estado || "no_revisado") === "no_revisado").length;
  return (
    <SectionCard icon={FileWarning} title={`Elementos IAAS — ${foco.label}`} subtitle={foco.foco}>
      {sinRevisar > 0 && (
        <p className="text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5">
          {sinRevisar} elemento(s) sin revisar en esta visita.
        </p>
      )}
      {gruposDeFoco(foco).map((g) => (
        <GrupoElementos
          key={g}
          grupo={foco[g]}
          estados={estados}
          hospitalizacion={hospitalizacion}
          onToggle={(id, patch) => onUpdate({ ...estados, [id]: { ...estados[id], ...patch } })}
        />
      ))}
    </SectionCard>
  );
}

function SeccionSignosGenerales({ estados, onUpdate }) {
  return (
    <SectionCard icon={AlertTriangle} title="Signos generales" subtitle="Se pregunta una sola vez y aplica a todos los dispositivos activos">

        {ELEMENTOS_COMPARTIDOS_IDS.map((id) => (

            estado={estados[id]?.estado || "no_revisado"}

            onChange={(patch) => onUpdate({ ...estados, [id]: { ...estados[id], ...patch } })}
          />
        ))}
      </div>
    </SectionCard>
  );
}

function EvolucionForm({ hospitalizacion, evolucionInicial, onCancel, onSave }) {
  const editando = !!evolucionInicial;
  const [ev, setEv] = useState(() => evolucionInicial || emptyEvolucion());
  const [criterios, setCriterios] = useState(() => ensureCriteriosIAAS(hospitalizacion));
  const [errorFechas, setErrorFechas] = useState([]);

  const setSintoma = (key, patch) =>
    setEv((e) => ({ ...e, sintomas: { ...e.sintomas, [key]: { ...e.sintomas[key], ...patch } } }));

  const validar = () => {
    const faltantes = SINTOMAS.filter((s) => ev.sintomas[s.key].presente && !ev.sintomas[s.key].fecha).map((s) => s.label);
    setErrorFechas(faltantes);
    return faltantes.length === 0;
  };

  const guardar = () => {
    if (!validar()) return;
    onSave({ ...ev, criteriosRevisados: criterios }, criterios);
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onCancel} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <ArrowLeft size={18} />
        </button>
        <div>
          <h1 className="text-lg font-bold text-slate-800">{editando ? "Editar visita" : "Registrar visita"}</h1>
          <p className="text-xs text-slate-500">{hospitalizacion.nombre}</p>
        </div>
      </div>

      <Field label="Fecha de la visita">
        <TextInput type="date" value={ev.fecha} onChange={(e) => setEv({ ...ev, fecha: e.target.value })} className="max-w-[180px]" />
      </Field>

      {Object.keys(criterios).length > 0 && (
        <div className="space-y-3">
          {criterios.compartidos && (
            <SeccionSignosGenerales
              estados={criterios.compartidos}
              onUpdate={(next) => setCriterios((c) => ({ ...c, compartidos: next }))}
            />
          )}
          {Object.keys(criterios)
            .filter((k) => k !== "compartidos")
            .map((focoKey) => (
              <CriteriosFocoSection
                key={focoKey}
                focoKey={focoKey}
                estados={criterios[focoKey]}
                hospitalizacion={hospitalizacion}
                onUpdate={(next) => setCriterios((c) => ({ ...c, [focoKey]: next }))}
              />
            ))}
        </div>
      )}

      {hospitalizacion.dip?.vmi?.instalado && !hospitalizacion.dip?.vmi?.fechaRetiro && (
        <SectionCard icon={Wind} title="Parámetros VMI del día" defaultOpen={false}>
          <p className="text-[11px] text-slate-500 mb-2">
            Registra los parámetros ventilatorios de esta visita. Al imprimir la ficha verás los de los últimos días en columnas,
            para seguir la tendencia (útil en la vigilancia de NAVMI).
          </p>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Modo ventilatorio">
              <TextInput
                value={ev.vmiParam?.modo || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, modo: e.target.value } })}
                placeholder="Ej: VC, PC, SIMV"
              />
            </Field>
            <Field label="FiO₂ (%)">
              <TextInput
                value={ev.vmiParam?.fio2 || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, fio2: e.target.value } })}
              />
            </Field>
            <Field label="PEEP (cmH₂O)">
              <TextInput
                value={ev.vmiParam?.peep || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, peep: e.target.value } })}
              />
            </Field>
            <Field label="Volumen corriente (mL)">
              <TextInput
                value={ev.vmiParam?.volumen || ""}
                onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, volumen: e.target.value } })}
              />
            </Field>
          </div>
          <Field label="Secreciones (aspecto/cantidad)">
            <TextInput
              value={ev.vmiParam?.secreciones || ""}
              onChange={(e) => setEv({ ...ev, vmiParam: { ...ev.vmiParam, secreciones: e.target.value } })}
              placeholder="Ej: purulentas abundantes"
            />
          </Field>
        </SectionCard>

      <SectionCard icon={Droplet} title="Exámenes de laboratorio" defaultOpen={false}>
        <Field label="Fecha de toma de muestra (si difiere de la visita)">

            type="date"
            value={ev.fechaExamenes || ""}
            onChange={(e) => setEv({ ...ev, fechaExamenes: e.target.value })}
          />
        </Field>
        <div className="grid grid-cols-2 gap-3 mt-2">
          {EXAMENES.map((ex) => (
            <Field key={ex.key} label={`${ex.label} (${ex.unit})`}>

function ResumenSintomasEvolucion({ ev }) {
  const activos = SINTOMAS.filter((s) => ev.sintomas[s.key]?.presente);
  const examenesLlenos = EXAMENES.filter((e) => ev.examenes[e.key]);
  const elementosPresentes = [];
  const compartidosVistos = new Set();
  Object.keys(ev.criteriosRevisados || {})
    .filter((k) => k !== "compartidos")
    .forEach((focoKey) => {
      const foco = CRITERIOS_FOCOS[focoKey];
      if (!foco) return;
      const estados = ev.criteriosRevisados[focoKey];
      const compartidos = ev.criteriosRevisados.compartidos || {};
      gruposDeFoco(foco).forEach((g) => {
        foco[g].elementos.forEach((el) => {
          const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
          const estado = esCompartido ? compartidos[el.id] : estados[el.id];
          if (estado?.estado !== "presente") return;
          if (esCompartido) {
            if (compartidosVistos.has(el.id)) return;
            compartidosVistos.add(el.id);
            elementosPresentes.push({ key: `compartido-${el.id}`, texto: el.texto, fecha: estado.fecha });
          } else {
            elementosPresentes.push({ key: `${focoKey}-${el.id}`, texto: `${foco.label}: ${el.texto}`, fecha: estado.fecha });
          }
        });
      });
    });
  return (
    <div className="space-y-1.5">
      {elementosPresentes.length > 0 && (
        <div className="flex flex-wrap gap-1">
          {elementosPresentes.map((e) => (
            <span key={e.key} className="text-[10px] font-bold bg-rose-50 text-rose-700 border border-rose-200 rounded px-1.5 py-0.5">
              {e.texto} · {fmtDate(e.fecha)}
            </span>
          ))}
        </div>
      )}
      {activos.length > 0 && (
        <div className="flex flex-wrap gap-1">
          {activos.map((s) => (
            <span key={s.key} className="text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-200 rounded px-1.5 py-0.5">
              {s.label} · {fmtDate(ev.sintomas[s.key].fecha)}
            </span>
          ))}
        </div>
      )}
      {examenesLlenos.length > 0 && (
        <div className="text-xs text-slate-600">
          {examenesLlenos.map((e) => `${e.label} ${ev.examenes[e.key]}`).join(" · ")}
          {ev.fechaExamenes ? ` (muestra ${fmtDate(ev.fechaExamenes)})` : ""}
        </div>
      )}
      {(ev.hemocultivos || []).length > 0 && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Hemocultivos:</span>{" "}
          {ev.hemocultivos
            .map((hc) => {
              const origen = hc.origen === "arrastre" ? "arrastre" : hc.origen === "punta" ? "punta cat." : "perif.";
              const res = hc.pendiente ? "(p)" : hc.resultado || "—";
              return `${res} [${origen}${hc.fecha ? ` ${fmtDate(hc.fecha)}` : ""}]`;
            })
            .join(" · ")}
        </div>
      )}
      {CULTIVOS.filter((c) => ev.cultivos[c.key]?.resultado || ev.cultivos[c.key]?.pendiente).length > 0 && (
        <div className="text-xs text-slate-600">
          {CULTIVOS.filter((c) => ev.cultivos[c.key]?.resultado || ev.cultivos[c.key]?.pendiente)
            .map((c) => {
              const cu = ev.cultivos[c.key];
              return `${c.label}: ${cu.pendiente ? "(p)" : cu.resultado}${cu.fecha ? ` (${fmtDate(cu.fecha)})` : ""}`;
            })
            .join(" · ")}
        </div>
      )}
      {ev.imagenes?.torax && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Img. tórax:</span> {ev.imagenes.torax}
        </div>
      )}
      {ev.imagenes?.otros && (
        <div className="text-xs text-slate-600">
          <span className="font-semibold">Otras imágenes:</span> {ev.imagenes.otros}
        </div>
      )}
      {ev.antibioticos && <div className="text-xs text-slate-600">ATB: {ev.antibioticos}</div>}
      {ev.comentario && <div className="text-xs text-slate-500 italic">"{ev.comentario}"</div>}
      {elementosPresentes.length === 0 && activos.length === 0 && examenesLlenos.length === 0 && (ev.hemocultivos || []).length === 0 && !ev.imagenes?.torax && !ev.imagenes?.otros && !ev.antibioticos && !ev.comentario && (
        <div className="text-xs text-slate-400">Visita sin hallazgos relevantes registrados.</div>
      )}
    </div>
  );
}

function toggleCriterio(list, criterio) {
  return list.includes(criterio) ? list.filter((c) => c !== criterio) : [...list, criterio];
}

function CriteriosChecklist({ criterios, marcados, onToggle }) {
  if (!criterios.length) return null;
  return (
    <div className="flex flex-wrap gap-1.5 mt-1.5">
      {criterios.map((c) => {
        const activo = marcados.includes(c);
        return (
          <button
            key={c}
            type="button"
            onClick={() => onToggle(c)}
            className={`text-[11px] rounded-full px-2.5 py-1 border font-medium transition-colors ${
              activo ? "bg-rose-600 text-white border-rose-600" : "bg-white text-slate-600 border-slate-300"
            }`}
          >
            {c}
          </button>
        );
      })}
    </div>
  );
}

/* Matriz horizontal: fechas en columnas, parámetros en filas (para el PDF) */
function MatrizEvolucionHorizontal({ evoluciones }) {
  const evs = [...evoluciones].sort((a, b) => (a.fecha < b.fecha ? -1 : 1));
  if (evs.length === 0) return <div className="text-xs text-slate-500">Sin visitas registradas.</div>;

  const th = "border border-slate-300 px-1.5 py-1 text-center bg-slate-100 font-semibold whitespace-nowrap";
  const rowLabel = "border border-slate-300 px-1.5 py-1 font-semibold bg-slate-50 whitespace-nowrap text-left";
  const cell = "border border-slate-300 px-1.5 py-1 text-center";

  const filaSintomasResp = (ev) => {
    const s = ev.sintomas?.sintomasRespiratorios;
    return s?.presente ? `Sí (${fmtDate(s.fecha)})` : "";
  };

  return (
    <div className="overflow-x-auto">
      <table className="border-collapse text-[10px] w-full" style={{ tableLayout: "fixed" }}>
        <thead>
          <tr>
            <th className={th} style={{ width: "110px" }}>Parámetro</th>
            {evs.map((ev) => (
              <th key={ev.id} className={th}>{fmtDate(ev.fecha)}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {EXAMENES.map((ex) => (
            <tr key={ex.key}>
              <td className={rowLabel}>{ex.label}{ex.unit ? ` (${ex.unit})` : ""}</td>
              {evs.map((ev) => (
                <td key={ev.id} className={cell}>{ev.examenes?.[ex.key] || "—"}</td>
              ))}
            </tr>
          ))}
          {evs.some((ev) => ev.fechaExamenes) && (
            <tr>
              <td className={rowLabel}>Fecha muestra (labs)</td>
              {evs.map((ev) => (
                <td key={ev.id} className={cell}>{ev.fechaExamenes ? fmtDate(ev.fechaExamenes) : "—"}</td>
              ))}
            </tr>
          )}
          {evs.some((ev) => (ev.hemocultivos || []).length > 0) && (
            <tr>
              <td className={rowLabel}>Hemocultivos</td>
              {evs.map((ev) => (
                <td key={ev.id} className={cell} style={{ whiteSpace: "pre-line" }}>
                  {(ev.hemocultivos || []).length > 0
                    ? ev.hemocultivos
                        .map((hc) => {
                          const o = hc.origen === "arrastre" ? "arr." : hc.origen === "punta" ? "punta" : "perif.";
                          return `${hc.pendiente ? "(p)" : hc.resultado || "—"} [${o}${hc.fecha ? " " + fmtDate(hc.fecha) : ""}]`;
                        })
                        .join("\n")
                    : "—"}
                </td>
              ))}
            </tr>
          )}
          {CULTIVOS.map((c) =>
            evs.some((ev) => ev.cultivos?.[c.key]?.resultado || ev.cultivos?.[c.key]?.pendiente) ? (
              <tr key={c.key}>
                <td className={rowLabel}>{c.label}</td>
                {evs.map((ev) => {
                  const cu = ev.cultivos?.[c.key];
                  const val = cu?.pendiente ? "(p)" : cu?.resultado || "";
                  return (
                    <td key={ev.id} className={cell}>
                      {val ? `${val}${cu.fecha ? ` (${fmtDate(cu.fecha)})` : ""}` : "—"}
                    </td>
                  );
                })}
              </tr>
            ) : null
          )}
          <tr>
            <td className={rowLabel}>Síntomas resp.</td>
            {evs.map((ev) => (
              <td key={ev.id} className={cell}>{filaSintomasResp(ev) || "—"}</td>
            ))}
          </tr>
          <tr>
            <td className={rowLabel}>Img. tórax</td>
            {evs.map((ev) => (
              <td key={ev.id} className={cell}>{ev.imagenes?.torax || "—"}</td>
            ))}
          </tr>
          <tr>
            <td className={rowLabel}>Otras imágenes</td>
            {evs.map((ev) => (
              <td key={ev.id} className={cell}>{ev.imagenes?.otros || "—"}</td>
            ))}
          </tr>
          <tr>
            <td className={rowLabel}>ATB</td>
            {evs.map((ev) => (
              <td key={ev.id} className={cell}>{ev.antibioticos || "—"}</td>
            ))}
          </tr>
          <tr>
            <td className={rowLabel}>VMI (parámetros)</td>
            {evs.map((ev) => (
              <td key={ev.id} className={cell} style={{ whiteSpace: "pre-line" }}>{formatVmiParam(ev.vmiParam) || "—"}</td>
            ))}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function elementosCriteriosDeEv(ev) {
  const out = [];
  const compartidosVistos = new Set();
  Object.keys(ev.criteriosRevisados || {})
    .filter((k) => k !== "compartidos")
    .forEach((focoKey) => {
      const foco = CRITERIOS_FOCOS[focoKey];
      if (!foco) return;
      const estados = ev.criteriosRevisados[focoKey];
      const compartidos = ev.criteriosRevisados.compartidos || {};
      gruposDeFoco(foco).forEach((g) => {
        foco[g].elementos.forEach((el) => {
          const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
          const estado = esCompartido ? compartidos[el.id] : estados[el.id];
          if (estado?.estado !== "presente") return;
          if (esCompartido) {
            if (compartidosVistos.has(el.id)) return;
            compartidosVistos.add(el.id);
            out.push(`${el.texto} (${fmtDate(estado.fecha)})`);
          } else {
            out.push(`${foco.label}: ${el.texto} (${fmtDate(estado.fecha)})`);
          }
        });
      });
    });
  return out;
}

function tieneHallazgosCriterios(ev) {
  return elementosCriteriosDeEv(ev).length > 0 || !!ev.comentario;
}

function ResumenCriteriosInline({ ev }) {
  const els = elementosCriteriosDeEv(ev);
  return (
    <span className="text-slate-700">
      {els.join(" · ")}
      {els.length > 0 && ev.comentario ? " — " : ""}
      {ev.comentario ? <span className="italic text-slate-500">"{ev.comentario}"</span> : ""}
    </span>
  );
}

function formatVmiParam(p) {
  if (!p) return "";
  const partes = [];
  if (p.modo) partes.push(p.modo);
  if (p.fio2) partes.push(`FiO₂ ${p.fio2}`);
  if (p.peep) partes.push(`PEEP ${p.peep}`);
  if (p.volumen) partes.push(`VT ${p.volumen}`);
  if (p.secreciones) partes.push(`Secr: ${p.secreciones}`);
  return partes.join("\n");
}
