            ))}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

function elementosCriteriosDeEv(ev) {
  const out = [];
  const compartidosVistos = new Set();
  Object.keys(ev.criteriosRevisados || {})
    .filter((k) => k !== "compartidos")
    .forEach((focoKey) => {
      const foco = CRITERIOS_FOCOS[focoKey];
      if (!foco) return;
      const estados = ev.criteriosRevisados[focoKey];
      const compartidos = ev.criteriosRevisados.compartidos || {};
      gruposDeFoco(foco).forEach((g) => {
        foco[g].elementos.forEach((el) => {
          const esCompartido = ELEMENTOS_COMPARTIDOS_IDS.includes(el.id);
          const estado = esCompartido ? compartidos[el.id] : estados[el.id];
          if (estado?.estado !== "presente") return;
          if (esCompartido) {
            if (compartidosVistos.has(el.id)) return;
            compartidosVistos.add(el.id);
            out.push(`${el.texto} (${fmtDate(estado.fecha)})`);
          } else {
            out.push(`${foco.label}: ${el.texto} (${fmtDate(estado.fecha)})`);
          }
        });
      });
    });
  return out;
}

function tieneHallazgosCriterios(ev) {
  return elementosCriteriosDeEv(ev).length > 0 || !!ev.comentario;
}

function ResumenCriteriosInline({ ev }) {
  const els = elementosCriteriosDeEv(ev);
  return (
    <span className="text-slate-700">
      {els.join(" · ")}
      {els.length > 0 && ev.comentario ? " — " : ""}
      {ev.comentario ? <span className="italic text-slate-500">"{ev.comentario}"</span> : ""}
    </span>
  );
}

function formatVmiParam(p) {
  if (!p) return "";
  const partes = [];
  if (p.modo) partes.push(p.modo);
  if (p.fio2) partes.push(`FiO₂ ${p.fio2}`);
  if (p.peep) partes.push(`PEEP ${p.peep}`);
  if (p.volumen) partes.push(`VT ${p.volumen}`);
  if (p.secreciones) partes.push(`Secr: ${p.secreciones}`);
  return partes.join("\n");
}

  const toggle = (tipoKey) => {
    const activo = aislamientos.some((a) => a.tipo === tipoKey);
    const lista = activo
      ? aislamientos.filter((a) => a.tipo !== tipoKey)
      : [...aislamientos, { tipo: tipoKey, fecha: todayISO(), motivo: motivoNuevo[tipoKey] || "" }];
    onUpdate({ ...h, aislamientos: lista, updatedAt: new Date().toISOString() });
  };

  return (
    <SectionCard icon={ShieldAlert} title="Aislamiento" defaultOpen={aislamientos.length > 0}>
      <p className="text-[11px] text-slate-500 mb-2">
        Marca los tipos activos. Si aparece una nueva infección (ej. COVID → gotitas + contacto), agrégalos aquí con la fecha
        en que se indicó. Puede haber varios a la vez.
      </p>
      <div className="flex flex-wrap gap-2">
        {TIPOS_AISLAMIENTO.map((t) => {
          const activo = aislamientos.some((a) => a.tipo === t.key);
          return (
            <button
              key={t.key}
              type="button"
              disabled={!editable}
              onClick={() => toggle(t.key)}
              className={`text-xs font-semibold rounded-full px-3 py-1.5 border ${
                activo ? "bg-teal-700 text-white border-teal-700" : "bg-white text-slate-600 border-slate-300"
              } ${!editable ? "opacity-60" : ""}`}
            >
              {t.label}
            </button>
          );
        })}
      </div>

      {aislamientos.length > 0 && (
        <div className="mt-3 space-y-1.5">
          {aislamientos.map((a) => {
            const label = TIPOS_AISLAMIENTO.find((t) => t.key === a.tipo)?.label || a.tipo;
            return (
              <div key={a.tipo} className="text-xs rounded-lg border border-slate-200 px-3 py-1.5">
                <div className="flex items-center justify-between">
                  <span className="font-semibold text-slate-700">{label}</span>
                  <span className="text-slate-400">desde {fmtDate(a.fecha)}</span>
                </div>
                {editable && (
                  <TextInput
                    value={a.motivo || ""}
                    onChange={(e) => {
                      const lista = aislamientos.map((x) => (x.tipo === a.tipo ? { ...x, motivo: e.target.value } : x));
                      onUpdate({ ...h, aislamientos: lista, updatedAt: new Date().toISOString() });
                    }}
                    placeholder="Motivo (ej: SARS-CoV-2, BLEE, C. difficile…)"
                    className="mt-1 text-xs"
                  />
                )}
                {!editable && a.motivo && <div className="text-slate-500 mt-0.5">{a.motivo}</div>}
              </div>
            );
          })}
        </div>
      )}
    </SectionCard>
  );
}

function TrasladosCard({ hospitalizacion: h, onUpdate }) {
  const [agregando, setAgregando] = useState(false);
  const [fecha, setFecha] = useState(todayISO());
  const [servicioNuevo, setServicioNuevo] = useState(SERVICIOS[0]);
  const traslados = [...(h.traslados || [])].sort((a, b) => (a.fecha < b.fecha ? -1 : 1));

  const guardar = () => {
    if (!fecha) return;
    const list = [...(h.traslados || []), { fecha, servicio: servicioNuevo }];
    onUpdate({ ...h, traslados: list, updatedAt: new Date().toISOString() });
    setAgregando(false);
    setFecha(todayISO());
  };

  const eliminar = (idx) => {
    const list = (h.traslados || []).filter((_, i) => i !== idx);
    onUpdate({ ...h, traslados: list, updatedAt: new Date().toISOString() });
  };

  return (
    <SectionCard icon={ArrowRightLeft} title="Traslados de servicio" defaultOpen={false}>
      <p className="text-[11px] text-slate-500 mb-2">
        Si el paciente cambia de servicio, regístralo aquí. La app reparte los días-dispositivo al servicio responsable de
        cada día, para que las tasas por servicio salgan correctas (regla MINSAL).
      </p>

      <div className="text-xs mb-2">
        <span className="text-slate-400">Servicio de ingreso:</span>{" "}
        <span className="font-semibold text-slate-700">{h.servicio}</span>{" "}
        <span className="text-slate-400">(desde {fmtDate(h.fechaHospitalizacion)})</span>
      </div>

      {traslados.length > 0 && (
        <div className="space-y-1 mb-2">
          {traslados.map((t, i) => (
            <div key={i} className="flex items-center justify-between text-xs rounded-lg border border-slate-200 px-3 py-1.5">
              <span>
                <span className="text-slate-400">{fmtDate(t.fecha)} →</span>{" "}
                <span className="font-semibold text-slate-700">{t.servicio}</span>
              </span>
              <button onClick={() => eliminar(i)} className="text-rose-400 text-[11px] hover:text-rose-600">
                Quitar
              </button>
            </div>
          ))}
        </div>
      )}

      {agregando ? (
        <div className="rounded-lg border border-slate-200 p-2.5 space-y-2">
          <div className="grid grid-cols-2 gap-2">
            <Field label="Fecha de traslado">
              <TextInput type="date" value={fecha} onChange={(e) => setFecha(e.target.value)} />
            </Field>
            <Field label="Nuevo servicio">
              <Select value={servicioNuevo} onChange={(e) => setServicioNuevo(e.target.value)}>
                {SERVICIOS.map((s) => (
                  <option key={s}>{s}</option>
                ))}
              </Select>
            </Field>
          </div>
          <div className="flex gap-2">
            <button onClick={guardar} className="flex-1 rounded-lg bg-teal-700 text-white text-xs font-semibold py-2">
              Guardar traslado
            </button>
            <button onClick={() => setAgregando(false)} className="rounded-lg border border-slate-300 text-slate-600 text-xs px-3">
              Cancelar
            </button>
          </div>
        </div>
      ) : (
        <button
          onClick={() => setAgregando(true)}
          className="w-full rounded-lg border border-dashed border-slate-300 text-slate-500 text-xs font-semibold py-2 hover:border-teal-400 hover:text-teal-700"
        >
          + Registrar traslado
        </button>
      )}
    </SectionCard>
  );
}

function FichaDetail({ hospitalizacion, allHospitalizaciones, onBack, onUpdate, onDelete }) {
  const [addingEvolucion, setAddingEvolucion] = useState(false);
  const [editingEvolucion, setEditingEvolucion] = useState(null);
  const [closing, setClosing] = useState(false);
  const [notificando, setNotificando] = useState(false);
  const [editingNotif, setEditingNotif] = useState(null);
  const [viewingNotif, setViewingNotif] = useState(null);
  const [viewingFicha, setViewingFicha] = useState(false);
  const [alertaAltaVista, setAlertaAltaVista] = useState(false);
  const dias = daysBetween(lastMovementDate(hospitalizacion), todayISO());
  const alerta = hospitalizacion.estado === "activo" && dias >= ALERTA_DIAS;
  const notificaciones = hospitalizacion.notificaciones || [];

  const historialPrevio = allHospitalizaciones.filter(
    (h) => h.id !== hospitalizacion.id && h.rut === hospitalizacion.rut && h.estado === "cerrado"
  );

  const guardarEvolucion = (ev, criteriosIAAS) => {
    const yaExiste = hospitalizacion.evoluciones.some((e) => e.id === ev.id);
    const evoluciones = yaExiste
      ? hospitalizacion.evoluciones.map((e) => (e.id === ev.id ? ev : e))
      : [...hospitalizacion.evoluciones, ev];
    const updated = {
      ...hospitalizacion,
      evoluciones,
      criteriosIAAS: criteriosIAAS || hospitalizacion.criteriosIAAS,
      updatedAt: new Date().toISOString(),
    };
    onUpdate(updated);
    setAddingEvolucion(false);
    setEditingEvolucion(null);
  };

  const eliminarEvolucion = (id) => {
    if (!window.confirm("¿Eliminar esta visita? No se puede deshacer.")) return;
    onUpdate({
      ...hospitalizacion,
      evoluciones: hospitalizacion.evoluciones.filter((e) => e.id !== id),
      updatedAt: new Date().toISOString(),
    });
  };

  const confirmarCierre = (cierre) => {
    onUpdate({ ...hospitalizacion, estado: "cerrado", cierre, updatedAt: new Date().toISOString() });
    setClosing(false);
    setAlertaAltaVista(true);
    setViewingFicha(true);
  };

  const guardarNotificacion = (n) => {
    const yaExiste = notificaciones.some((x) => x.id === n.id);
    const list = yaExiste ? notificaciones.map((x) => (x.id === n.id ? n : x)) : [...notificaciones, n];
    onUpdate({ ...hospitalizacion, notificaciones: list, updatedAt: new Date().toISOString() });
    setNotificando(false);
    setEditingNotif(null);
  };

  if (addingEvolucion) {
    return <EvolucionForm hospitalizacion={hospitalizacion} onCancel={() => setAddingEvolucion(false)} onSave={guardarEvolucion} />;
  }

  if (editingEvolucion) {
    return (
      <EvolucionForm
        hospitalizacion={hospitalizacion}
        evolucionInicial={editingEvolucion}
        onCancel={() => setEditingEvolucion(null)}
        onSave={guardarEvolucion}
      />
    );
  }

  if (notificando) {
    return (
      <NotificacionForm
        hospitalizacion={hospitalizacion}
        notificacion={editingNotif}
        onCancel={() => {
          setNotificando(false);
          setEditingNotif(null);
        }}
        onSave={guardarNotificacion}
      />
    );
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onBack} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <ArrowLeft size={18} />
        </button>
        <div className="flex-1 min-w-0">
          <h1 className="text-lg font-bold text-slate-800 truncate">{hospitalizacion.nombre}</h1>
          <p className="text-xs text-slate-500">{hospitalizacion.rut} · {hospitalizacion.servicio} · Cama {hospitalizacion.cama || "?"}</p>
        </div>
        {hospitalizacion.estado === "cerrado" ? (
          <Pill tone={hospitalizacion.cierre?.presentoIAAS === "SI" ? "red" : "green"}>
            {hospitalizacion.cierre?.presentoIAAS === "SI" ? "IAAS +" : "Cerrada"}
          </Pill>
        ) : (
          <Pill tone="teal">Activa</Pill>
        )}
      </div>

      <button
        onClick={() => { setViewingNotif(null); setViewingFicha(true); }}
        className="w-full flex items-center justify-center gap-1.5 rounded-lg border border-teal-200 bg-teal-50 text-teal-700 font-semibold text-sm py-2"
      >
        <ClipboardList size={15} /> Vista previa / Imprimir ficha de vigilancia
      </button>

      {alerta && alertaAltaVista && !closing && (
        <div className="rounded-lg border border-amber-200 bg-amber-50 px-3.5 py-2.5 text-xs text-amber-800 space-y-2">
          <div className="flex gap-2">
            <AlertTriangle size={15} className="shrink-0 mt-0.5" />
            <span>Sin registro de visita hace {dias} días. ¿El paciente fue dado de alta?</span>
          </div>
          <div className="flex gap-2 pl-6">
            <button
              onClick={() => setClosing(true)}
              className="rounded-md bg-amber-600 hover:bg-amber-700 text-white text-[11px] font-semibold px-2.5 py-1.5"
            >
              Sí, registrar alta ahora
            </button>
            <button
              onClick={() => setAlertaAltaVista(true)}
              className="rounded-md border border-amber-300 text-amber-700 text-[11px] font-semibold px-2.5 py-1.5"
            >
              No, sigue hospitalizado
            </button>
          </div>
        </div>
      )}

      {alerta && !alertaAltaVista && (
        <AlertaAltaModal
          dias={dias}
          nombre={hospitalizacion.nombre}
          onConfirmarAlta={() => {
            setAlertaAltaVista(true);
            setClosing(true);
          }}
          onSigueHospitalizado={() => setAlertaAltaVista(true)}
        />
      )}

      {historialPrevio.length > 0 && (
        <div className="rounded-lg border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-xs text-slate-600 flex gap-2">
          <History size={15} className="shrink-0 mt-0.5 text-slate-400" />
          <span>{historialPrevio.length} ingreso(s) anterior(es) de este paciente en el histórico.</span>
        </div>
      )}

      <SectionCard icon={ClipboardList} title="Datos de cabecera" defaultOpen={false}>
        <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">
          <div><span className="text-slate-400">Edad:</span> {hospitalizacion.edad || "—"}</div>
          <div><span className="text-slate-400">Previsión:</span> {hospitalizacion.prevision || "—"}</div>
          <div><span className="text-slate-400">F. hospitalización:</span> {fmtDate(hospitalizacion.fechaHospitalizacion)}</div>
          <div><span className="text-slate-400">F. ingreso vigilancia:</span> {fmtDate(hospitalizacion.fechaIngresoVigilancia)}</div>
          <div className="col-span-2"><span className="text-slate-400">Diagnóstico:</span> {hospitalizacion.diagnostico || "—"}</div>
          <div className="col-span-2"><span className="text-slate-400">Antecedentes:</span> {hospitalizacion.antecedentes || "—"}</div>
          <div><span className="text-slate-400">Aislamiento:</span> {formatAislamientos(hospitalizacion)}</div>
          <div><span className="text-slate-400">Agentes IAAS:</span> {hospitalizacion.agentesIAAS || "—"}</div>
        </div>
      </SectionCard>

      {hospitalizacion.estado === "activo" && (
        <div className="rounded-xl border border-slate-200 bg-white p-3">
          <div className="flex items-center justify-between gap-2">
            <div className="min-w-0">
              <div className="text-sm font-semibold text-slate-700">Modo de vigilancia</div>
              <div className="text-[11px] text-slate-500">
                {hospitalizacion.modoVigilancia === "pasiva"
                  ? "Pasiva: registro simplificado (dispositivos + IAAS), sin visitas diarias."
                  : "Activa: seguimiento completo con visitas y criterios."}
              </div>
            </div>
            <div className="flex gap-1.5 shrink-0">
              {["activa", "pasiva"].map((m) => (
                <button
                  key={m}
                  type="button"
                  onClick={() => onUpdate({ ...hospitalizacion, modoVigilancia: m, updatedAt: new Date().toISOString() })}
                  className={`text-xs font-semibold rounded-lg px-3 py-1.5 border ${
                    (hospitalizacion.modoVigilancia || "activa") === m ? "bg-teal-700 text-white border-teal-700" : "border-slate-300 text-slate-600"
                  }`}
                >
                  {m === "activa" ? "Activa" : "Pasiva"}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      <SectionCard icon={Syringe} title="Dispositivos invasivos" defaultOpen={false}>
        <div className="space-y-3">
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-sm font-semibold text-slate-700">CVC</span>
              {cateteresCVCActivos(hospitalizacion).length > 0 && (
                <span className="text-xs font-semibold text-teal-700">{focoDiasTotal(hospitalizacion, "cvc")}d totales</span>
              )}
            </div>
            <CateteresCVCEditor
              cateteres={hospitalizacion.dip.cvc.cateteres}
              onChange={(list) => onUpdate({ ...hospitalizacion, dip: { ...hospitalizacion.dip, cvc: { cateteres: list } } })}
            />
          </div>
          {DISPOSITIVOS.filter((d) => d.key !== "cvc").map((d) => {
            const dip = hospitalizacion.dip[d.key];
            const editable = hospitalizacion.estado === "activo";
            const setDip = (patch) =>
              onUpdate({ ...hospitalizacion, dip: { ...hospitalizacion.dip, [d.key]: { ...dip, ...patch }, }, updatedAt: new Date().toISOString() });

            if (!dip?.instalado) {
              // permitir instalar desde la ficha si no estaba
              return editable ? (
                <label key={d.key} className="flex items-center gap-2 text-sm rounded-lg border border-dashed border-slate-200 px-3 py-2 text-slate-500">
                  <input
                    type="checkbox"
                    checked={false}
                    onChange={() => setDip({ instalado: true, fechaInstalacion: todayISO() })}
                    className="h-4 w-4 accent-teal-700"
                  />
                  Instalar {d.label}
                </label>
              ) : null;
            }

            const diasUso = daysBetween(dip.fechaInstalacion, dip.fechaRetiro || todayISO());
            const previos = dip.previos || []; // episodios anteriores (por cambios)
            const diasPrevios = previos.reduce((s, p) => s + (p.fechaInstalacion ? daysBetween(p.fechaInstalacion, p.fechaRetiro || p.fechaInstalacion) : 0), 0);

            return (
              <div key={d.key} className="rounded-lg border border-slate-200 px-3 py-2.5">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="font-semibold text-slate-700 text-sm">{d.label}</span>
                  <span className="text-xs font-semibold text-teal-700">
                    {diasUso + diasPrevios}d {previos.length > 0 ? "(acum.)" : ""}
                  </span>
                </div>

                {previos.length > 0 && (
                  <div className="text-[11px] text-slate-400 mb-1.5">
                    {previos.map((p, i) => (
                      <div key={i}>
                        Anterior: {fmtDate(p.fechaInstalacion)} → {p.fechaRetiro ? fmtDate(p.fechaRetiro) : "?"}{p.ubicacion ? ` · ${p.ubicacion}` : ""}
                      </div>
                    ))}
                  </div>
                )}

                {editable ? (
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="Instalación (actual)">
                      <TextInput type="date" value={dip.fechaInstalacion} onChange={(e) => setDip({ fechaInstalacion: e.target.value })} />
                    </Field>
                    <Field label="Retiro">
                      <TextInput type="date" value={dip.fechaRetiro} onChange={(e) => setDip({ fechaRetiro: e.target.value })} />
                    </Field>
                    <Field label="Ubicación" className="col-span-2">
                      <TextInput value={dip.ubicacion} onChange={(e) => setDip({ ubicacion: e.target.value })} />
                    </Field>
                  </div>
                ) : (
                  <div className="text-xs text-slate-500">
                    {fmtDate(dip.fechaInstalacion)}{dip.fechaRetiro ? ` a ${fmtDate(dip.fechaRetiro)}` : " · en curso"} · {diasUso}d
                  </div>
                )}

                {editable && (
                  <button
                    onClick={() => {
                      const fRetiro = dip.fechaRetiro || todayISO();
                      const nuevoPrevio = { fechaInstalacion: dip.fechaInstalacion, fechaRetiro: fRetiro, ubicacion: dip.ubicacion };
                      onUpdate({
                        ...hospitalizacion,
                        dip: {
                          ...hospitalizacion.dip,
                          [d.key]: { instalado: true, fechaInstalacion: todayISO(), fechaRetiro: "", ubicacion: "", previos: [...previos, nuevoPrevio] },
                        },
                        updatedAt: new Date().toISOString(),
                      });
                    }}
                    className="mt-2 text-[11px] font-semibold text-teal-700 hover:underline"
                  >
                    + Registrar cambio de {d.label} (nuevo dispositivo)
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </SectionCard>

      <TrasladosCard hospitalizacion={hospitalizacion} onUpdate={onUpdate} />

      <AislamientoCard hospitalizacion={hospitalizacion} onUpdate={onUpdate} />

      {(hospitalizacion.modoVigilancia || "activa") === "activa" ? (
        <div>
          <div className="flex items-center justify-between mb-2">
            <h2 className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
              <Clock size={14} /> Evolución ({hospitalizacion.evoluciones.length} visita{hospitalizacion.evoluciones.length !== 1 ? "s" : ""})
          </h2>
          {hospitalizacion.estado === "activo" && (
            <button
              onClick={() => setAddingEvolucion(true)}
              className="flex items-center gap-1 text-xs font-semibold text-teal-700 hover:underline"
            >
              <Plus size={13} /> Añadir visita
            </button>
          )}
        </div>
        {hospitalizacion.evoluciones.length === 0 ? (
          <div className="rounded-xl border border-dashed border-slate-300 bg-white py-8 text-center text-sm text-slate-400">
            Sin visitas registradas todavía.
          </div>
        ) : (
          <div className="space-y-2">
            {[...hospitalizacion.evoluciones]
              .sort((a, b) => (a.fecha < b.fecha ? 1 : -1))
              .map((ev) => (
                <div key={ev.id} className="rounded-xl border border-slate-200 bg-white p-3.5">
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <CalendarClock size={13} className="text-slate-400" /> {fmtDate(ev.fecha)}
                      {ev.ubicacion && <span className="text-slate-400 font-normal">· {ev.ubicacion}</span>}
                    </div>
                    {hospitalizacion.estado === "activo" && (
                      <div className="flex items-center gap-3">
                        <button
                          onClick={() => setEditingEvolucion(ev)}
                          className="text-[11px] font-semibold text-teal-700 hover:underline"
                        >
                          Editar
                        </button>
                        <button
                          onClick={() => eliminarEvolucion(ev.id)}
                          className="text-[11px] font-semibold text-rose-400 hover:text-rose-600"
                        >
                          Eliminar
                        </button>
                      </div>
                    )}
                  </div>
                  <ResumenSintomasEvolucion ev={ev} />
                </div>
              ))}
          </div>
        )}
        </div>
      ) : (
        <div className="rounded-xl border border-sky-200 bg-sky-50 p-3.5">
          <div className="text-sm font-semibold text-sky-800 mb-1">Vigilancia pasiva</div>
          <p className="text-[11px] text-sky-700 mb-2">
            Registro simplificado: los días de dispositivo se cuentan de las fechas de instalación/retiro (arriba), y el
            resultado se define notificando el caso. No requiere visitas diarias. Los días y casos suman a las tasas.
          </p>
          <div className="text-xs text-slate-600">
            {DISPOSITIVOS.filter((d) => focoInstalado(hospitalizacion, d.key)).map((d) => (
              <div key={d.key}>
                <span className="font-semibold">{d.label}:</span> {focoDiasTotal(hospitalizacion, d.key)} días
              </div>
            ))}
            {DISPOSITIVOS.filter((d) => focoInstalado(hospitalizacion, d.key)).length === 0 && (
              <span className="text-slate-400">Registra el dispositivo con sus fechas arriba para contar los días.</span>
            )}
          </div>
        </div>
      )}

      <div>
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm font-bold text-slate-700 flex items-center gap-1.5">
            <FileWarning size={14} /> Notificaciones IAAS ({notificaciones.length})
          </h2>
          <button
            onClick={() => {
              setEditingNotif(null);
              setNotificando(true);
            }}
            className="flex items-center gap-1 text-xs font-semibold text-teal-700 hover:underline"
          >
            <Plus size={13} /> Notificar caso
          </button>
        </div>
        {notificaciones.length === 0 ? (
          <div className="rounded-xl border border-dashed border-slate-300 bg-white py-6 text-center text-xs text-slate-400">
            Sin sospecha ni confirmación notificada por ahora.
          </div>
        ) : (
          <div className="space-y-2">
            {[...notificaciones]
              .sort((a, b) => (a.fechaNotificacion < b.fechaNotificacion ? 1 : -1))
              .map((n) => (

const MESES_LARGO = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function mesLargo(ym) {
  if (!ym) return "";
  const [y, m] = ym.split("-");
  return `${MESES_LARGO[parseInt(m, 10) - 1]} ${y}`;
}

/* Listado mensual de cirugías vigiladas — formato planilla oficial, para
   constatación de vigilancia ante acreditación y Comité. */
/* Episodios de uso de un dispositivo (actual + previos/catéteres). */
function episodiosFoco(h, key) {
  if (key === "cvc") {
    return (h.dip?.cvc?.cateteres || []).map((c) => ({
      fechaInstalacion: c.fechaInstalacion,
      fechaRetiro: c.fechaRetiro,
      etiqueta: [c.tipo, c.ubicacion].filter(Boolean).join(" "),
    }));
  }
  const d = h.dip?.[key];
  if (!d?.instalado && !(d?.previos || []).length) return [];
  const eps = (d.previos || []).map((p) => ({
    fechaInstalacion: p.fechaInstalacion,
    fechaRetiro: p.fechaRetiro,
    etiqueta: p.ubicacion || "",
  }));
  if (d?.instalado && d.fechaInstalacion) {
    eps.push({ fechaInstalacion: d.fechaInstalacion, fechaRetiro: d.fechaRetiro, etiqueta: d.ubicacion || "" });
  }
  return eps.filter((e) => e.fechaInstalacion).sort((a, b) => (a.fechaInstalacion < b.fechaInstalacion ? -1 : 1));
}

/* Resumen de un dispositivo dentro de un mes [desde, hasta] — para la planilla DIP. */
function resumenFocoMes(h, key, desde, hasta) {
  const eps = episodiosFoco(h, key).filter((e) => {
    const fin = e.fechaRetiro || todayISO();
    return e.fechaInstalacion <= hasta && fin >= desde;
  });
  if (eps.length === 0) return null;
  const dias = eps.reduce((s, e) => s + diasDispositivoEnPeriodo(e.fechaInstalacion, e.fechaRetiro, desde, hasta), 0);
  const cultivoKey = key === "cup" ? "urocultivo" : key === "vmi" ? "aetCsb" : "hemocultivos";
  const cultivos = [];
  (h.evoluciones || []).forEach((ev) => {
    if (cultivoKey === "hemocultivos") {
      (ev.hemocultivos || []).forEach((hc) => {
        if (hc.fecha && hc.fecha >= desde && hc.fecha <= hasta) cultivos.push({ fecha: hc.fecha, resultado: hc.pendiente ? "(P)" : hc.resultado || "" });
      });
    } else {
      const c = ev.cultivos?.[cultivoKey];
      const f = c?.fecha || ev.fechaExamenes || ev.fecha;
      if (c && (c.resultado || c.pendiente) && f >= desde && f <= hasta) {
        cultivos.push({ fecha: f, resultado: c.pendiente ? "(P)" : c.resultado || "" });
      }
    }
  });
  const iaas = (h.notificaciones || []).some((n) => n.dip?.[key]?.siNo === "SI" && n.confirmacion === "SI");
  const mo = (h.notificaciones || []).find((n) => n.dip?.[key]?.siNo === "SI")?.dip?.[key]?.mo || "";
  return {
    instalacion: eps[0].fechaInstalacion,
    cambios: eps.slice(1).map((e) => e.fechaInstalacion),
    retiro: eps[eps.length - 1].fechaRetiro,
    cantidad: eps.length,
    etiqueta: eps.map((e) => e.etiqueta).filter(Boolean).join(" / "),
    dias,
    cultivos,
    mo,
    iaas,
  };
}

/* Registro rápido de DIP: pacientes informados de corta estadía, sin ficha de
   vigilancia activa. Crea una ficha en modo pasivo, ya cerrada, con solo los
   dispositivos y sus fechas — suma a los días de exposición y a las tasas. */
function RegistroRapidoDip({ onCancel, onSave }) {
  const [f, setF] = useState({
    nombre: "",
    rut: "",
    edad: "",
    servicio: SERVICIOS[0],
    cama: "",
    fechaIngreso: todayISO(),
    fechaAlta: "",
    cup: { usa: false, inst: "", ret: "" },
    cvc: { usa: false, inst: "", ret: "", tipo: "" },
    vmi: { usa: false, inst: "", ret: "" },
  });
  const set = (k, v) => setF((s2) => ({ ...s2, [k]: v }));
  const setDip = (k, patch) => setF((s2) => ({ ...s2, [k]: { ...s2[k], ...patch } }));

  const algunDip = f.cup.usa || f.cvc.usa || f.vmi.usa;
  const puede = f.nombre.trim() && algunDip;

  const guardar = () => {
    const h = newHospitalizacion();
    h.nombre = f.nombre.trim();
    h.rut = f.rut.trim();
    h.edad = f.edad;
    h.servicio = f.servicio;
    h.cama = f.cama;
    h.fechaHospitalizacion = f.fechaIngreso;
    h.fechaIngresoVigilancia = f.fechaIngreso;
    h.modoVigilancia = "pasiva";
    h.diagnostico = "Registro rápido DIP (corta estadía)";
    if (f.cup.usa) h.dip.cup = { instalado: true, fechaInstalacion: f.cup.inst, ubicacion: "", fechaRetiro: f.cup.ret, previos: [] };
    if (f.vmi.usa) h.dip.vmi = { instalado: true, fechaInstalacion: f.vmi.inst, ubicacion: "", fechaRetiro: f.vmi.ret, previos: [] };
    if (f.cvc.usa) {
      h.dip.cvc = {
        cateteres: [{ id: uid(), tipo: f.cvc.tipo || TIPOS_CVC[0], fechaInstalacion: f.cvc.inst, ubicacion: "", fechaRetiro: f.cvc.ret, nutricionParenteral: false }],
      };
    }
    if (f.fechaAlta) {
      h.estado = "cerrado";
      h.cierre = { fechaAlta: f.fechaAlta, presentoIAAS: "NO", obs: "Registro rápido: paciente informado, sin vigilancia activa." };
    }
    onSave(h);
  };

  const bloque = (key, label) => (
    <div className={`rounded-lg border p-2.5 ${f[key].usa ? "border-teal-400 bg-teal-50" : "border-slate-200"}`}>

          {f[key].usa && <span className="text-white text-[10px] leading-none block text-center">✓</span>}
        </span>
        <span className="text-sm font-semibold text-slate-700">{label}</span>
      </button>
      {f[key].usa && (
        <div className="grid grid-cols-2 gap-2 mt-2">
          <Field label="Instalación / ingreso">
            <TextInput type="date" value={f[key].inst} onChange={(e) => setDip(key, { inst: e.target.value })} />
          </Field>
          <Field label="Retiro / egreso">
            <TextInput type="date" value={f[key].ret} onChange={(e) => setDip(key, { ret: e.target.value })} />
          </Field>
          {key === "cvc" && (
            <Field label="Tipo y ubicación" className="col-span-2">
              <Select value={f.cvc.tipo} onChange={(e) => setDip("cvc", { tipo: e.target.value })}>
                <option value="">Seleccionar…</option>
                {TIPOS_CVC.map((t) => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </Select>
            </Field>
          )}
        </div>
      )}

  );

  return (
    <div className="fixed inset-0 bg-slate-900/40 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
      <div className="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md p-5 space-y-3 max-h-[92vh] overflow-y-auto">
        <div className="flex items-center justify-between">
          <h2 className="font-bold text-slate-800">Registro rápido de DIP</h2>
          <button onClick={onCancel}><X size={18} className="text-slate-400" /></button>
        </div>
        <p className="text-[11px] text-slate-500">
          Para pacientes informados de corta estadía que no alcanzaste a vigilar. Registra solo los dispositivos y sus
          fechas: suman a los días de exposición y a las tasas, sin ficha de seguimiento.
        </p>

        <div className="grid grid-cols-2 gap-2">
          <Field label="Nombre" className="col-span-2">

          </Field>
          <Field label="RUT">

          <Field label="Cama">

        <div className="space-y-2">

        <div className="flex gap-2 pt-1">
          <button onClick={onCancel} className="flex-1 rounded-lg border border-slate-300 text-slate-600 font-semibold text-sm py-2.5">
            Cancelar

          <button
            disabled={!puede}
            onClick={guardar}
            className="flex-[2] rounded-lg bg-teal-700 disabled:bg-slate-300 text-white font-semibold text-sm py-2.5"
          >
            Guardar registro
          </button>
        </div>
      </div>
    </div>
  );
}

/* Descarga la planilla DIP como archivo para Excel (CSV con BOM, se abre directo). */
function exportarDipExcel(filas, mes, servicio) {
  const esc = (v) => `"${String(v === undefined || v === null ? "" : v).replace(/"/g, '""')}"`;
  const L = [];
  L.push(esc(`VIGILANCIA DE DISPOSITIVOS INVASIVOS (DIP) - ${mesLargo(mes)} - ${servicio}`));
  L.push("");
  // Fila de grupos
  L.push(
    ["", "", "", "", "CATETER URINARIO PERMANENTE", "", "", "", "", "", "", "",
     "CATETER VENOSO CENTRAL", "", "", "", "", "", "", "",
     "VENTILACION MECANICA INVASIVA", "", "", "", "", "", "", ""].map(esc).join(",")
  );
  const bloque = (cultivo, cuarta) => ["F. INSTALACION", "F. CAMBIO", "F. RETIRO", cuarta, "TOTAL DIAS DE USO", cultivo, "MO", "IAAS (SI/NO)"];
  L.push(
    ["NOMBRE PACIENTE", "RUT", "EDAD", "SERVICIO/CAMA",
     ...bloque("FECHA UROCULTIVO", "CANTIDAD DE DIP"),
     ...bloque("FECHA HEMOCULTIVO", "TIPO Y UBIC"),
     ...bloque("FECHA CSB/AET", "CANTIDAD DE DIP")].map(esc).join(",")
  );

  const celdas = (r, conTipo) =>
    r
      ? [
          fmtDate(r.instalacion),
          (r.cambios || []).map(fmtDate).join(" / "),
          r.retiro ? fmtDate(r.retiro) : "en uso",
          conTipo ? r.etiqueta || "" : r.cantidad,
          r.dias,
          r.cultivos.length ? r.cultivos.map((c) => fmtDate(c.fecha)).join(" / ") : "NO",
          r.cultivos.length ? r.cultivos.map((c) => c.resultado || "").join(" / ") : r.mo || "",
          r.iaas ? "SI" : "NO",
        ]
      : ["", "", "", "", "", "", "", ""];

  filas.forEach((f) => {
    L.push(
      [f.h.nombre || "", f.h.rut || "", f.h.edad || "", [f.h.servicio, f.h.cama].filter(Boolean).join(" "),
       ...celdas(f.cup, false), ...celdas(f.cvc, true), ...celdas(f.vmi, false)].map(esc).join(",")
    );
  });

  // Resumen de indicadores
  const tot = (k) => ({
    dias: filas.reduce((s2, f) => s2 + (f[k]?.dias || 0), 0),
    pac: filas.filter((f) => f[k]).length,
    iaas: filas.filter((f) => f[k]?.iaas).length,
  });
  L.push("");
  L.push(["INDICADOR", "IAAS", "DIAS EXPOSICION", "PACIENTES", "TASA x1000", "INC. ACUM. x100", "PROM. EXPOSICION"].map(esc).join(","));
  [["ITU / CUP", "cup"], ["ITS / CVC", "cvc"], ["NAVM / VMI", "vmi"]].forEach(([label, k]) => {
    const t = tot(k);
    L.push(
      [label, t.iaas, t.dias, t.pac,
       t.dias > 0 ? ((t.iaas / t.dias) * 1000).toFixed(2) : "0",
       t.pac > 0 ? ((t.iaas / t.pac) * 100).toFixed(1) : "0",
       t.pac > 0 ? (t.dias / t.pac).toFixed(1) : "0"].map(esc).join(",")
    );
  });

  const blob = new Blob(["\uFEFF" + L.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `DIP_${servicio.replace(/\s+/g, "_")}_${mes}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

                        <th className={th}>IAAS</th>
                      </React.Fragment>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filas.map((f) => (
                    <tr key={f.h.id}>
                      <td className={td}>{f.h.nombre || "—"}</td>
                      <td className={td}>{f.h.rut || "—"}</td>
                      <td className={td + " text-center"}>{f.h.edad || "—"}</td>
                      <td className={td}>{[f.h.servicio, f.h.cama].filter(Boolean).join(" ")}</td>
                      {celdasFoco(f.cup, false)}
                      {celdasFoco(f.cvc, true)}
                      {celdasFoco(f.vmi, false)}
                    </tr>
                  ))}
                </tbody>
              </table>

              <div className="mt-4">
                <table className="border-collapse text-[10px]" style={{ width: "auto" }}>
                  <thead>
                    <tr style={grupo}>
                      <th className={th}>Indicador</th>
                      <th className={th}>IAAS</th>
                      <th className={th}>Días exposición</th>
                      <th className={th}>Pacientes</th>
                      <th className={th}>Tasa x1.000</th>
                      <th className={th}>Inc. acum. x100</th>
                      <th className={th}>Prom. exposición</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[
                      { l: "ITU / CUP", t: tCup },
                      { l: "ITS / CVC", t: tCvc },
                      { l: "NAVM / VMI", t: tVmi },
                    ].map((x) => (
                      <tr key={x.l}>
                        <td className={td + " font-semibold"}>{x.l}</td>
                        <td className={td + " text-center"}>{x.t.iaas}</td>
                        <td className={td + " text-center"}>{x.t.dias}</td>
                        <td className={td + " text-center"}>{x.t.pac}</td>
                        <td className={td + " text-center font-bold"}>{tasa(x.t).toFixed(2)}</td>
                        <td className={td + " text-center"}>{inc(x.t).toFixed(1)}</td>
                        <td className={td + " text-center"}>{prom(x.t).toFixed(1)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <p className="text-[9px] text-slate-500 mt-1">
                  El indicador ITS/CVC se informa consolidado para todos los pacientes adultos del hospital; ITU/CUP y NAVM/VMI se informan por servicio.
                </p>
              </div>
            </>
          )}

          <div className="mt-10 flex justify-between text-[10px]">
            <div className="text-center" style={{ width: "45%" }}>
              <div className="border-t border-slate-500 pt-1">Enfermera IAAS</div>
            </div>
            <div className="text-center" style={{ width: "45%" }}>
              <div className="border-t border-slate-500 pt-1">Medico IAAS</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function CirugiasListaPrintView({ cirugias, mes, onClose }) {

    .filter((c) => (c.fechaProcedimiento || "").slice(0, 7) === mes)

  const th = "border border-slate-500 px-1.5 py-1 text-center font-bold";
  const td = "border border-slate-400 px-1.5 py-1 align-top";

  const conIAAS = delMes.filter((c) => c.iaas === "SI").length;
  const vigilados = delMes.length;
  const incidencia = vigilados > 0 ? (conIAAS / vigilados) * 100 : 0;

  return (
    <div className="print-active fixed inset-0 bg-slate-900/50 z-50 overflow-y-auto">
      <div className="max-w-4xl mx-auto my-4 bg-white rounded-xl shadow-lg">
        <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200 print:hidden">

            <button onClick={() => window.print()} className="rounded-lg bg-teal-700 text-white text-xs font-semibold px-3 py-1.5">
              Imprimir / PDF
            </button>
            <button onClick={onClose} className="rounded-lg border border-slate-300 text-slate-600 text-xs font-semibold px-3 py-1.5">
              Cerrar

        <div id="print-area" className="ficha-vigilancia-print p-6 text-sm text-slate-800">

            titulo="VIGILANCIA CIRUGIAS Y PROCEDIMIENTOS TRAZADORAS IAAS"
            subtitulo={`Mes: ${mesLargo(mes)} · ${vigilados} procedimiento(s) vigilado(s)`}

          {delMes.length === 0 ? (
            <p className="text-xs text-slate-500">Sin procedimientos registrados en este mes.</p>

                  <th className={th}>FECHA PROCEDIMIENTO</th>

                  <th className={th}>IAAS (SI/NO)</th>

              <tbody>
                {delMes.map((c) => {
                  const cx = CIRUGIAS_TRAZADORAS.find((x) => x.key === c.tipoProcedimiento);
                  const ctrls = c.controles || [];
                  return (
                    <tr key={c.id}>
                      <td className={td}>{c.nombre || "—"}</td>
                      <td className={td}>{c.rut || "—"}</td>
                      <td className={td + " text-center"}>{c.edad || "—"}</td>
                      <td className={td}>{cx ? cx.label : c.tipoProcedimiento || "—"}</td>
                      <td className={td + " text-center"}>{fmtDate(c.fechaProcedimiento)}</td>
                      <td className={td + " text-center"}>
                        {ctrls.length === 0 ? "—" : ctrls.map((x, i) => <div key={i}>{fmtDate(x.fecha)}</div>)}
                      </td>
                      <td className={td + " text-center"}>
                        {ctrls.length === 0 ? "—" : ctrls.map((x, i) => <div key={i}>{x.caracteristica || "—"}</div>)}

                      <td className={td}>
                        {ctrls.length === 0
                          ? "—"
                          : ctrls.map((x, i) => (
                              <div key={i}>{FUENTES_VIGILANCIA.find((f) => f.key === x.fuente)?.label || "—"}</div>

function CirugiasView({ cirugias, onSave, onDelete }) {
  const [editando, setEditando] = useState(null); // registro en edición o null
  const [nuevo, setNuevo] = useState(false);
  const [pestana, setPestana] = useState("vigilancia"); // "vigilancia" | "historico"
  const [imprimirMes, setImprimirMes] = useState(null); // "YYYY-MM" del listado a imprimir
  const [mesSel, setMesSel] = useState(todayISO().slice(0, 7));

  if (nuevo || editando) {
    return (
      <CirugiaForm
        registro={editando || newCirugiaVigilancia()}
        onCancel={() => {
          setNuevo(false);
          setEditando(null);
        }}
        onSave={(reg) => {
          onSave(reg);
          setNuevo(false);
          setEditando(null);
        }}
        onPersist={onSave}
        onDelete={onDelete}
      />
    );
  }

  const enVigilancia = cirugias.filter((c) => (c.estado || "activo") === "activo");
  const archivadas = cirugias.filter((c) => c.estado === "cerrado");
  const porRevisar = enVigilancia.filter((c) => plazoCirugia(c).cumplido);
  const lista = pestana === "vigilancia" ? enVigilancia : archivadas;
  const ordenadas = [...lista].sort((a, b) => (a.fechaProcedimiento < b.fechaProcedimiento ? 1 : -1));

  const darAlta = (c) => {
    if (!window.confirm(`¿Dar alta de vigilancia a ${c.nombre}?\n\nSe cierra el seguimiento y el registro pasa al histórico. Seguirá contando en los indicadores y podrás consultarlo para auditoría.`)) return;
    onSave({ ...c, estado: "cerrado", fechaAlta: c.fechaAlta || todayISO(), updatedAt: new Date().toISOString() });
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-3">
        <div>
          <h1 className="text-lg font-bold text-slate-800">Cirugías y procedimientos trazadores</h1>
          <p className="text-xs text-slate-500">
            {enVigilancia.length} en vigilancia · {archivadas.length} archivada(s)
          </p>
        </div>
        <button
          onClick={() => setNuevo(true)}
          className="rounded-lg bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-3.5 py-2 flex items-center gap-1.5 shrink-0"
        >
          <Plus size={16} /> Nuevo
        </button>
      </div>

      <div className="rounded-xl border border-slate-200 bg-white p-3">
        <div className="text-xs font-semibold text-slate-600 mb-1.5">Listado mensual (constatación de vigilancia)</div>
        <div className="flex gap-2">
          <TextInput type="month" value={mesSel} onChange={(e) => setMesSel(e.target.value)} className="flex-1" />
          <button
            onClick={() => setImprimirMes(mesSel)}
            className="rounded-lg border border-teal-700 text-teal-700 hover:bg-teal-50 text-xs font-semibold px-3 py-2 flex items-center gap-1.5 shrink-0"
          >
            <Download size={14} /> Imprimir
          </button>
        </div>
        <p className="text-[10px] text-slate-400 mt-1.5">
          Genera la planilla oficial del mes con todos los datos, para auditoría y Comité.
        </p>
      </div>

      {porRevisar.length > 0 && (
        <div className="rounded-xl border border-amber-300 bg-amber-50 p-3.5">
          <div className="flex items-center gap-1.5 mb-1">
            <AlertTriangle size={15} className="text-amber-600" />
            <span className="text-sm font-bold text-amber-800">
              {porRevisar.length} cirugía(s) cumplieron el plazo de vigilancia
            </span>
          </div>
          <p className="text-[11px] text-amber-700 mb-2">Revisa el caso y da el alta de vigilancia para archivarlo.</p>
          <div className="space-y-1.5">
            {porRevisar.map((c) => {
              const pz = plazoCirugia(c);
              const cx = CIRUGIAS_TRAZADORAS.find((x) => x.key === c.tipoProcedimiento);
              return (
                <div key={c.id} className="rounded-lg bg-white border border-amber-200 px-2.5 py-2 flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <div className="text-xs font-bold text-slate-800 truncate">{c.nombre || "Sin nombre"}</div>
                    <div className="text-[10px] text-slate-500 truncate">
                      {cx ? cx.label : "—"} · Cx {fmtDate(c.fechaProcedimiento)} · día {pz.transcurridos} de {pz.requeridos}
                    </div>
                  </div>
                  <div className="flex gap-2 shrink-0">
                    <button onClick={() => setEditando(c)} className="text-[11px] font-semibold text-teal-700 hover:underline">
                      Revisar
                    </button>
                    <button onClick={() => darAlta(c)} className="text-[11px] font-semibold text-amber-700 hover:underline">
                      Dar alta
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="flex gap-2">
        {[
          { k: "vigilancia", label: `En vigilancia (${enVigilancia.length})` },
          { k: "historico", label: `Histórico (${archivadas.length})` },
        ].map((t) => (
          <button
            key={t.k}
            onClick={() => setPestana(t.k)}
            className={`text-xs font-semibold rounded-full px-3 py-1.5 border ${
              pestana === t.k ? "bg-teal-700 text-white border-teal-700" : "bg-white border-slate-300 text-slate-600"
            }`}
          >
            {t.label}
          </button>
        ))}
      </div>

      {ordenadas.length === 0 ? (
        <div className="rounded-xl border border-dashed border-slate-300 bg-white py-12 text-center">
          <Syringe size={28} className="mx-auto text-slate-300 mb-2" />
          <p className="text-sm text-slate-500">Aún no hay procedimientos en vigilancia.</p>
          <button onClick={() => setNuevo(true)} className="mt-3 text-sm font-semibold text-teal-700 hover:underline">
            Registrar primer procedimiento
          </button>
        </div>
      ) : (
        <div className="space-y-2">
          {ordenadas.map((c) => {
            const cx = CIRUGIAS_TRAZADORAS.find((x) => x.key === c.tipoProcedimiento);
            const ctrls = c.controles || [];
            const ultimoControl = ctrls[ctrls.length - 1];
            const caracKey = ultimoControl?.caracteristica;
            const pz = plazoCirugia(c);
            return (
              <button
                key={c.id}
                onClick={() => setEditando(c)}
                className={`w-full text-left rounded-xl border bg-white p-3.5 hover:shadow-sm ${
                  c.iaas === "SI" ? "border-rose-300" : pz.cumplido ? "border-amber-300" : "border-slate-200 hover:border-teal-400"
                }`}
              >
                <div className="flex items-start justify-between gap-2">
                  <div className="min-w-0">
                    <div className="font-bold text-slate-800 text-sm truncate">{c.nombre || "Sin nombre"}</div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      {c.rut || "s/RUT"} · {c.edad ? `${c.edad} años` : "edad ?"}
                    </div>
                    <div className="text-xs text-slate-600 mt-1">{cx ? cx.label : c.tipoProcedimiento || "Sin tipo"}</div>
                    <div className="text-[11px] text-slate-400 mt-0.5">
                      Cx: {fmtDate(c.fechaProcedimiento)}
                      {ctrls.length > 0 ? ` · ${ctrls.length} control(es)` : ""}
                      {c.fechaAlta ? ` · Alta: ${fmtDate(c.fechaAlta)}` : ""}
                    </div>
                    {pz.enVigilancia && (
                      <div className={`text-[10px] mt-0.5 font-semibold ${pz.cumplido ? "text-amber-600" : "text-slate-400"}`}>
                        {pz.cumplido
                          ? `Cumplió ${pz.requeridos} días — revisar y dar alta`
                          : `Día ${pz.transcurridos} de ${pz.requeridos} · faltan ${pz.restantes}`}
                      </div>
                    )}
                    {ctrls.length > 0 && ultimoControl && (
                      <div className="text-[10px] text-sky-600 mt-0.5">
                        Último: {fmtDate(ultimoControl.fecha)}
                        {ultimoControl.fuente
                          ? ` · ${FUENTES_VIGILANCIA.find((f) => f.key === ultimoControl.fuente)?.label || ""}`
                          : ""}
                      </div>
                    )}
                  </div>
                  <div className="flex flex-col items-end gap-1 shrink-0">
                    {c.iaas === "SI" && <Pill tone="red">IAAS</Pill>}
                    {caracKey && (
                      <span className={`text-[10px] font-bold rounded px-1.5 py-0.5 border ${
                        caracKey === "2" ? "bg-rose-100 text-rose-700 border-rose-200" : caracKey === "3" ? "bg-slate-100 text-slate-600 border-slate-300" : "bg-emerald-100 text-emerald-700 border-emerald-200"
                      }`}>
                        {caracKey === "1" ? "S/INF" : caracKey === "2" ? "C/INF" : "S/REG"}
                      </span>
                    )}
                    {!pz.enVigilancia && (
                      <span className="text-[10px] font-bold rounded px-1.5 py-0.5 border bg-slate-100 text-slate-500 border-slate-300">
                        Archivada
                      </span>
                    )}
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {imprimirMes && (
        <CirugiasListaPrintView cirugias={cirugias} mes={imprimirMes} onClose={() => setImprimirMes(null)} />
      )}
    </div>
  );
}

function CirugiaForm({ registro, onCancel, onSave, onPersist, onDelete }) {
  const [c, setC] = useState(registro);
  const set = (k, v) => setC((s) => ({ ...s, [k]: v }));
  const esNuevo = !registro.nombre && !registro.rut;

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2">
        <button onClick={onCancel} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">
          <ArrowLeft size={18} />
        </button>
        <div>
          <h1 className="text-lg font-bold text-slate-800">{esNuevo ? "Nuevo procedimiento" : "Editar procedimiento"}</h1>
          <p className="text-xs text-slate-500">Vigilancia de cirugías trazadoras IAAS</p>
        </div>
      </div>

      <SectionCard icon={ClipboardList} title="Datos del paciente y procedimiento">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Nombre" className="col-span-2">
            <TextInput value={c.nombre} onChange={(e) => set("nombre", e.target.value)} placeholder="Nombre completo" />
          </Field>
          <Field label="RUT">
            <TextInput value={c.rut} onChange={(e) => set("rut", e.target.value)} placeholder="12.345.678-9" />
          </Field>
          <Field label="Edad">
            <TextInput value={c.edad} onChange={(e) => set("edad", e.target.value)} placeholder="Años" />
          </Field>
          <Field label="Tipo de procedimiento" className="col-span-2">
            <Select value={c.tipoProcedimiento} onChange={(e) => set("tipoProcedimiento", e.target.value)}>
              <option value="">Seleccionar…</option>
              {CIRUGIAS_TRAZADORAS.map((cx) => (
                <option key={cx.key} value={cx.key}>{cx.label}</option>
              ))}
            </Select>
          </Field>
          <Field label="Fecha procedimiento" className="col-span-2">
            <TextInput type="date" value={c.fechaProcedimiento} onChange={(e) => set("fechaProcedimiento", e.target.value)} />
          </Field>
        </div>
      </SectionCard>

      <SectionCard icon={CheckCircle2} title="Seguimiento y resultado">
        <div className="flex items-center justify-between mb-2">
          <span className="text-xs font-semibold text-slate-600">Controles de seguimiento</span>
          <button
            type="button"
            onClick={() => set("controles", [...(c.controles || []), newControlCx()])}
            className="text-[11px] font-semibold text-teal-700 hover:underline"
          >
            + Agregar control
          </button>
        </div>

        {(c.controles || []).length === 0 ? (
          <p className="text-[11px] text-slate-400 mb-3">
            Sin controles registrados. Agrega uno por cada instancia de vigilancia (control post-alta, urgencia, curación, reingreso…).
          </p>
        ) : (
          <div className="space-y-2 mb-3">
            {(c.controles || []).map((ctrl, i) => {
              const upd = (patch) => {
                const list = [...c.controles];
                list[i] = { ...list[i], ...patch };
                set("controles", list);
              };
              return (
                <div key={ctrl.id || i} className="rounded-lg border border-slate-200 bg-slate-50 p-2.5">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="text-[11px] font-semibold text-slate-500">Control {i + 1}</span>
                    <button
                      type="button"
                      onClick={() => set("controles", c.controles.filter((_, j) => j !== i))}
                      className="text-rose-400 text-[11px] hover:text-rose-600"
                    >
                      Quitar
                    </button>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="Fecha">
                      <TextInput type="date" value={ctrl.fecha} onChange={(e) => upd({ fecha: e.target.value })} />
                    </Field>
                    <Field label="Fuente">
                      <Select value={ctrl.fuente} onChange={(e) => upd({ fuente: e.target.value })}>
                        <option value="">Seleccionar…</option>
                        {FUENTES_VIGILANCIA.map((f) => (
                          <option key={f.key} value={f.key}>{f.label}</option>
                        ))}
                      </Select>
                    </Field>
                  </div>
                  <Field label="Característica" className="mt-1.5">
                    <div className="flex gap-1.5">
                      {CARACTERISTICAS_CX.map((car) => (
                        <button
                          key={car.key}
                          type="button"
                          onClick={() => upd({ caracteristica: car.key })}
                          className={`flex-1 text-[11px] rounded-lg border py-1.5 font-semibold ${
                            ctrl.caracteristica === car.key ? "bg-teal-700 text-white border-teal-700" : "border-slate-300 text-slate-600 bg-white"
                          }`}
                          title={car.label}
                        >
                          {car.key === "1" ? "S/INF" : car.key === "2" ? "C/INF" : "S/REG"}
                        </button>
                      ))}
                    </div>
                  </Field>
                  <Field label="Hallazgos" className="mt-1.5">
                    <TextInput value={ctrl.hallazgos || ""} onChange={(e) => upd({ hallazgos: e.target.value })} placeholder="Ej: herida limpia, sin signos…" />
                  </Field>
                </div>
              );
            })}
          </div>
        )}

        <div className="grid grid-cols-2 gap-3 mt-2 border-t border-slate-100 pt-3">
          <Field label="Fecha de alta (fin de seguimiento)">
